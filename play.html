<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>⚽ 월드컵 퀴즈 참가</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;700;900&display=swap');
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{--dark:#06060f;--card:#0f1020;--green:#00843D;--gold:#FFD700;--text:#f0f0f0;--muted:#555;--muted2:#888;}
    html,body{height:100%;background:var(--dark);color:var(--text);font-family:'Noto Sans KR',sans-serif;overflow:hidden;}
    .screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;transition:opacity .25s,transform .25s;}
    .screen.hidden{opacity:0;pointer-events:none;transform:scale(.98);}

    /* ── LOGIN ── */
    #s-login{background:radial-gradient(ellipse at 50% 0%,rgba(0,132,61,.18),transparent 60%),var(--dark);}
    .login-ball{font-size:80px;animation:spin 6s linear infinite;margin-bottom:20px;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .login-title{font-family:'Black Han Sans',sans-serif;font-size:32px;text-align:center;margin-bottom:6px;}
    .login-sub{color:var(--muted2);font-size:14px;text-align:center;margin-bottom:32px;}
    .login-input{width:100%;max-width:300px;background:var(--card);border:2px solid rgba(255,255,255,.1);border-radius:16px;padding:16px 20px;font-size:20px;color:var(--text);font-family:'Black Han Sans',sans-serif;text-align:center;outline:none;transition:border-color .2s;margin-bottom:16px;}
    .login-input:focus{border-color:var(--green);}
    .login-btn{width:100%;max-width:300px;background:var(--green);color:#fff;border:none;border-radius:16px;padding:18px;font-size:20px;font-family:'Black Han Sans',sans-serif;cursor:pointer;transition:opacity .2s,transform .15s;}
    .login-btn:active{transform:scale(0.97);}
    .no-fb-warn{color:#fcd34d;font-size:12px;text-align:center;margin-top:14px;max-width:280px;line-height:1.5;}

    /* ── LOBBY ── */
    #s-lobby{background:var(--dark);}
    .lobby-icon{font-size:72px;animation:breathe 2.5s ease infinite;margin-bottom:16px;}
    @keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
    .lobby-title{font-family:'Black Han Sans',sans-serif;font-size:26px;margin-bottom:6px;color:var(--gold);}
    .lobby-name{font-size:13px;color:var(--muted2);margin-bottom:20px;}
    .lobby-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(0,132,61,.15);border:1px solid rgba(0,132,61,.3);border-radius:100px;padding:10px 20px;font-size:13px;color:var(--green);margin-bottom:8px;}
    .ldot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 1.5s infinite;}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.5)}}
    .lobby-count{font-size:12px;color:var(--muted2);margin-bottom:20px;}
    .my-score-box{background:var(--card);border:1px solid rgba(255,215,0,.2);border-radius:16px;padding:16px 36px;text-align:center;}
    .ms-lbl{font-size:11px;color:var(--muted2);text-transform:uppercase;letter-spacing:1px;}
    .ms-val{font-family:'Black Han Sans',sans-serif;font-size:44px;color:var(--gold);}
    .ms-rank{font-size:13px;color:var(--muted2);margin-top:4px;}

    /* ── QUESTION ── */
    #s-question{padding:16px;justify-content:flex-start;align-items:stretch;background:var(--dark);}
    .q-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-shrink:0;}
    .q-game-lbl{font-size:12px;color:var(--muted2);font-weight:700;letter-spacing:1px;}
    .q-score-bdg{background:rgba(255,215,0,.1);border:1px solid rgba(255,215,0,.2);border-radius:100px;padding:4px 14px;font-family:'Black Han Sans',sans-serif;font-size:16px;color:var(--gold);}
    .timer-wrap{width:100%;height:10px;background:rgba(255,255,255,.06);border-radius:100px;margin-bottom:8px;overflow:hidden;flex-shrink:0;}
    #q-tbar{height:100%;background:var(--green);border-radius:100px;transition:width .25s linear,background .3s;width:100%;}
    .q-time-num{text-align:right;font-family:'Black Han Sans',sans-serif;font-size:15px;color:var(--muted2);margin-bottom:8px;}
    .q-time-num.urgent{color:#ef4444;animation:urgentPulse .3s ease infinite alternate;}
    @keyframes urgentPulse{from{transform:scale(1)}to{transform:scale(1.2)}}
    .q-card{width:100%;background:var(--card);border:1px solid rgba(255,255,255,.07);border-radius:20px;padding:20px;text-align:center;margin-bottom:12px;flex-shrink:0;}
    .q-emoji{font-size:52px;display:block;margin-bottom:10px;}
    .q-text{font-family:'Black Han Sans',sans-serif;font-size:clamp(17px,4vw,24px);line-height:1.35;}
    .q-num{font-size:11px;color:var(--muted2);margin-top:8px;}
    .q-opts{width:100%;display:grid;grid-template-columns:1fr 1fr;gap:10px;flex-shrink:0;}
    .opt{border:none;border-radius:16px;padding:0 10px;font-size:15px;font-family:'Black Han Sans',sans-serif;cursor:pointer;transition:transform .1s,opacity .15s,box-shadow .2s;display:flex;align-items:center;justify-content:center;gap:7px;height:72px;text-align:center;line-height:1.2;position:relative;overflow:hidden;color:#fff;}
    .opt::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,.18);opacity:0;transition:opacity .1s;}
    .opt:active::after{opacity:1;}
    .opt:active:not(:disabled){transform:scale(0.94);}
    .opt:disabled{cursor:not-allowed;}
    .opt.a{background:#c9003b;}
    .opt.b{background:#1050c0;}
    .opt.c{background:#c08000;}
    .opt.d{background:#008542;}
    .opt.selected{box-shadow:0 0 0 3px #fff,0 0 24px rgba(255,255,255,.25);}
    .opt.correct{background:#22c55e!important;animation:correctPop .5s ease;}
    .opt.wrong{background:#374151!important;opacity:.5;}
    @keyframes correctPop{0%{transform:scale(1)}50%{transform:scale(1.07)}100%{transform:scale(1)}}
    .opt-letter{font-size:18px;opacity:.75;flex-shrink:0;}
    .opt-txt{font-size:14px;line-height:1.2;}

    /* ── WAIT ── */
    #s-wait{background:var(--dark);}
    .wait-icon{font-size:60px;animation:bounce .7s ease infinite alternate;margin-bottom:18px;}
    @keyframes bounce{to{transform:translateY(-18px)}}
    .wait-title{font-family:'Black Han Sans',sans-serif;font-size:24px;margin-bottom:8px;}
    .wait-sub{font-size:14px;color:var(--muted2);margin-bottom:24px;}
    .ans-preview{background:var(--card);border:2px solid rgba(255,255,255,.1);border-radius:16px;padding:16px 24px;font-family:'Black Han Sans',sans-serif;font-size:18px;text-align:center;max-width:280px;}
    .wait-dots{display:flex;gap:8px;margin-top:24px;}
    .wd{width:10px;height:10px;border-radius:50%;background:var(--green);animation:wdot .9s ease infinite both;}
    .wd:nth-child(2){animation-delay:.15s;}
    .wd:nth-child(3){animation-delay:.3s;}
    @keyframes wdot{0%,80%,100%{transform:scale(0);opacity:0}40%{transform:scale(1);opacity:1}}

    /* ── REVEAL ── */
    #s-reveal{background:var(--dark);}
    .rv-bg{position:absolute;inset:0;pointer-events:none;}
    .rv-icon{font-size:80px;animation:popIn .45s cubic-bezier(.34,1.56,.64,1);margin-bottom:14px;position:relative;}
    @keyframes popIn{from{transform:scale(0) rotate(-5deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}
    .rv-title{font-family:'Black Han Sans',sans-serif;font-size:34px;margin-bottom:8px;position:relative;}
    .rv-correct-box{background:rgba(34,197,94,.15);border:2px solid rgba(34,197,94,.4);border-radius:14px;padding:12px 22px;margin-bottom:18px;position:relative;}
    .rv-correct-lbl{font-size:11px;color:#4ade80;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;}
    .rv-correct-val{font-family:'Black Han Sans',sans-serif;font-size:22px;color:#4ade80;}
    .rv-gain{font-family:'Black Han Sans',sans-serif;font-size:52px;color:var(--gold);animation:gainPop .6s .1s cubic-bezier(.34,1.56,.64,1) both;position:relative;}
    @keyframes gainPop{from{transform:scale(.4) translateY(24px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
    .rv-gain.zero{color:#6b7280;}
    .rv-total{font-size:15px;color:var(--muted2);margin-top:8px;}
    .rv-rank{font-size:16px;color:var(--gold);margin-top:6px;font-weight:700;}
    .rv-streak{margin-top:12px;font-size:20px;animation:streakIn .4s .4s ease both;}
    @keyframes streakIn{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}

    /* ── STATUS BAR ── */
    .status-bar{position:fixed;top:0;left:0;right:0;text-align:center;padding:8px;font-size:12px;font-weight:700;z-index:999;transition:all .3s;}
    .status-bar.ok{background:rgba(0,132,61,.9);color:#fff;}
    .status-bar.err{background:rgba(239,68,68,.9);color:#fff;}
    .status-bar.warn{background:rgba(245,158,11,.9);color:#000;}
    .status-bar.hidden{transform:translateY(-100%);}

    /* ── FLOATING SCORE ── */
    .float-score{position:fixed;pointer-events:none;font-family:'Black Han Sans',sans-serif;font-size:36px;color:var(--gold);text-shadow:0 2px 8px rgba(0,0,0,.5);z-index:9000;animation:floatUp .9s ease forwards;}
    @keyframes floatUp{from{transform:translateY(0) scale(.8);opacity:1}to{transform:translateY(-80px) scale(1.1);opacity:0}}

    @keyframes confettiFall{from{transform:translateY(0) rotate(0);opacity:1}to{transform:translateY(110vh) rotate(720deg);opacity:0}}

    /* ── COUNTDOWN OVERLAY ── */
    #countdown-overlay{position:fixed;inset:0;background:rgba(6,6,15,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:8000;pointer-events:none;opacity:0;transition:opacity .2s;}
    #countdown-overlay.show{opacity:1;}
    .cd-num{font-family:'Black Han Sans',sans-serif;font-size:120px;color:var(--gold);text-shadow:0 0 40px rgba(255,215,0,.6);animation:cdPop .35s cubic-bezier(.34,1.56,.64,1);}
    @keyframes cdPop{from{transform:scale(1.6);opacity:0}to{transform:scale(1);opacity:1}}
    .cd-lbl{font-size:14px;color:var(--muted2);margin-top:8px;letter-spacing:2px;}

    /* ── AUTO-JOIN TOAST ── */
    .aj-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(0,132,61,.9);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-family:'Black Han Sans',sans-serif;z-index:9000;animation:toastIn .3s cubic-bezier(.34,1.56,.64,1);pointer-events:none;}
    @keyframes toastIn{from{transform:translateX(-50%) translateY(12px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
  </style>
</head>
<body>

<div class="status-bar hidden" id="status"></div>
<div id="countdown-overlay"><div class="cd-num" id="cd-num">3</div><div class="cd-lbl">문제 시작!</div></div>

<!-- LOGIN -->
<div class="screen" id="s-login">
  <div class="login-ball">⚽</div>
  <div class="login-title">월드컵 QUIZ</div>
  <div class="login-sub">닉네임을 입력하고 참가하세요!</div>
  <input class="login-input" id="name-in" type="text" placeholder="예: 홍길동" maxlength="8" autocomplete="off">
  <button class="login-btn" onclick="join()">✅ 참가하기</button>
  <div class="no-fb-warn hidden" id="no-fb-warn">
    ⚠️ Firebase가 연결되지 않았습니다.<br>운영자에게 올바른 QR 코드를 요청하세요.
  </div>
</div>

<!-- LOBBY -->
<div class="screen hidden" id="s-lobby">
  <div class="lobby-icon">⏳</div>
  <div class="lobby-title">대기 중...</div>
  <div class="lobby-name" id="lb-name">이름 로딩 중</div>
  <div class="lobby-badge"><span class="ldot"></span>운영자가 문제를 시작하길 기다리는 중</div>
  <div class="lobby-count" id="lb-count"></div>
  <div class="my-score-box">
    <div class="ms-lbl">내 점수</div>
    <div class="ms-val" id="lb-score">0</div>
    <div class="ms-rank" id="lb-rank"></div>
  </div>
</div>

<!-- QUESTION -->
<div class="screen hidden" id="s-question" style="justify-content:flex-start;padding-top:16px;">
  <div class="q-top">
    <div class="q-game-lbl" id="q-lbl">퀴즈</div>
    <div class="q-score-bdg" id="q-score">0점</div>
  </div>
  <div class="timer-wrap"><div id="q-tbar"></div></div>
  <div class="q-time-num" id="q-time-num">20</div>
  <div class="q-card">
    <span class="q-emoji" id="q-emoji">⚽</span>
    <div class="q-text" id="q-text">로딩 중...</div>
    <div class="q-num" id="q-num">문제 1</div>
  </div>
  <div class="q-opts">
    <button class="opt a" id="o0" onclick="answer(0)"><span class="opt-letter">A</span><span class="opt-txt" id="ot0"></span></button>
    <button class="opt b" id="o1" onclick="answer(1)"><span class="opt-letter">B</span><span class="opt-txt" id="ot1"></span></button>
    <button class="opt c" id="o2" onclick="answer(2)"><span class="opt-letter">C</span><span class="opt-txt" id="ot2"></span></button>
    <button class="opt d" id="o3" onclick="answer(3)"><span class="opt-letter">D</span><span class="opt-txt" id="ot3"></span></button>
  </div>
</div>

<!-- WAIT -->
<div class="screen hidden" id="s-wait">
  <div class="wait-icon">✋</div>
  <div class="wait-title">제출 완료!</div>
  <div class="wait-sub" id="wait-sub">정답 발표를 기다리세요...</div>
  <div class="ans-preview" id="wait-prev">—</div>
  <div class="wait-dots"><div class="wd"></div><div class="wd"></div><div class="wd"></div></div>
</div>

<!-- DONE -->
<div class="screen hidden" id="s-done" style="background:radial-gradient(ellipse at 50% 20%,rgba(255,215,0,.12),transparent 65%),var(--dark);">
  <div style="font-size:90px;animation:popIn .6s cubic-bezier(.34,1.56,.64,1);">🏆</div>
  <div style="font-family:'Black Han Sans',sans-serif;font-size:32px;margin:10px 0 6px;background:linear-gradient(135deg,#fff,var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">게임 종료!</div>
  <div style="font-size:14px;color:var(--muted2);margin-bottom:24px;">고생하셨습니다 🎉</div>
  <div style="background:var(--card);border:2px solid rgba(255,215,0,.2);border-radius:20px;padding:20px 40px;text-align:center;margin-bottom:20px;">
    <div style="font-size:11px;color:var(--muted2);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;">최종 점수</div>
    <div style="font-family:'Black Han Sans',sans-serif;font-size:56px;color:var(--gold);" id="done-score">0</div>
    <div style="font-size:13px;color:var(--muted2);margin-top:4px;" id="done-rank"></div>
  </div>
  <a id="done-sb-link" href="scoreboard.html" style="display:inline-block;background:linear-gradient(135deg,#f59e0b,#d97706);color:#000;text-decoration:none;border-radius:14px;padding:14px 28px;font-family:'Black Han Sans',sans-serif;font-size:17px;letter-spacing:1px;">📊 최종 랭킹 보기</a>
</div>

<!-- REVEAL -->
<div class="screen hidden" id="s-reveal">
  <div class="rv-icon" id="rv-icon">✅</div>
  <div class="rv-title" id="rv-title">정답!</div>
  <div class="rv-correct-box">
    <div class="rv-correct-lbl">정답</div>
    <div class="rv-correct-val" id="rv-correct">—</div>
  </div>
  <div class="rv-gain" id="rv-gain">+100점</div>
  <div class="rv-total" id="rv-total">총 점수: 0점</div>
  <div class="rv-rank" id="rv-rank"></div>
  <div class="rv-streak" id="rv-streak"></div>
</div>

<script>
// ── Firebase URL (from ?db= URL param OR localStorage) ─────────────
const FIREBASE_URL = (()=>{
  const p = new URLSearchParams(location.search).get('db');
  if(p){try{const u=atob(p);localStorage.setItem('wc_fb_url',u);return u;}catch{}}
  return localStorage.getItem('wc_fb_url')||'';
})();
const FB = FIREBASE_URL + '/wc_live';
const USE_FB = FIREBASE_URL.startsWith('https://');

const LETTERS = ['A','B','C','D'];
let myName='', myScore=0, myStreak=0, myRank=0;
let myAnswerIdx=-1, lastQId='', timerInt=null;
let sessionES=null, beepedSecs=new Set();

// ── Sound Effects (Web Audio API) ─────────────────────────────────
let AC=null;
function getAC(){if(!AC){try{AC=new(window.AudioContext||window.webkitAudioContext)();}catch{}}return AC;}
function snd(freq,dur,type='sine',vol=0.25){
  const ac=getAC();if(!ac)return;
  const o=ac.createOscillator(),g=ac.createGain();
  o.connect(g);g.connect(ac.destination);
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(vol,ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur);
  o.start();o.stop(ac.currentTime+dur);
}
function sndCorrect(){snd(523,.08);setTimeout(()=>snd(659,.08),90);setTimeout(()=>snd(784,.22),180);}
function sndWrong(){snd(180,.4,'sawtooth',.18);}
function sndTick(){snd(660,.04,'square',.06);}
function sndUrgent(){snd(880,.06,'square',.1);}
function sndJoin(){snd(440,.1);setTimeout(()=>snd(550,.15),120);}

// ── Utils ─────────────────────────────────────────────────────────
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'));document.getElementById(id).classList.remove('hidden');}
function enc(n){return n.replace(/[.#$[\]]/g,'_');}
function setStatus(msg,type='ok'){const el=document.getElementById('status');el.textContent=msg;el.className='status-bar '+type;el.classList.remove('hidden');if(type==='ok')setTimeout(()=>el.classList.add('hidden'),2500);}

// ── Floating score animation ──────────────────────────────────────
function floatScore(text, color='#FFD700'){
  const el=document.createElement('div');
  el.className='float-score';
  el.textContent=text;
  el.style.color=color;
  el.style.left=(30+Math.random()*40)+'%';
  el.style.top='40%';
  document.body.appendChild(el);
  el.addEventListener('animationend',()=>el.remove());
}

// ── Firebase ──────────────────────────────────────────────────────
async function fbPut(p,d){await fetch(FB+p+'.json',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)});}
async function fbGet(p){const r=await fetch(FB+p+'.json');return r.json();}

// ── Join ──────────────────────────────────────────────────────────
let joined=false;
function join(){
  if(joined)return;
  joined=true;
  const t=document.getElementById('aj-toast');if(t)t.remove();
  getAC(); // unlock audio on user gesture
  const n=document.getElementById('name-in').value.trim();
  if(!n){joined=false;document.getElementById('name-in').focus();return;}
  if(!USE_FB){joined=false;setStatus('⚠️ Firebase 미연결 — 운영자에게 QR 재발급 요청','err');return;}
  myName=n;localStorage.setItem('wc_player_name',n);
  fetch(FB+'/players/'+enc(n)+'.json',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:n,joinedAt:Date.now(),lastSeen:Date.now()})});
  document.getElementById('lb-name').textContent=n+' 참가 중';
  show('s-lobby');
  listen();
  fbGet('/scores/'+enc(n)).then(d=>{if(d){myScore=d.total||0;myStreak=d.streak||0;document.getElementById('lb-score').textContent=myScore;}});
  sndJoin();
}

// ── Listen ────────────────────────────────────────────────────────
function listen(){
  if(sessionES){try{sessionES.close();}catch{}}
  sessionES=new EventSource(FB+'/session.json');
  sessionES.addEventListener('put',e=>{const d=JSON.parse(e.data);onSession(d.data);});
  sessionES.onerror=()=>{setStatus('⚠️ 연결 끊김, 재연결 중...','err');setTimeout(listen,3000);};
  sessionES.onopen=()=>setStatus('✅ 연결됨','ok');

  // My score stream
  const sES=new EventSource(FB+'/scores/'+enc(myName)+'.json');
  sES.addEventListener('put',e=>{
    const d=JSON.parse(e.data).data;
    if(d){myScore=d.total||0;myStreak=d.streak||0;document.getElementById('lb-score').textContent=myScore;document.getElementById('q-score').textContent=myScore+'점';}
  });

  // Player + answer count streams (for lobby and wait screen)
  const pES=new EventSource(FB+'/players.json');
  let totalPlayers=0;
  pES.addEventListener('put',e=>{const d=JSON.parse(e.data).data||{};totalPlayers=Object.keys(d).length;updatePlayerCount();});
  function updatePlayerCount(){document.getElementById('lb-count').textContent=totalPlayers>0?totalPlayers+'명이 대기중':'';}

  const aES=new EventSource(FB+'/answers.json');
  let answerCount=0;
  function updateWaitSub(){
    const el=document.getElementById('wait-sub');
    if(el&&totalPlayers>0&&answerCount>0){
      const remaining=totalPlayers-answerCount;
      el.textContent=remaining>0?`${answerCount}/${totalPlayers}명 응답 · ${remaining}명 대기중`:'✅ 전원 응답! 곧 공개됩니다...';
    }
  }
  aES.addEventListener('put',e=>{const d=JSON.parse(e.data).data||{};answerCount=Object.keys(d).length;updateWaitSub();});
  aES.addEventListener('patch',e=>{const d=JSON.parse(e.data).data||{};answerCount=Math.max(answerCount,Object.keys({...d}).length);updateWaitSub();});
}

// ── Session handler ───────────────────────────────────────────────
function onSession(s){
  if(!s||s.state==='lobby'){
    show('s-lobby');
    document.getElementById('lb-score').textContent=myScore;
    return;
  }
  if(s.state==='done'){
    // Show final game-over screen
    document.getElementById('done-score').textContent=myScore.toLocaleString();
    const rankEl=document.getElementById('done-rank');
    if(s.allRanks&&s.allRanks[enc(myName)]){
      const r=s.allRanks[enc(myName)];
      rankEl.textContent=r+'위'+(r<=10?' 🎁 상품 대상!':'');
      rankEl.style.color=r<=10?'var(--gold)':'';
    } else {rankEl.textContent='';}
    // Set scoreboard link with db param
    const sbLink=document.getElementById('done-sb-link');
    if(USE_FB)sbLink.href='scoreboard.html?db='+btoa(FIREBASE_URL);
    show('s-done');
    setTimeout(confetti,300);
    return;
  }
  const qId=(s.questionIdx||0)+'_'+(s.game||'');
  if(s.state==='question'){
    if(qId!==lastQId){lastQId=qId;myAnswerIdx=-1;renderQ(s);}
    else if(myAnswerIdx>=0){show('s-wait');}
  } else if(s.state==='reveal'){
    showReveal(s);
  }
}

// ── Countdown overlay ─────────────────────────────────────────────
function showCountdown(cb){
  const ov=document.getElementById('countdown-overlay');
  const nm=document.getElementById('cd-num');
  let n=3;
  ov.classList.add('show');
  const step=()=>{
    nm.textContent=n;
    nm.style.animation='none';void nm.offsetWidth;nm.style.animation='cdPop .35s cubic-bezier(.34,1.56,.64,1)';
    sndTick();
    if(n<=1){setTimeout(()=>{ov.classList.remove('show');cb();},350);}
    else{n--;setTimeout(step,600);}
  };
  step();
}

// ── Render question ───────────────────────────────────────────────
function renderQ(s){
  const q=s.question;if(!q)return;
  const doRender=()=>{
    show('s-question');
    document.getElementById('q-lbl').textContent=s.game||'퀴즈';
    document.getElementById('q-score').textContent=myScore+'점';
    document.getElementById('q-emoji').textContent=q.emoji||'⚽';
    document.getElementById('q-text').textContent=q.text;
    document.getElementById('q-num').textContent='문제 '+(s.questionIdx+1)+' / '+s.totalQuestions;
    q.options.forEach((o,i)=>{
      document.getElementById('ot'+i).textContent=o;
      const b=document.getElementById('o'+i);
      b.className='opt '+['a','b','c','d'][i];
      b.disabled=false;
    });
    beepedSecs=new Set();
    tick(q.startAt||Date.now(),q.timeLimit||20);
  };
  const elapsed=(Date.now()-(q.startAt||Date.now()))/1000;
  if(elapsed<2){showCountdown(doRender);}else{doRender();}
}

function tick(startAt,limit){
  clearInterval(timerInt);
  const bar=document.getElementById('q-tbar');
  const timeEl=document.getElementById('q-time-num');
  const run=()=>{
    const rem=Math.max(0,limit-(Date.now()-startAt)/1000);
    bar.style.width=(rem/limit*100)+'%';
    bar.style.background=rem<5?'#ef4444':rem<10?'#f59e0b':'var(--green)';
    const remSec=Math.ceil(rem);
    timeEl.textContent=rem>0?remSec:'⏰';
    timeEl.className='q-time-num'+(rem<6&&rem>0?' urgent':'');
    if(rem<6&&rem>0&&!beepedSecs.has(remSec)){beepedSecs.add(remSec);sndUrgent();}
    if(rem<=0){clearInterval(timerInt);[0,1,2,3].forEach(i=>document.getElementById('o'+i).disabled=true);}
  };
  run();timerInt=setInterval(run,200);
}

// ── Answer ────────────────────────────────────────────────────────
async function answer(idx){
  if(myAnswerIdx>=0)return;
  getAC();
  myAnswerIdx=idx;
  clearInterval(timerInt);
  [0,1,2,3].forEach(i=>{const b=document.getElementById('o'+i);b.disabled=true;if(i===idx)b.classList.add('selected');});
  const txtEl=document.getElementById('ot'+idx);
  document.getElementById('wait-prev').textContent=LETTERS[idx]+' — '+(txtEl?txtEl.textContent:'?');
  await fbPut('/answers/'+enc(myName),{idx,at:Date.now(),name:myName});
  if(navigator.vibrate)navigator.vibrate(40);
  show('s-wait');
  snd(440,.08);
}

// ── Reveal ────────────────────────────────────────────────────────
function showReveal(s){
  clearInterval(timerInt);
  const ci=s.question?.correctIdx??-1;
  const correct=myAnswerIdx===ci&&ci>=0;
  const answered=myAnswerIdx>=0;
  const gain=s.scoreGains?.[enc(myName)]||0;
  const oldScore=myScore;
  if(gain>0)myScore+=gain;
  myStreak=correct?(myStreak+1):0;

  document.getElementById('rv-icon').textContent=!answered?'⏰':correct?'🎉':'❌';
  document.getElementById('rv-title').textContent=!answered?'시간 초과!':correct?'정답! 🎊':'아쉽다! ❌';
  document.getElementById('rv-correct').textContent=s.question?.options?.[ci]||'—';
  document.getElementById('rv-gain').textContent=gain>0?'+'+gain+'점':'0점';
  document.getElementById('rv-gain').className='rv-gain'+(gain>0?'':' zero');
  document.getElementById('rv-total').textContent='총 점수: '+myScore+'점';
  document.getElementById('lb-score').textContent=myScore;

  // Rank display
  const rankEl=document.getElementById('rv-rank');
  if(s.allRanks&&s.allRanks[enc(myName)]){
    const r=s.allRanks[enc(myName)];
    rankEl.textContent=r<=10?r+'위 🎁 상품권 확정!':r+'위';
    rankEl.style.color=r<=10?'var(--gold)':'var(--muted2)';
  } else {rankEl.textContent='';}

  document.getElementById('rv-streak').textContent=myStreak>=2?'🔥 '+myStreak+'연속 정답!':'';
  show('s-reveal');

  if(correct){
    sndCorrect();
    if(navigator.vibrate)navigator.vibrate([50,30,80]);
    if(gain>0)floatScore('+'+gain+'점','#FFD700');
    setTimeout(confetti,200);
  } else {
    sndWrong();
    if(navigator.vibrate)navigator.vibrate(200);
  }
}

// ── Confetti ──────────────────────────────────────────────────────
function confetti(){
  const colors=['#FFD700','#00843D','#ef4444','#3b82f6','#a855f7'];
  for(let i=0;i<50;i++){
    const el=document.createElement('div');
    el.style.cssText=`position:fixed;width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;background:${colors[~~(Math.random()*colors.length)]};border-radius:${Math.random()>.5?'50%':'2px'};left:${Math.random()*100}%;top:-10px;pointer-events:none;z-index:9999;animation:confettiFall ${1.5+Math.random()*2}s linear ${Math.random()*.5}s forwards;`;
    document.body.appendChild(el);
    el.addEventListener('animationend',()=>el.remove());
  }
}

// ── Init ──────────────────────────────────────────────────────────
const saved=localStorage.getItem('wc_player_name');
if(saved){
  document.getElementById('name-in').value=saved;
  if(USE_FB){
    // Auto-join returning players after 1.5s with toast
    const aj=document.createElement('div');
    aj.className='aj-toast';aj.id='aj-toast';
    aj.textContent='안녕하세요, '+saved+'님! 자동 참가 중...';
    document.body.appendChild(aj);
    setTimeout(()=>{
      const t=document.getElementById('aj-toast');if(t)t.remove();
      join();
    },1500);
  }
}
document.getElementById('name-in').addEventListener('keydown',e=>{if(e.key==='Enter')join();});
if(!USE_FB)document.getElementById('no-fb-warn').classList.remove('hidden');
</script>
