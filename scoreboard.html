<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏆 월드컵 랭킹보드</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;700&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #FFD700; --silver: #C0C0C0; --bronze: #CD7F32;
      --dark: #080810; --card: #10111e; --card2: #181926;
      --green: #00843D; --text: #f0f0f0; --muted: #555; --muted2: #888;
    }
    body { background: var(--dark); color: var(--text); font-family: 'Noto Sans KR', sans-serif; min-height: 100vh; display: flex; }

    /* ── LEFT PANEL ── */
    .board-panel { flex: 1; min-width: 0; display: flex; flex-direction: column; padding: 28px 24px; overflow: hidden; border-right: 1px solid rgba(255,255,255,0.05); }

    .board-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
    .board-title { font-family: 'Black Han Sans', sans-serif; font-size: clamp(20px, 3vw, 32px); background: linear-gradient(135deg,#fff,var(--gold)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; display:flex;align-items:center;gap:10px; }
    .live-pill { background:#ef4444;color:#fff;font-size:10px;font-weight:700;letter-spacing:2px;padding:3px 9px;border-radius:100px;animation:pulse 1.5s infinite; -webkit-text-fill-color:#fff; }
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}

    /* TABS */
    .tabs { display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap; }
    .tab-btn { padding:7px 14px;border-radius:100px;border:1.5px solid rgba(255,255,255,0.07);background:transparent;color:var(--muted2);font-size:12px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all 0.2s;-webkit-tap-highlight-color:transparent; }
    .tab-btn.active { background:var(--green);border-color:var(--green);color:#fff; }
    .tab-btn:hover:not(.active) { border-color:rgba(255,255,255,0.2);color:var(--text); }

    /* STATS MINI */
    .stats-mini { display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px; }
    .sm-box { background:var(--card);border:1px solid rgba(255,255,255,0.05);border-radius:12px;padding:10px;text-align:center; }
    .sm-val { font-family:'Black Han Sans',sans-serif;font-size:22px;color:var(--gold); }
    .sm-lbl { font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:2px; }

    /* PRIZE SECTION */
    .prize-section { background:linear-gradient(135deg,rgba(255,215,0,0.06),rgba(255,215,0,0.02));border:1px solid rgba(255,215,0,0.12);border-radius:16px;padding:14px 18px;margin-bottom:14px; }
    .prize-hdr { font-size:11px;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;font-weight:700; }
    .prize-row { display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.04);font-size:13px; }
    .prize-row:last-child{border-bottom:none;}
    .prize-medal{font-size:18px;width:24px;text-align:center;}

    /* RANK LIST */
    .rank-list { display:flex;flex-direction:column;gap:8px;overflow-y:auto;flex:1; }
    .rank-item {
      display:flex;align-items:center;gap:12px;
      background:var(--card);border:1px solid rgba(255,255,255,0.05);
      border-radius:16px;padding:13px 16px;
      animation:slideIn 0.4s ease;
      transition:border-color 0.2s;
    }
    @keyframes slideIn{from{transform:translateX(-16px);opacity:0}to{transform:translateX(0);opacity:1}}
    .rank-item.r1{border-color:rgba(255,215,0,0.3);background:rgba(255,215,0,0.04);}
    .rank-item.r2{border-color:rgba(192,192,192,0.25);}
    .rank-item.r3{border-color:rgba(205,127,50,0.25);}

    .rank-num{font-family:'Black Han Sans',sans-serif;font-size:20px;width:32px;text-align:center;flex-shrink:0;}
    .r1 .rank-num{color:var(--gold);}
    .r2 .rank-num{color:var(--silver);}
    .r3 .rank-num{color:var(--bronze);}

    .rank-avatar{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0;color:#000;}
    .rank-info{flex:1;min-width:0;}
    .rank-name{font-weight:700;font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .rank-sub{font-size:11px;color:var(--muted);margin-top:2px;}
    .rank-bar-wrap{width:100%;height:3px;background:rgba(255,255,255,0.05);border-radius:100px;margin-top:6px;}
    .rank-bar{height:100%;border-radius:100px;transition:width 0.6s ease;}
    .rank-score{font-family:'Black Han Sans',sans-serif;font-size:24px;color:var(--gold);flex-shrink:0;}
    .rank-score small{font-size:11px;color:var(--muted);font-family:'Noto Sans KR',sans-serif;font-weight:400;}

    .prize-tag{display:inline-block;font-size:10px;padding:2px 7px;border-radius:100px;font-weight:700;margin-left:6px;}
    .pt1{background:rgba(255,215,0,0.15);color:var(--gold);}
    .pt2{background:rgba(192,192,192,0.15);color:var(--silver);}
    .pt3{background:rgba(205,127,50,0.15);color:var(--bronze);}
    .pttop{background:rgba(99,102,241,0.15);color:#818cf8;}

    .empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);gap:10px;text-align:center;padding:40px;}
    .empty-state .icon{font-size:56px;}

    /* ── RIGHT PANEL ── */
    .input-panel{width:320px;flex-shrink:0;display:flex;flex-direction:column;padding:28px 22px;background:#0b0c18;overflow-y:auto;}

    .panel-back{color:var(--muted);text-decoration:none;font-size:13px;display:block;margin-bottom:18px;}
    .panel-title{font-family:'Black Han Sans',sans-serif;font-size:22px;margin-bottom:4px;}
    .panel-sub{font-size:13px;color:var(--muted2);margin-bottom:22px;line-height:1.5;}

    .form-lbl{display:block;font-size:11px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:7px;}
    .form-input,.form-select{width:100%;background:var(--card);border:1.5px solid rgba(255,255,255,0.07);border-radius:12px;padding:12px 14px;font-size:14px;color:var(--text);font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color 0.2s;margin-bottom:14px;}
    .form-input:focus,.form-select:focus{border-color:var(--green);}
    .form-select{cursor:pointer;}

    .submit-btn{width:100%;background:var(--green);color:#fff;border:none;border-radius:12px;padding:14px;font-size:16px;font-weight:700;cursor:pointer;font-family:'Black Han Sans',sans-serif;letter-spacing:1px;transition:opacity 0.2s,transform 0.15s;margin-bottom:6px;-webkit-tap-highlight-color:transparent;}
    .submit-btn:hover{opacity:0.85;transform:scale(1.01);}
    .submit-btn:active{transform:scale(0.98);}

    .divider{border:none;border-top:1px solid rgba(255,255,255,0.05);margin:18px 0;}

    /* QR */
    .qr-wrap{background:var(--card);border:1px solid rgba(255,255,255,0.06);border-radius:12px;text-align:center;padding:12px;margin-bottom:14px;}
    .qr-wrap img{width:120px;height:120px;border-radius:6px;}
    .qr-wrap p{font-size:11px;color:var(--muted);margin-top:6px;}

    /* Recent */
    .recent-hdr{font-size:11px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;}
    .recent-list{display:flex;flex-direction:column;gap:7px;max-height:260px;overflow-y:auto;}
    .recent-item{display:flex;justify-content:space-between;align-items:center;background:var(--card);border-radius:10px;padding:9px 12px;font-size:13px;animation:fadeIn 0.3s ease;}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    .ri-name{font-weight:700;}
    .ri-game{font-size:11px;color:var(--muted);}
    .ri-score{color:var(--gold);font-weight:700;}
    .del-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:2px 6px;border-radius:6px;transition:color 0.2s;}
    .del-btn:hover{color:#ef4444;}

    .ctrl-row{display:flex;gap:8px;margin-top:14px;}
    .ctrl-btn{flex:1;padding:9px;border-radius:10px;border:1.5px solid rgba(255,255,255,0.07);background:transparent;color:var(--muted);font-size:12px;cursor:pointer;transition:all 0.2s;font-family:'Noto Sans KR',sans-serif;}
    .ctrl-btn:hover{border-color:#ef4444;color:#ef4444;}
    .ctrl-btn.export:hover{border-color:var(--green);color:var(--green);}

    /* Toast */
    .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--green);color:#fff;padding:11px 22px;border-radius:100px;font-weight:700;font-size:13px;transition:transform 0.3s ease;z-index:999;pointer-events:none;}
    .toast.show{transform:translateX(-50%) translateY(0);}

    /* Mobile */
    @media(max-width:640px){
      body{flex-direction:column;}
      .board-panel{border-right:none;border-bottom:1px solid rgba(255,255,255,0.05);padding:18px 14px;max-height:55vh;overflow-y:auto;}
      .input-panel{width:100%;padding:18px 14px;}
      .stats-mini{grid-template-columns:repeat(2,1fr);}
      .tabs{gap:4px;}
      .tab-btn{padding:6px 10px;font-size:11px;}
    }
  </style>
</head>
<body>

<!-- LEFT -->
<div class="board-panel">
  <div class="board-top">
    <div class="board-title">🏆 실시간 랭킹 <span class="live-pill">LIVE</span></div>
    <div style="font-size:12px;color:var(--muted);" id="last-update">—</div>
  </div>

  <div class="stats-mini">
    <div class="sm-box"><div class="sm-val" id="sm-players">0</div><div class="sm-lbl">참가자</div></div>
    <div class="sm-box"><div class="sm-val" id="sm-games">0</div><div class="sm-lbl">총 게임</div></div>
    <div class="sm-box"><div class="sm-val" id="sm-top">0</div><div class="sm-lbl">최고점</div></div>
    <div class="sm-box"><div class="sm-val" id="sm-avg">0</div><div class="sm-lbl">평균점</div></div>
  </div>

  <div class="tabs" id="tabs">
    <button class="tab-btn active" onclick="setTab('all',this)">🌐 종합</button>
    <button class="tab-btn" onclick="setTab('선수퀴즈',this)">🕵️ 선수</button>
    <button class="tab-btn" onclick="setTab('우승국퀴즈',this)">🏆 우승국</button>
    <button class="tab-btn" onclick="setTab('페널티킥',this)">🥅 페널티킥</button>
    <button class="tab-btn" onclick="setTab('유니폼퀴즈',this)">👕 유니폼</button>
  </div>

  <!-- Prize Top 10 (종합 탭만) -->
  <div class="prize-section" id="prize-section">
    <div class="prize-hdr">🎁 상품 수여 대상 TOP 10</div>
    <div id="prize-list"></div>
  </div>

  <div class="rank-list" id="rank-list">
    <div class="empty-state"><div class="icon">⚽</div><p>아직 기록이 없어요</p><p style="font-size:13px;margin-top:4px;">오른쪽에서 점수를 입력하세요</p></div>
  </div>
</div>

<!-- RIGHT -->
<div class="input-panel">
  <a href="index.html" class="panel-back">← 게임 허브</a>
  <div class="panel-title">📋 점수 입력</div>
  <div class="panel-sub">게임이 끝난 참가자의<br>이름과 점수를 입력하세요</div>

  <label class="form-lbl">참가자 이름</label>
  <input class="form-input" id="player-name" type="text" placeholder="예: 홍길동" maxlength="10" autocomplete="off">

  <label class="form-lbl">점수</label>
  <input class="form-input" id="player-score" type="number" placeholder="예: 850" min="0" max="99999">

  <label class="form-lbl">게임 종류</label>
  <select class="form-select" id="game-type">
    <option value="선수퀴즈">🕵️ 선수 어느 나라?</option>
    <option value="우승국퀴즈">🏆 우승국 퀴즈</option>
    <option value="페널티킥">🥅 페널티킥 결승전</option>
    <option value="유니폼퀴즈">👕 유니폼 어느 팀?</option>
  </select>

  <button class="submit-btn" onclick="addScore()">✅ 점수 등록</button>

  <hr class="divider">

  <!-- QR -->
  <div class="qr-wrap" id="qr-wrap">
    <img id="qr-img" src="" alt="QR" style="display:none;">
    <p>게임 접속 QR</p>
  </div>

  <hr class="divider">

  <div class="recent-hdr">📝 최근 입력</div>
  <div class="recent-list" id="recent-list"></div>

  <div class="ctrl-row">
    <button class="ctrl-btn export" onclick="exportCSV()">📥 CSV</button>
    <button class="ctrl-btn" onclick="resetAll()">🗑 초기화</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'wc_scoreboard_v1';
const MAX_RANK = 10;
const AVATAR_COLORS = ['#ef4444','#f97316','#eab308','#22c55e','#06b6d4','#3b82f6','#a855f7','#ec4899','#14b8a6','#84cc16'];
let currentTab = 'all';

// ── Name helpers ─────────────────────────────────
function getSavedName(){ return localStorage.getItem('wc_player_name')||''; }
function saveName(n){ if(n) localStorage.setItem('wc_player_name',n); }

// ── Data ─────────────────────────────────────────
function loadData(){ try{ return JSON.parse(localStorage.getItem(STORAGE_KEY)||'{"players":[],"log":[]}'); }catch{ return{players:[],log:[]}; } }
function saveData(d){ localStorage.setItem(STORAGE_KEY,JSON.stringify(d)); }

function rebuildPlayers(log){
  const map={};
  log.forEach(e=>{
    if(!map[e.name]) map[e.name]={name:e.name,bestScore:e.score,totalScore:e.score,games:1,lastGame:e.game};
    else{ if(e.score>map[e.name].bestScore) map[e.name].bestScore=e.score; map[e.name].totalScore+=e.score; map[e.name].games++; map[e.name].lastGame=e.game; }
  });
  return Object.values(map);
}

// ── Add Score ─────────────────────────────────────
function addScore(){
  const nameEl=document.getElementById('player-name');
  const scoreEl=document.getElementById('player-score');
  const gameEl=document.getElementById('game-type');
  const name=nameEl.value.trim();
  const score=parseInt(scoreEl.value);
  const game=gameEl.value;
  if(!name){ showToast('❌ 이름을 입력하세요!',true); nameEl.focus(); return; }
  if(isNaN(score)||score<0){ showToast('❌ 점수를 입력하세요!',true); scoreEl.focus(); return; }
  const data=loadData();
  const time=new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
  data.log.unshift({name,score,game,time});
  if(data.log.length>100) data.log=data.log.slice(0,100);
  data.players=rebuildPlayers(data.log);
  saveData(data);
  saveName(name);
  render(data);
  nameEl.value=''; scoreEl.value=''; nameEl.focus();
  showToast(`✅ ${name} — ${score.toLocaleString()}점 등록!`);
}

// ── Render ────────────────────────────────────────
function setTab(tab,btn){
  currentTab=tab;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  document.getElementById('prize-section').style.display=tab==='all'?'block':'none';
  render(loadData());
}

function render(data){
  // Stats
  const scores=data.log.map(e=>e.score);
  const top=scores.length?Math.max(...scores):0;
  const avg=scores.length?Math.round(scores.reduce((a,b)=>a+b,0)/scores.length):0;
  document.getElementById('sm-players').textContent=data.players.length;
  document.getElementById('sm-games').textContent=data.log.length;
  document.getElementById('sm-top').textContent=top>=1000?(top/1000).toFixed(1)+'k':top;
  document.getElementById('sm-avg').textContent=avg>=1000?(avg/1000).toFixed(1)+'k':avg;
  document.getElementById('last-update').textContent='업데이트 '+new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});

  // Filter by tab
  let players=data.players;
  if(currentTab!=='all'){
    const gl=data.log.filter(e=>e.game===currentTab);
    const m={};
    gl.forEach(e=>{ if(!m[e.name]||e.score>m[e.name].bestScore) m[e.name]={name:e.name,bestScore:e.score,games:gl.filter(x=>x.name===e.name).length,lastGame:currentTab}; });
    players=Object.values(m);
  }
  const sorted=[...players].sort((a,b)=>b.bestScore-a.bestScore).slice(0,MAX_RANK);
  const maxScore=sorted[0]?.bestScore||1;

  // Rank list
  const rl=document.getElementById('rank-list');
  if(!sorted.length){
    rl.innerHTML='<div class="empty-state"><div class="icon">⚽</div><p>기록 없음</p></div>'; return;
  }
  const medals=['🥇','🥈','🥉','4','5','6','7','8','9','10'];
  rl.innerHTML=sorted.map((p,i)=>{
    const r=i+1; const col=AVATAR_COLORS[i%AVATAR_COLORS.length];
    const bw=Math.round(p.bestScore/maxScore*100);
    const pt=r===1?'<span class="prize-tag pt1">1등</span>':r===2?'<span class="prize-tag pt2">2등</span>':r===3?'<span class="prize-tag pt3">3등</span>':r<=10?'<span class="prize-tag pttop">TOP'+r+'</span>':'';
    return `<div class="rank-item ${r<=3?'r'+r:''}">
      <div class="rank-num">${medals[i]}</div>
      <div class="rank-avatar" style="background:${col}">${p.name.slice(0,2)}</div>
      <div class="rank-info">
        <div class="rank-name">${p.name}${pt}</div>
        <div class="rank-sub">${p.games}게임 · ${p.lastGame}</div>
        <div class="rank-bar-wrap"><div class="rank-bar" style="width:${bw}%;background:${col}"></div></div>
      </div>
      <div class="rank-score">${p.bestScore.toLocaleString()}<small>점</small></div>
    </div>`;
  }).join('');

  // Prize list
  const pl=document.getElementById('prize-list');
  const icons=['🥇','🥈','🥉','4️⃣','5️⃣','6️⃣','7️⃣','8️⃣','9️⃣','🔟'];
  pl.innerHTML=[...data.players].sort((a,b)=>b.bestScore-a.bestScore).slice(0,10).map((p,i)=>
    `<div class="prize-row"><span class="prize-medal">${icons[i]}</span><span style="flex:1;font-weight:700">${p.name}</span><span style="color:var(--gold);font-weight:700">${p.bestScore.toLocaleString()}점</span></div>`
  ).join('')||'<div style="color:var(--muted);font-size:13px;">아직 기록 없음</div>';

  // Recent
  const recentEl=document.getElementById('recent-list');
  recentEl.innerHTML=data.log.slice(0,10).map((e,i)=>`
    <div class="recent-item">
      <div><div class="ri-name">${e.name}</div><div class="ri-game">${e.game} · ${e.time||''}</div></div>
      <div class="ri-score">${e.score.toLocaleString()}점</div>
      <button class="del-btn" onclick="deleteEntry(${i})" title="삭제">✕</button>
    </div>`).join('')||'<div style="color:var(--muted);font-size:13px;text-align:center;padding:12px;">기록 없음</div>';
}

function deleteEntry(idx){
  const data=loadData();
  data.log.splice(idx,1);
  data.players=rebuildPlayers(data.log);
  saveData(data); render(data);
}

function resetAll(){
  if(!confirm('⚠️ 전체 기록을 초기화할까요?')) return;
  localStorage.removeItem(STORAGE_KEY);
  render({players:[],log:[]});
  showToast('🗑 초기화 완료');
}

function exportCSV(){
  const data=loadData();
  const rows=[['순위','이름','최고점수','총점수','게임수','마지막게임']];
  [...data.players].sort((a,b)=>b.bestScore-a.bestScore).forEach((p,i)=>rows.push([i+1,p.name,p.bestScore,p.totalScore,p.games,p.lastGame]));
  const csv=rows.map(r=>r.join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=`월드컵랭킹_${new Date().toLocaleDateString('ko-KR').replace(/\./g,'').replace(/ /g,'')}.csv`; a.click(); URL.revokeObjectURL(url);
  showToast('📥 CSV 다운로드 완료!');
}

function showToast(msg,err=false){
  const t=document.getElementById('toast'); t.textContent=msg; t.style.background=err?'#ef4444':'var(--green)';
  t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200);
}

// ── QR ───────────────────────────────────────────
function generateQR(){
  const url='https://twinwhdwk.github.io/worldcup_minigame/';
  const img=document.getElementById('qr-img');
  img.src=`https://chart.googleapis.com/chart?cht=qr&chl=${encodeURIComponent(url)}&chs=240x240&chld=L|0`;
  img.style.display='block';
}

// ── URL prefill ───────────────────────────────────
const up=new URLSearchParams(window.location.search);
const pn=up.get('prefill'), ps=up.get('score');
if(pn){ document.getElementById('player-name').value=pn; saveName(pn); }
if(ps) document.getElementById('player-score').value=ps;
const sn=getSavedName();
if(sn&&!pn) document.getElementById('player-name').value=sn;
if(ps) setTimeout(()=>document.getElementById('player-score').focus(),300);

// ── Enter key ────────────────────────────────────
document.addEventListener('keydown',e=>{ if(e.key==='Enter'){ const f=document.activeElement; if(f.id==='player-name'||f.id==='player-score') addScore(); } });

// ── Auto refresh 8s ──────────────────────────────
setInterval(()=>render(loadData()), 8000);

// ── Init ─────────────────────────────────────────
render(loadData());
generateQR();
</script>
</body>
</html>
