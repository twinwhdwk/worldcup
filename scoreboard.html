<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏆 월드컵 실시간 랭킹보드</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;700;900&display=swap');
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{--gold:#FFD700;--silver:#C0C0C0;--bronze:#CD7F32;--dark:#06060f;--card:#0f1020;--green:#00843D;--text:#f0f0f0;--muted:#444;--muted2:#777;}
    body{background:var(--dark);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;overflow-x:hidden;}

    /* ── HEADER ── */
    header{background:#08090f;border-bottom:1px solid rgba(255,255,255,.05);padding:16px 28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;position:sticky;top:0;z-index:100;}
    .hdr-title{font-family:'Black Han Sans',sans-serif;font-size:26px;display:flex;align-items:center;gap:12px;background:linear-gradient(135deg,#fff,var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .live-pill{background:#ef4444;color:#fff;font-size:10px;font-weight:700;letter-spacing:2px;padding:4px 10px;border-radius:100px;animation:pulse 1.5s infinite;-webkit-text-fill-color:#fff;}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
    .hdr-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
    .hdr-link{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:100px;padding:7px 16px;color:var(--muted2);font-size:12px;text-decoration:none;font-weight:700;transition:all .2s;cursor:pointer;white-space:nowrap;}
    .hdr-link:hover{color:var(--text);border-color:rgba(255,255,255,.2);}
    .update-time{font-size:12px;color:var(--muted2);}

    /* ── STATS ── */
    .stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:20px 28px;background:linear-gradient(180deg,rgba(0,132,61,.05),transparent);}
    .stat{background:var(--card);border:1px solid rgba(255,255,255,.05);border-radius:14px;padding:14px;text-align:center;}
    .stat-val{font-family:'Black Han Sans',sans-serif;font-size:28px;color:var(--gold);transition:color .3s;}
    .stat-val.flash{animation:statFlash .4s ease;}
    @keyframes statFlash{0%,100%{color:var(--gold)}50%{color:#fff}}
    .stat-lbl{font-size:11px;color:var(--muted2);text-transform:uppercase;letter-spacing:1px;margin-top:3px;}

    /* ── PRIZE SECTION ── */
    .prize-section{margin:0 28px 20px;background:linear-gradient(135deg,rgba(255,215,0,.07),rgba(255,215,0,.02));border:1px solid rgba(255,215,0,.2);border-radius:18px;padding:18px 22px;position:relative;overflow:hidden;}
    .prize-section::before{content:'🏆';position:absolute;right:18px;top:50%;transform:translateY(-50%);font-size:90px;opacity:.05;pointer-events:none;}
    .prize-title{font-size:11px;color:var(--gold);letter-spacing:2px;text-transform:uppercase;font-weight:700;margin-bottom:12px;}
    .prize-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:4px 24px;}
    .pe{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:13px;}
    .pe-rank{font-size:16px;width:22px;text-align:center;flex-shrink:0;}
    .pe-name{flex:1;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .pe-score{font-family:'Black Han Sans',sans-serif;font-size:17px;color:var(--gold);}

    /* ── RANK LIST ── */
    .rank-section{padding:0 28px 40px;}
    .rank-title{font-size:11px;color:var(--muted2);letter-spacing:2px;text-transform:uppercase;font-weight:700;margin-bottom:14px;}
    .rank-list{display:flex;flex-direction:column;gap:8px;}
    .rank-item{display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid rgba(255,255,255,.05);border-radius:18px;padding:16px 18px;transition:border-color .4s,background .4s,transform .4s,box-shadow .4s;}
    .rank-item.prize-winner{border-color:rgba(255,215,0,.22);background:linear-gradient(135deg,rgba(255,215,0,.04),var(--card));}
    .rank-item.r1{border-color:rgba(255,215,0,.5);background:linear-gradient(135deg,rgba(255,215,0,.10),rgba(255,215,0,.03));box-shadow:0 0 32px rgba(255,215,0,.12);padding:22px 22px;}
    .rank-item.r2{border-color:rgba(192,192,192,.4);background:linear-gradient(135deg,rgba(192,192,192,.07),rgba(192,192,192,.01));padding:19px 20px;}
    .rank-item.r3{border-color:rgba(205,127,50,.4);background:linear-gradient(135deg,rgba(205,127,50,.07),rgba(205,127,50,.01));padding:18px 19px;}
    .rank-item.new-entry{animation:slideIn .45s cubic-bezier(.34,1.56,.64,1);}
    .rank-item.score-updated{animation:scoreFlash .6s ease;}
    @keyframes slideIn{from{transform:translateX(-20px);opacity:0}to{transform:translateX(0);opacity:1}}
    @keyframes scoreFlash{0%,100%{background:var(--card)}40%{background:rgba(255,215,0,.12)}}
    .rank-num{font-family:'Black Han Sans',sans-serif;font-size:22px;width:36px;text-align:center;flex-shrink:0;}
    .r1 .rank-num{color:var(--gold);font-size:30px;}
    .r2 .rank-num{color:var(--silver);font-size:26px;}
    .r3 .rank-num{color:var(--bronze);font-size:24px;}
    .rank-avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;flex-shrink:0;color:#000;}
    .r1 .rank-avatar{width:54px;height:54px;font-size:18px;box-shadow:0 0 16px rgba(255,215,0,.35);}
    .r2 .rank-avatar{width:50px;height:50px;font-size:17px;}
    .r3 .rank-avatar{width:46px;height:46px;}
    .rank-info{flex:1;min-width:0;}
    .rank-name{font-weight:700;font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
    .r1 .rank-name{font-size:22px;}
    .r2 .rank-name{font-size:19px;}
    .r3 .rank-name{font-size:17px;}
    .rank-sub{font-size:11px;color:var(--muted2);margin-top:3px;}
    .rank-bar-wrap{width:100%;height:4px;background:rgba(255,255,255,.05);border-radius:100px;margin-top:7px;}
    .r1 .rank-bar-wrap{height:6px;}
    .rank-bar{height:100%;border-radius:100px;transition:width .8s cubic-bezier(.34,1.56,.64,1);}
    .rank-score{font-family:'Black Han Sans',sans-serif;font-size:26px;color:var(--gold);flex-shrink:0;text-align:right;}
    .r1 .rank-score{font-size:38px;}
    .r2 .rank-score{font-size:32px;}
    .r3 .rank-score{font-size:29px;}
    .rank-score small{font-size:12px;color:var(--muted2);font-family:'Noto Sans KR',sans-serif;font-weight:400;}
    .prize-tag{font-size:10px;padding:2px 8px;border-radius:100px;font-weight:700;background:rgba(255,215,0,.15);color:var(--gold);}
    .rank-delta{font-size:11px;font-weight:700;padding:2px 6px;border-radius:100px;}
    .rank-delta.up{color:#4ade80;background:rgba(74,222,128,.12);}
    .rank-delta.down{color:#f87171;background:rgba(248,113,113,.12);}
    .rank-delta.same{color:var(--muted2);}
    .rank-delta.new{color:#60a5fa;background:rgba(96,165,250,.12);}
    .streak-fire{font-size:13px;animation:fireWave .6s ease infinite alternate;}
    @keyframes fireWave{from{transform:scale(1) rotate(-5deg)}to{transform:scale(1.2) rotate(5deg)}}

    /* TV auto-scroll */
    body.tv-mode .rank-section{overflow:hidden;height:calc(100vh - 320px);position:relative;}

    /* ── EMPTY ── */
    .empty{text-align:center;padding:60px 20px;color:var(--muted2);}
    .empty-icon{font-size:60px;margin-bottom:14px;}

    /* ── SETUP BANNER ── */
    .setup-banner{background:linear-gradient(135deg,rgba(59,130,246,.12),rgba(59,130,246,.04));border:1px solid rgba(59,130,246,.2);border-radius:12px;padding:14px 20px;margin:16px 28px;display:flex;gap:14px;align-items:flex-start;}
    .setup-banner.hidden{display:none;}
    .sb-text{font-size:13px;line-height:1.6;color:var(--muted2);}
    .sb-text strong{color:#60a5fa;}

    @keyframes cFall{from{transform:translateY(0) rotate(0);opacity:1}to{transform:translateY(110vh) rotate(720deg);opacity:0}}

    /* ── GAME OVER BANNER ── */
    .game-over-banner{display:none;background:linear-gradient(135deg,rgba(255,215,0,.12),rgba(255,215,0,.03));border:2px solid rgba(255,215,0,.3);border-radius:18px;margin:0 28px 20px;padding:24px;text-align:center;position:relative;overflow:hidden;}
    .game-over-banner.show{display:block;animation:goBannerIn .6s cubic-bezier(.34,1.56,.64,1);}
    @keyframes goBannerIn{from{transform:scale(.9) translateY(-20px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
    .game-over-banner::before{content:'🏆';position:absolute;font-size:120px;opacity:.04;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;}
    .go-title{font-family:'Black Han Sans',sans-serif;font-size:36px;background:linear-gradient(135deg,#fff,var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px;}
    .go-sub{font-size:14px;color:var(--muted2);}
    .go-winner{display:flex;align-items:center;gap:12px;background:rgba(255,215,0,.08);border:1px solid rgba(255,215,0,.2);border-radius:14px;padding:14px 20px;margin-top:16px;justify-content:center;}
    .go-crown{font-size:40px;}
    .go-winner-name{font-family:'Black Han Sans',sans-serif;font-size:28px;color:var(--gold);}
    .go-winner-score{font-size:14px;color:var(--muted2);margin-top:2px;}
    /* ── TV MODE ── */
    body.tv-mode .stats-row{display:none;}
    body.tv-mode .prize-section{display:none;}
    body.tv-mode .rank-section{padding:0 20px 20px;}
    body.tv-mode .rank-item{padding:12px 16px;}
    body.tv-mode .r1{padding:20px 18px!important;}
    body.tv-mode .r2{padding:16px 18px!important;}
    body.tv-mode .r3{padding:14px 18px!important;}
    body.tv-mode .rank-name{font-size:20px!important;}
    body.tv-mode .r1 .rank-name{font-size:28px!important;}
    body.tv-mode .rank-score{font-size:32px!important;}
    body.tv-mode .r1 .rank-score{font-size:46px!important;}
    body.tv-mode .r1 .rank-avatar{width:64px!important;height:64px!important;font-size:22px!important;}
    body.tv-mode header{padding:10px 20px;}
    .tv-btn{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:100px;padding:7px 16px;color:var(--muted2);font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap;}
    .tv-btn:hover,.tv-btn.active{color:#fff;border-color:var(--gold);background:rgba(255,215,0,.08);}

    @media(max-width:640px){
      header{padding:14px 16px;}
      .stats-row{grid-template-columns:1fr 1fr;padding:16px;}
      .prize-section{margin:0 16px 16px;}
      .rank-section{padding:0 16px 32px;}
      .prize-grid{grid-template-columns:1fr;}
    }
  </style>
</head>
<body>

<header>
  <div class="hdr-title">🏆 실시간 랭킹보드 <span class="live-pill">LIVE</span></div>
  <div class="hdr-right">
    <div class="update-time" id="upd-time">—</div>
    <a href="index.html" class="hdr-link">🎮 게임 허브</a>
    <button class="tv-btn" id="tv-mode-btn" onclick="toggleTvMode()">🖥️ TV 모드</button>
    <span class="hdr-link" onclick="exportCSV()">📥 CSV 내보내기</span>
  </div>
</header>

<div class="setup-banner hidden" id="setup-banner">
  <div class="sb-text">
    <strong>Firebase 미연결</strong> — 운영자가 공유한 QR 코드 URL로 접속하거나, operator.html에서 Firebase URL을 설정하세요.
  </div>
</div>

<!-- Game Over Banner (shown when session state = done) -->
<div class="game-over-banner" id="go-banner">
  <div class="go-title">🏆 최종 결과 발표!</div>
  <div class="go-sub">모든 게임이 종료되었습니다. 최종 순위를 확인하세요!</div>
  <div class="go-winner" id="go-winner" style="display:none">
    <div class="go-crown">👑</div>
    <div>
      <div class="go-winner-name" id="go-winner-name">—</div>
      <div class="go-winner-score" id="go-winner-score"></div>
    </div>
  </div>
</div>

<!-- Stats -->
<div class="stats-row">
  <div class="stat"><div class="stat-val" id="s-players">0</div><div class="stat-lbl">👥 참가자</div></div>
  <div class="stat"><div class="stat-val" id="s-correct">0</div><div class="stat-lbl">✅ 총 정답</div></div>
  <div class="stat"><div class="stat-val" id="s-top">0</div><div class="stat-lbl">🏆 최고점</div></div>
  <div class="stat"><div class="stat-val" id="s-avg">0</div><div class="stat-lbl">📊 평균점</div></div>
</div>

<!-- Prize Top 10 -->
<div class="prize-section">
  <div class="prize-title">🎁 상품 수여 대상 — TOP 10 이내 시 상품!</div>
  <div class="prize-grid" id="prize-grid">
    <div style="color:var(--muted2);font-size:13px;grid-column:1/-1;">아직 기록 없음</div>
  </div>
</div>

<!-- Full Ranking -->
<div class="rank-section">
  <div class="rank-title">📋 전체 순위</div>
  <div class="rank-list" id="rank-list">
    <div class="empty">
      <div class="empty-icon">⚽</div>
      <div>아직 기록이 없어요</div>
      <div style="font-size:13px;margin-top:6px;">게임이 시작되면 여기서 실시간으로 순위가 업데이트됩니다</div>
    </div>
  </div>
</div>

<script>
// ── Firebase URL (from ?db= param OR localStorage) ─────────────────
const FIREBASE_URL = (()=>{
  const p = new URLSearchParams(location.search).get('db');
  if(p){try{const u=atob(p);localStorage.setItem('wc_fb_url',u);return u;}catch{}}
  return localStorage.getItem('wc_fb_url')||'';
})();

const FB = FIREBASE_URL + '/wc_live';
const USE_FB = FIREBASE_URL.startsWith('https://');
const AVATAR_COLORS = ['#ef4444','#f97316','#eab308','#22c55e','#06b6d4','#3b82f6','#a855f7','#ec4899','#14b8a6','#f43f5e'];
const PRIZE_COUNT = 10;
const MEDALS = ['🥇','🥈','🥉','4','5','6','7','8','9','10'];

if(!USE_FB) document.getElementById('setup-banner').classList.remove('hidden');

let allScores = {};
let prevRankMap = {};    // name → rank number
let prevScoreMap = {};   // name → score
let scoreEls = {};       // name → score DOM element (for animated counter)
let isFirstRender = true;
let prevTop1 = null;

// ── Animated counter ───────────────────────────────────────────────
function countUp(el, from, to, duration=700){
  const start = Date.now();
  const range = to - from;
  if(range === 0){el.textContent = to.toLocaleString();return;}
  const update = ()=>{
    const elapsed = Date.now() - start;
    const progress = Math.min(elapsed / duration, 1);
    const eased = 1 - Math.pow(1 - progress, 3); // ease-out cubic
    el.textContent = Math.round(from + range * eased).toLocaleString();
    if(progress < 1) requestAnimationFrame(update);
  };
  requestAnimationFrame(update);
}

// ── Firebase SSE ───────────────────────────────────────────────────
function startStream(){
  const es = new EventSource(FB+'/scores.json');
  es.addEventListener('put', e=>{
    allScores = JSON.parse(e.data).data || {};
    render();
  });
  es.addEventListener('patch', e=>{
    const incoming = JSON.parse(e.data).data || {};
    Object.assign(allScores, incoming);
    render();
  });
  es.onerror = ()=> setTimeout(startStream, 3000);
}

// ── Render ─────────────────────────────────────────────────────────
function render(){
  const players = Object.values(allScores).filter(p=>p&&p.name);
  const sorted = [...players].sort((a,b)=>b.total-a.total);
  const maxScore = sorted[0]?.total || 1;
  const prizeSet = new Set(sorted.slice(0,PRIZE_COUNT).map(p=>p.name));

  // ── Stats (animated) ──
  const scores = players.map(p=>p.total||0);
  const top = scores.length ? Math.max(...scores) : 0;
  const avg = scores.length ? Math.round(scores.reduce((a,b)=>a+b,0)/scores.length) : 0;
  const totalCorrect = players.reduce((a,p)=>(p.correct||0)+a, 0);
  const fmt = n => n>=1000 ? (n/1000).toFixed(1)+'k' : n;

  setStatAnimated('s-players', players.length);
  setStatAnimated('s-correct', totalCorrect);
  setStatAnimated('s-top', top);
  setStatAnimated('s-avg', avg);
  document.getElementById('upd-time').textContent = new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});

  // ── Prize grid ──
  const prizeIcons = ['🥇','🥈','🥉','4️⃣','5️⃣','6️⃣','7️⃣','8️⃣','9️⃣','🔟'];
  const pg = document.getElementById('prize-grid');
  pg.innerHTML = sorted.slice(0,PRIZE_COUNT).map((p,i)=>`
    <div class="pe">
      <span class="pe-rank">${prizeIcons[i]}</span>
      <span class="pe-name">${p.name}</span>
      <span class="pe-score">${(p.total||0).toLocaleString()}</span>
    </div>`).join('') || '<div style="color:var(--muted2);font-size:13px;grid-column:1/-1;">아직 기록 없음</div>';

  // ── Check new #1 ──
  if(sorted.length>0 && sorted[0].name !== prevTop1 && !isFirstRender){
    prevTop1 = sorted[0].name;
    confetti(60);
  }

  // ── Build new rank list ──
  const rl = document.getElementById('rank-list');
  if(!sorted.length){
    rl.innerHTML='<div class="empty"><div class="empty-icon">⚽</div><div>아직 기록이 없어요</div></div>';
    prevRankMap={};prevScoreMap={};scoreEls={};isFirstRender=true;
    return;
  }

  // Build map of existing elements for score animation
  const existingEls = {};
  rl.querySelectorAll('.rank-item[data-name]').forEach(el=>{
    existingEls[el.dataset.name] = el;
  });

  rl.innerHTML = sorted.map((p,i)=>{
    const r = i+1;
    const col = AVATAR_COLORS[i % AVATAR_COLORS.length];
    const bw = Math.round((p.total||0) / maxScore * 100);
    const prize = prizeSet.has(p.name);
    const prevRank = prevRankMap[p.name];
    const prevScore = prevScoreMap[p.name];
    const isNew = prevRank === undefined;
    const scoreChanged = prevScore !== undefined && prevScore !== p.total;

    // Rank delta badge
    let deltaHtml = '';
    if(isNew && !isFirstRender){
      deltaHtml = '<span class="rank-delta new">NEW</span>';
    } else if(!isNew && !isFirstRender){
      const delta = prevRank - r;
      if(delta > 0)      deltaHtml = `<span class="rank-delta up">▲${delta}</span>`;
      else if(delta < 0) deltaHtml = `<span class="rank-delta down">▼${Math.abs(delta)}</span>`;
    }

    const prizeTag = prize ? '<span class="prize-tag">🎁 상품</span>' : '';
    const streakFire = (p.streak||0)>=3 ? `<span class="streak-fire" title="${p.streak}연속 정답!">${'🔥'.repeat(Math.min(p.streak,3))}</span>` : '';
    const entryClass = [
      'rank-item',
      prize ? 'prize-winner' : '',
      r<=3 ? 'r'+r : '',
      isNew && !isFirstRender ? 'new-entry' : '',
      scoreChanged && !isFirstRender ? 'score-updated' : ''
    ].filter(Boolean).join(' ');

    return `<div class="${entryClass}" data-name="${p.name}">
      <div class="rank-num">${MEDALS[i]||r}</div>
      <div class="rank-avatar" style="background:${col}">${p.name.slice(0,2)}</div>
      <div class="rank-info">
        <div class="rank-name">${p.name} ${deltaHtml} ${prizeTag} ${streakFire}</div>
        <div class="rank-sub">정답 ${p.correct||0}개 · 연속 ${p.streak||0}회</div>
        <div class="rank-bar-wrap"><div class="rank-bar" style="width:${bw}%;background:${col}"></div></div>
      </div>
      <div class="rank-score" data-score="${p.total||0}" data-prev="${prevScore||0}">
        <span class="score-num">${(p.total||0).toLocaleString()}</span><small>점</small>
      </div>
    </div>`;
  }).join('');

  // ── Animate score counters for updated scores ──
  if(!isFirstRender){
    rl.querySelectorAll('.rank-score[data-prev]').forEach(el=>{
      const prev = parseInt(el.dataset.prev)||0;
      const curr = parseInt(el.dataset.score)||0;
      if(prev !== curr){
        const numEl = el.querySelector('.score-num');
        countUp(numEl, prev, curr, 600);
      }
    });
  }

  // ── Update tracking maps ──
  prevRankMap = Object.fromEntries(sorted.map((p,i)=>[p.name, i+1]));
  prevScoreMap = Object.fromEntries(sorted.map(p=>[p.name, p.total||0]));
  isFirstRender = false;

  // Prize confetti on first load if there are winners
  if(sorted.length >= PRIZE_COUNT){
    // only on first render
  }
}

// ── Animated stat helper ───────────────────────────────────────────
const statPrev = {};
function setStatAnimated(id, value){
  const el = document.getElementById(id);
  const prev = statPrev[id];
  if(prev !== undefined && prev !== value){
    const numEl = el;
    countUp(numEl, prev, value, 500);
    el.classList.remove('flash');
    void el.offsetWidth;
    el.classList.add('flash');
    el.addEventListener('animationend', ()=>el.classList.remove('flash'), {once:true});
  } else {
    el.textContent = value >= 1000 ? (value/1000).toFixed(1)+'k' : value;
  }
  statPrev[id] = value;
}

// ── TV Mode + auto-scroll ─────────────────────────────────────────
let tvMode = false;
let tvScrollRaf = null;
let tvScrollDir = 1;
let tvScrollPause = 0;

function tvAutoScroll(){
  const rs = document.querySelector('.rank-section');
  if(!rs || !tvMode){tvScrollRaf=null;return;}
  const max = rs.scrollHeight - rs.clientHeight;
  if(max <= 0){tvScrollRaf=requestAnimationFrame(tvAutoScroll);return;}
  if(tvScrollPause > 0){tvScrollPause--;tvScrollRaf=requestAnimationFrame(tvAutoScroll);return;}
  if(rs.scrollTop >= max-2){tvScrollDir=-1;tvScrollPause=120;}
  else if(rs.scrollTop <= 2){tvScrollDir=1;tvScrollPause=90;}
  rs.scrollBy(0, tvScrollDir * 0.7);
  tvScrollRaf = requestAnimationFrame(tvAutoScroll);
}

function toggleTvMode(){
  tvMode = !tvMode;
  document.body.classList.toggle('tv-mode', tvMode);
  const btn = document.getElementById('tv-mode-btn');
  btn.classList.toggle('active', tvMode);
  btn.textContent = tvMode ? '🖥️ TV 모드 켜짐' : '🖥️ TV 모드';
  if(tvMode){tvScrollDir=1;tvScrollPause=60;if(!tvScrollRaf)tvAutoScroll();}
  else{if(tvScrollRaf){cancelAnimationFrame(tvScrollRaf);tvScrollRaf=null;}document.querySelector('.rank-section')?.scrollTo(0,0);}
}

// ── Export CSV ─────────────────────────────────────────────────────
function exportCSV(){
  const sorted = Object.values(allScores).filter(p=>p&&p.name).sort((a,b)=>b.total-a.total);
  const rows = [['순위','이름','점수','정답수','연속정답']];
  sorted.forEach((p,i)=>rows.push([i+1, p.name, p.total||0, p.correct||0, p.streak||0]));
  const csv = rows.map(r=>r.join(',')).join('\n');
  const blob = new Blob(['﻿'+csv], {type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download=`월드컵랭킹_${new Date().toLocaleDateString('ko-KR').replace(/[\.\s]/g,'')}.csv`;
  a.click(); URL.revokeObjectURL(url);
}

// ── Confetti ───────────────────────────────────────────────────────
function confetti(count=50){
  const colors=['#FFD700','#00843D','#ef4444','#3b82f6','#a855f7'];
  for(let i=0;i<count;i++){
    const el=document.createElement('div');
    el.style.cssText=`position:fixed;width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;background:${colors[~~(Math.random()*colors.length)]};border-radius:${Math.random()>.5?'50%':'2px'};left:${Math.random()*100}%;top:-10px;pointer-events:none;z-index:9999;animation:cFall ${1.5+Math.random()*2}s linear ${Math.random()*.6}s forwards;`;
    document.body.appendChild(el);
    el.addEventListener('animationend',()=>el.remove());
  }
}

// ── Handle ?prefill (localStorage fallback score submission) ───────
(()=>{
  const up=new URLSearchParams(location.search);
  const pName=up.get('prefill'),pScore=parseInt(up.get('score')||'0');
  if(!USE_FB&&pName&&pScore>0){
    try{
      const SK='wc_scoreboard_v1';
      const d=JSON.parse(localStorage.getItem(SK)||'{"players":[],"log":[]}');
      if(!d.log)d.log=[];
      const now=new Date().toLocaleDateString('ko-KR',{month:'short',day:'numeric'});
      d.log.push({name:pName,score:pScore,game:'개인게임',date:now});
      const p=d.players.find(p=>p.name===pName);
      if(p){p.bestScore=Math.max(p.bestScore,pScore);p.games++;p.lastGame='개인게임';}
      else d.players.push({name:pName,bestScore:pScore,games:1,lastGame:'개인게임'});
      localStorage.setItem(SK,JSON.stringify(d));
    }catch(e){}
  }
})();

// ── Session state listener (shows game-over banner) ────────────────
let gameOverShown = false;
function listenSession(){
  if(!USE_FB)return;
  const es=new EventSource(FB+'/session.json');
  es.addEventListener('put',e=>{const d=JSON.parse(e.data).data;onSession(d);});
  es.addEventListener('patch',e=>{const d=JSON.parse(e.data).data;onSession(d);});
}
function onSession(s){
  if(!s)return;
  if(s.state==='done'&&!gameOverShown){
    gameOverShown=true;
    const banner=document.getElementById('go-banner');
    banner.classList.add('show');
    const sorted=Object.values(allScores).filter(p=>p&&p.name).sort((a,b)=>b.total-a.total);
    if(sorted.length>0){
      document.getElementById('go-winner').style.display='flex';
      document.getElementById('go-winner-name').textContent=sorted[0].name;
      document.getElementById('go-winner-score').textContent=(sorted[0].total||0).toLocaleString()+'점 · 최종 1위!';
    }
    setTimeout(()=>confetti(100),400);
    setTimeout(()=>confetti(80),1200);
  } else if(s.state!=='done'){
    gameOverShown=false;
    document.getElementById('go-banner').classList.remove('show');
  }
}

// ── Init ───────────────────────────────────────────────────────────
if(USE_FB){
  startStream();
  listenSession();
} else {
  const load=()=>{
    const data=JSON.parse(localStorage.getItem('wc_scoreboard_v1')||'{"players":[]}');
    allScores={};
    (data.players||[]).forEach(p=>{allScores[p.name]={name:p.name,total:p.bestScore||0,correct:p.games||0,streak:0};});
    render();
  };
  load();
  setInterval(load,3000);
}
