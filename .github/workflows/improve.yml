name: 🏆 게임 자동 개선 루프

on:
  schedule:
    - cron: '*/5 * * * *'    # 5분마다 (GitHub Actions 최소 간격)
  workflow_dispatch:           # 수동 실행도 가능

permissions:
  contents: write

jobs:
  improve:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 체크아웃
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🔄 사이클 파일 읽기
        id: cycle
        run: |
          if [ -f .cycle ]; then
            CYCLE=$(cat .cycle)
          else
            CYCLE=1
          fi
          echo "current=$CYCLE" >> $GITHUB_OUTPUT
          echo "현재 사이클: $CYCLE"

      - name: 🎮 게임 개선 실행
        run: |
          CYCLE=${{ steps.cycle.outputs.current }}
          echo "사이클 $CYCLE 실행 중..."
          case $CYCLE in
            1) python3 improve_cycle1.py ;;
            2) python3 improve_cycle2.py ;;
            3) python3 improve_cycle3.py ;;
            4) python3 improve_cycle4.py ;;
            5) python3 improve_cycle5.py ;;
            6) python3 improve_cycle6.py ;;
            7) python3 improve_cycle7.py ;;
            8) python3 improve_cycle8.py ;;
            9) python3 improve_cycle9.py ;;
            10) python3 improve_cycle10.py ;;
            *) echo "모든 사이클 완료 - 유지보수 모드"; CYCLE=0 ;;
          esac

      - name: 📝 사이클 번호 업데이트
        run: |
          CYCLE=${{ steps.cycle.outputs.current }}
          NEXT=$((CYCLE + 1))
          if [ $NEXT -gt 10 ]; then NEXT=1; fi
          echo $NEXT > .cycle

      - name: 📤 커밋 & 푸시
        run: |
          git config user.name "worldcup-bot"
          git config user.email "bot@worldcup-minigame.io"
          git add -A
          if git diff --cached --quiet; then
            echo "변경 없음"
          else
            CYCLE=${{ steps.cycle.outputs.current }}
            LABELS=("사운드효과" "선수40명확장" "우승국타이머" "페널티킥AI" "유니폼팀확장" "리더보드" "애니메이션강화" "모바일최적화" "난이도조절" "UX개선")
            IDX=$((CYCLE - 1))
            LABEL="${LABELS[$IDX]}"
            git commit -m "🤖 자동개선 사이클${CYCLE}: ${LABEL} [$(date '+%m/%d %H:%M')]"
            git push
          fi
