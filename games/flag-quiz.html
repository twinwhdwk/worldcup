<script>
async function fbAutoSubmit(s,gameName){
  const nm=localStorage.getItem('wc_player_name')||'';if(!nm)return;
  const fbUrl=localStorage.getItem('wc_fb_url')||'https://worldcup-minigame-default-rtdb.firebaseio.com';if(!fbUrl.startsWith('https://'))return;
  try{const enc=n=>n.replace(/[.#$[\]]/g,'_'),FB=fbUrl+'/wc_live',en=enc(nm);
    const cur=await fetch(FB+'/scores/'+en+'.json').then(r=>r.json())||{};
    await fetch(FB+'/scores/'+en+'.json',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:nm,total:(cur.total||0)+s,correct:(cur.correct||0)+1,streak:cur.streak||0,lastGame:gameName})});
  }catch(e){}
}
function gos(s){
  const fbUrl=localStorage.getItem('wc_fb_url')||'https://worldcup-minigame-default-rtdb.firebaseio.com';
  if(fbUrl.startsWith('https://'))location.href='../scoreboard.html?db='+btoa(fbUrl);
  else{const n=localStorage.getItem('wc_player_name')||'';location.href='../scoreboard.html'+(n?`?prefill=${encodeURIComponent(n)}&score=${s}`:'');}
}

const AC=window.AudioContext||window.webkitAudioContext;let _ac=null;
function ctx(){if(!_ac)_ac=new AC();if(_ac.state==='suspended')_ac.resume();return _ac;}
function tone(f,t,d,v=.3){try{const c=ctx(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);o.start();o.stop(c.currentTime+d);}catch(e){}}
function sfxOk(){tone(523,'sine',.1,.35);setTimeout(()=>tone(659,'sine',.1,.35),70);setTimeout(()=>tone(784,'sine',.15,.35),140);}
function sfxBad(){tone(220,'sawtooth',.2,.25);setTimeout(()=>tone(180,'sawtooth',.15,.2),110);}
function confetti(x,y,n=12){const cs=['#FFD700','#06b6d4','#ef4444','#22c55e','#fff'];for(let i=0;i<n;i++){const el=document.createElement('div');el.style.cssText=`position:fixed;width:${5+Math.random()*7}px;height:${5+Math.random()*7}px;background:${cs[~~(Math.random()*cs.length)]};border-radius:${Math.random()>.5?'50%':'2px'};left:${x}px;top:${y}px;pointer-events:none;z-index:9998;`;document.body.appendChild(el);const a=Math.random()*360*Math.PI/180,sp=60+Math.random()*110;let px=x,py=y,vy=Math.sin(a)*sp-50,vx=Math.cos(a)*sp,t=0;const f=()=>{t+=.016;px+=vx*.016;vy+=200*.016;py+=vy*.016;el.style.left=px+'px';el.style.top=py+'px';el.style.opacity=Math.max(0,1-t*1.5);el.style.transform=`rotate(${t*200}deg)`;if(t<.8)requestAnimationFrame(f);else el.remove();};requestAnimationFrame(f);}}
function bigC(){for(let i=0;i<5;i++)setTimeout(()=>confetti(Math.random()*innerWidth,-10,10),i*120);}

const TOTAL_TIME=45;
let score=0,timeLeft=TOTAL_TIME,streak=0,bestStreak=0,totalQ=0,correctQ=0;
let timerInterval,qTimer,qTimeLeft,current=null,answered=false,usedIdx=[],qNum=0;

function shuffle(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=~~(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}

function getFlag(){
  if(usedIdx.length===FLAGS.length)usedIdx=[];
  const avail=FLAGS.map((_,i)=>i).filter(i=>!usedIdx.includes(i));
  const idx=avail[~~(Math.random()*avail.length)];
  usedIdx.push(idx);return FLAGS[idx];
}

let qStartTime=0;
function startQTimer(){
  clearInterval(qTimer);qTimeLeft=8;

  bar.style.width='100%';bar.style.background='var(--teal)';
  bar.style.transition='width .2s linear';
  qTimer=setInterval(()=>{
    qTimeLeft-=.2;
    bar.style.width=Math.max(0,qTimeLeft/8*100)+'%';
    if(qTimeLeft<=3)bar.style.background='#ef4444';
    if(qTimeLeft<=0)clearInterval(qTimer);
  },200);
}

function setQuestion(){
  if(timeLeft<=0)return;
  answered=false;qStartTime=Date.now();qNum++;
  current=getFlag();totalQ++;
  const flagEl=document.getElementById('big-flag');
  flagEl.textContent=current.flag;
  if(typeof twemoji!=='undefined')twemoji.parse(flagEl);
  document.getElementById('q-num').textContent=`문제 ${qNum}`;
  document.getElementById('feedback').textContent='';
  document.getElementById('feedback').className='feedback';
  startQTimer();

  const wrongs=shuffle(current.decoy).slice(0,3);
  const opts=shuffle([current.name,...wrongs]);
  document.getElementById('options').innerHTML=opts.map(o=>`
    <button class="opt-btn" onclick="answer(this,'${o.replace(/'/g,"\\'")}')">
      ${o}
    </button>`).join('');
}

function answer(btn,sel){
  if(answered||timeLeft<=0)return;
  answered=true;
  clearInterval(qTimer);
  document.querySelectorAll('.opt-btn').forEach(b=>b.disabled=true);
  const elapsed=(Date.now()-qStartTime)/1000;
  const fb=document.getElementById('feedback');
  if(sel===current.name){
    streak++;if(streak>bestStreak)bestStreak=streak;
    const comboMult=streak>=8?4:streak>=5?3:streak>=3?2:1;
    const speedBonus=elapsed<2?60:elapsed<4?30:0;
    const pts=100*comboMult+speedBonus;
    score+=pts;correctQ++;
    sfxOk();bigC();
    btn.classList.add('correct');
    fb.className='feedback correct';
    const badges=[];
    if(speedBonus>0)badges.push(`⚡+${speedBonus}`);
    if(comboMult>1)badges.push(`x${comboMult}`);
    fb.textContent=`✅ +${pts}점 ${badges.join(' ')}`;
    const cb=document.getElementById('combo-bar');
    cb.style.color=comboMult>=4?'#FFD700':comboMult>=3?'#a855f7':comboMult>=2?'#ef4444':'#aaa';
    cb.textContent=comboMult>=4?'🌟 GOD MODE':comboMult>=3?'⚡ TRIPLE':comboMult>=2?'💥 DOUBLE':'';
  }else{
    streak=0;sfxBad();
    btn.classList.add('wrong');
    document.querySelectorAll('.opt-btn').forEach(b=>{if(b.textContent.trim()===current.name)b.classList.add('correct');});
    fb.className='feedback wrong';
    fb.textContent=`❌ 정답: ${current.flag} ${current.name}`;
    if(typeof twemoji!=='undefined')twemoji.parse(fb);
    document.getElementById('combo-bar').textContent='';
  }
  document.getElementById('score-val').textContent=score;
  document.getElementById('streak-val').textContent=streak;
  setTimeout(setQuestion,800);
}

function startGame(){
  score=0;timeLeft=TOTAL_TIME;streak=0;bestStreak=0;totalQ=0;correctQ=0;usedIdx=[];qNum=0;
  document.getElementById('game-area').style.display='flex';
  document.getElementById('result-screen').classList.remove('show');
  document.getElementById('score-val').textContent=0;
  document.getElementById('streak-val').textContent=0;
  document.getElementById('timer-val').textContent=TOTAL_TIME;
  document.getElementById('combo-bar').textContent='';
  const bar=document.getElementById('tbar');
  bar.style.width='100%';bar.style.background='var(--teal)';
  setQuestion();
  clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    timeLeft--;
    document.getElementById('timer-val').textContent=timeLeft;
    bar.style.width=(timeLeft/TOTAL_TIME*100)+'%';
    if(timeLeft<=10)bar.style.background='#ef4444';
    else if(timeLeft<=20)bar.style.background='#f59e0b';
    if(timeLeft<=0){clearInterval(timerInterval);clearInterval(qTimer);showResult();}
  },1000);
}

function showResult(){
  fbAutoSubmit(score,'이 국기 어느 나라?');
  document.getElementById('game-area').style.display='none';
  document.getElementById('result-screen').classList.add('show');
  const acc=totalQ>0?Math.round(correctQ/totalQ*100):0;
  const G=[
    {min:1800,g:'S',c:'#FFD700',t:'🌟 국기 마스터!',   em:'🏆'},
    {min:1000,g:'A',c:'#22c55e',t:'🥇 국기 박사!',     em:'🥇'},
    {min:600, g:'B',c:'#3b82f6',t:'🥈 잘 했어요!',     em:'🥈'},
    {min:300, g:'C',c:'#f59e0b',t:'🥉 나쁘지 않아요!', em:'😅'},
    {min:0,   g:'D',c:'#ef4444',t:'📖 더 공부해봐요!', em:'😭'},
  ];
  const gr=G.find(g=>score>=g.min)||G[G.length-1];
  document.getElementById('res-emoji').textContent=gr.em;
  document.getElementById('res-grade').innerHTML=`<span style="color:${gr.c}">GRADE ${gr.g}</span>`;
  document.getElementById('res-title').textContent=gr.t;
  document.getElementById('res-score').textContent=score.toLocaleString()+'점';
  document.getElementById('res-msg').textContent=`정확도 ${acc}% · 최고 ${bestStreak}연속`;
  document.getElementById('sc').textContent=correctQ;
  document.getElementById('st').textContent=totalQ;
  document.getElementById('sb').textContent=bestStreak;
  document.getElementById('sa').textContent=acc+'%';
}

setTimeout(()=>{const s=document.getElementById('splash');s.classList.add('out');setTimeout(()=>s.remove(),400);},900);
if(localStorage.getItem('wc_player_name'))startGame();

function shareResult(s, gameName) {
  const grades = [[1400,'S'],[1000,'A'],[600,'B'],[300,'C'],[0,'D']];
  const grade = grades.find(g => s >= g[0])?.[1] || 'D';
  const text = `⚽ 월드컵 미니게임 — ${gameName}\nGRADE ${grade} · ${s.toLocaleString()}점\nhttps://twinwhdwk.github.io/worldcup_minigame/`;
  if (navigator.share) {
    navigator.share({ title: '월드컵 미니게임 결과', text }).catch(() => {});
  } else {
    navigator.clipboard.writeText(text).then(() => alert('결과가 클립보드에 복사됐어요!')).catch(() => {});
  }
}

  <button onclick="document.getElementById('name-overlay').style.display='none'" style="background:none;border:none;color:#555;font-size:12px;cursor:pointer;margin-top:14px;font-family:'Noto Sans KR',sans-serif;">건너뛰기 (랭킹 미등록)</button>
</div>
<script>
(function(){
  if(!localStorage.getItem('wc_player_name')){
    var o=document.getElementById('name-overlay');o.style.display='flex';
    document.getElementById('no-input').addEventListener('keydown',function(e){if(e.key==='Enter')saveNameOverlay();});
  }
})();
function saveNameOverlay(){
  var n=document.getElementById('no-input').value.trim();
  if(!n){document.getElementById('no-input').focus();return;}
  localStorage.setItem('wc_player_name',n);
  document.getElementById('name-overlay').style.display='none';if(typeof startGame==='function')startGame();}
</script>
