<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>👕 이 유니폼 어느 팀?</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;700&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --purple:#a855f7; --dark:#080810; --card:#10111e; --text:#f0f0f0; --muted:#555; --muted2:#888; --correct:#22c55e; --wrong:#ef4444; }
    body { background:var(--dark); color:var(--text); font-family:'Noto Sans KR',sans-serif; min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:16px 16px 80px; }

    .splash{position:fixed;inset:0;background:var(--dark);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity 0.4s;}
    .splash.out{opacity:0;pointer-events:none;}
    .splash-ball{font-size:64px;animation:bounce 0.6s ease infinite alternate;}
    @keyframes bounce{to{transform:translateY(-20px) rotate(20deg);}}
    .splash-bar-wrap{width:200px;height:4px;background:rgba(255,255,255,0.08);border-radius:100px;margin-top:24px;overflow:hidden;}
    .splash-bar{height:100%;background:var(--purple);border-radius:100px;animation:loadBar 0.8s ease forwards;}
    @keyframes loadBar{from{width:0%}to{width:100%}}

    .back{align-self:flex-start;color:var(--muted);text-decoration:none;font-size:13px;margin-bottom:16px;}
    h1{font-family:'Black Han Sans',sans-serif;font-size:clamp(26px,5vw,44px);text-align:center;margin-bottom:6px;background:linear-gradient(135deg,#fff,var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .subtitle{color:var(--muted2);font-size:13px;text-align:center;margin-bottom:20px;}

    /* HUD */
    .hud{display:flex;gap:10px;margin-bottom:12px;width:100%;max-width:580px;}
    .hud-box{flex:1;background:var(--card);border:1px solid rgba(255,255,255,0.06);border-radius:14px;padding:11px 8px;text-align:center;}
    .hud-label{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;}
    .hud-value{font-family:'Black Han Sans',sans-serif;font-size:26px;margin-top:2px;}
    #timer-val{color:var(--purple);}#score-val{color:#FFD700;}#q-val{color:#aaa;}

    /* Timer bar */
    .timer-bar-wrap{width:100%;max-width:580px;height:5px;background:rgba(255,255,255,0.05);border-radius:100px;margin-bottom:12px;overflow:hidden;}
    #timer-bar{height:100%;background:var(--purple);border-radius:100px;transition:width 1s linear;}

    /* Streak */
    .streak-bar{text-align:center;font-size:14px;color:#f97316;min-height:22px;margin-bottom:6px;font-weight:700;}

    /* Jersey card */
    .jersey-card{background:var(--card);border:1px solid rgba(168,85,247,0.15);border-radius:24px;padding:28px 20px;width:100%;max-width:580px;text-align:center;margin-bottom:14px;}

    /* Jersey display */
    .jersey-display{display:flex;justify-content:center;align-items:flex-end;gap:32px;margin-bottom:16px;}
    .jersey-wrap{display:flex;flex-direction:column;align-items:center;gap:6px;}
    .jersey-wrap svg{width:clamp(100px,18vw,150px);height:auto;filter:drop-shadow(0 6px 20px rgba(0,0,0,0.5));transition:transform 0.3s;}
    .jersey-wrap:hover svg{transform:scale(1.06);}
    .jersey-label-txt{font-size:11px;color:var(--muted);letter-spacing:1px;}

    /* Toggle */
    .toggle-wrap{margin-bottom:14px;}
    .toggle-btn{background:rgba(168,85,247,0.12);border:1px solid rgba(168,85,247,0.25);color:var(--purple);border-radius:100px;padding:7px 18px;font-size:12px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all 0.2s;-webkit-tap-highlight-color:transparent;}
    .toggle-btn:hover{background:rgba(168,85,247,0.2);}

    /* Clues */
    .clues{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin-bottom:10px;}
    .clue-chip{background:rgba(168,85,247,0.1);border:1px solid rgba(168,85,247,0.2);color:var(--purple);font-size:12px;padding:5px 12px;border-radius:100px;}

    /* Auto hint */
    .auto-hint{font-size:13px;color:#f97316;min-height:18px;margin-bottom:6px;}

    .feedback{font-size:19px;font-weight:700;min-height:26px;}
    .feedback.correct{color:var(--correct);}
    .feedback.wrong{color:var(--wrong);}

    /* Options */
    .options{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:580px;}
    .opt-btn{background:var(--card);border:2px solid rgba(255,255,255,0.07);border-radius:14px;padding:14px 10px;font-size:15px;font-weight:700;color:var(--text);cursor:pointer;transition:all 0.15s;font-family:'Noto Sans KR',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px;min-height:58px;-webkit-tap-highlight-color:transparent;}
    .opt-btn .flag{font-size:22px;}
    .opt-btn:hover:not(:disabled){border-color:var(--purple);background:rgba(168,85,247,0.1);transform:scale(1.02);}
    .opt-btn.correct{border-color:var(--correct);background:rgba(34,197,94,0.15);color:var(--correct);}
    .opt-btn.wrong{border-color:var(--wrong);background:rgba(239,68,68,0.15);color:var(--wrong);}
    .opt-btn:disabled{cursor:not-allowed;}

    /* Result */
    .result-screen{display:none;flex-direction:column;align-items:center;text-align:center;width:100%;max-width:580px;}
    .result-screen.show{display:flex;}
    .result-trophy{font-size:80px;margin-bottom:12px;}
    .result-grade{font-family:'Black Han Sans',sans-serif;font-size:52px;margin-bottom:4px;}
    .result-title{font-family:'Black Han Sans',sans-serif;font-size:30px;margin-bottom:6px;}
    .result-score{font-size:52px;font-family:'Black Han Sans',sans-serif;color:#FFD700;margin:8px 0;}
    .result-msg{color:var(--muted2);font-size:14px;margin-bottom:18px;}
    .result-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:22px;width:100%;}
    .stat-box{background:var(--card);border:1px solid rgba(255,255,255,0.06);border-radius:14px;padding:14px;text-align:center;}
    .stat-val{font-family:'Black Han Sans',sans-serif;font-size:28px;color:var(--purple);}
    .stat-label{font-size:11px;color:var(--muted);margin-top:3px;}
    .btn-restart{background:var(--purple);color:#fff;border:none;border-radius:100px;padding:14px 40px;font-size:17px;font-weight:700;cursor:pointer;transition:opacity 0.2s,transform 0.15s;}
    .btn-restart:hover{opacity:0.85;transform:scale(1.03);}

    /* Nav */
    .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(8,8,16,0.96);border-top:1px solid rgba(255,255,255,0.07);display:flex;justify-content:space-around;padding:10px 8px;z-index:500;backdrop-filter:blur(10px);}
    .nav-item{display:flex;flex-direction:column;align-items:center;text-decoration:none;color:var(--muted);font-size:10px;gap:3px;flex:1;transition:color 0.2s;-webkit-tap-highlight-color:transparent;}
    .nav-item.active{color:#FFD700;}
    .nav-icon{font-size:20px;}

    @media(max-width:480px){body{padding:12px 12px 80px;}.options{gap:8px;}.opt-btn{padding:12px 6px;font-size:13px;min-height:52px;}.jersey-card{padding:20px 14px;}.jersey-display{gap:16px;}}
  </style>
</head>

  <button onclick="shareResult(score, '이 유니폼 어느 팀?')" style="background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:100px;padding:10px 22px;color:var(--muted2);font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .2s;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='var(--muted2)'">📤 결과 공유</button>

<script>
async function fbAutoSubmit(s,gameName){
  const nm=localStorage.getItem('wc_player_name')||'';if(!nm)return;
  const fbUrl=localStorage.getItem('wc_fb_url')||'';if(!fbUrl.startsWith('https://'))return;
  try{const enc=n=>n.replace(/[.#$[\]]/g,'_'),FB=fbUrl+'/wc_live',en=enc(nm);
    const cur=await fetch(FB+'/scores/'+en+'.json').then(r=>r.json())||{};
    await fetch(FB+'/scores/'+en+'.json',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:nm,total:(cur.total||0)+s,correct:(cur.correct||0)+1,streak:cur.streak||0,lastGame:gameName})});
  }catch(e){}
}
function goToScoreboard(s){
  const fbUrl=localStorage.getItem('wc_fb_url')||'';
  if(fbUrl.startsWith('https://'))location.href='../scoreboard.html?db='+btoa(fbUrl);
  else{const name=localStorage.getItem('wc_player_name')||'';location.href='../scoreboard.html'+(name?`?prefill=${encodeURIComponent(name)}&score=${s}`:'');}
}

// Audio
const AudioCtx=window.AudioContext||window.webkitAudioContext;let _ctx=null;
function getCtx(){if(!_ctx)_ctx=new AudioCtx();if(_ctx.state==='suspended')_ctx.resume();return _ctx;}
function playTone(f,t,d,v=0.3){try{const c=getCtx(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+d);o.start();o.stop(c.currentTime+d);}catch(e){}}
function sfxCorrect(){playTone(523,'sine',0.12,0.35);setTimeout(()=>playTone(659,'sine',0.12,0.35),80);setTimeout(()=>playTone(784,'sine',0.18,0.35),160);}
function sfxWrong(){playTone(220,'sawtooth',0.25,0.25);setTimeout(()=>playTone(180,'sawtooth',0.2,0.2),120);}

// Confetti
function launchConfetti(x,y,n=14){const cols=['#FFD700','#00843D','#ef4444','#3b82f6','#a855f7','#fff'];for(let i=0;i<n;i++){const el=document.createElement('div');el.style.cssText=`position:fixed;width:${5+Math.random()*7}px;height:${5+Math.random()*7}px;background:${cols[Math.floor(Math.random()*cols.length)]};border-radius:${Math.random()>.5?'50%':'2px'};left:${x}px;top:${y}px;pointer-events:none;z-index:9998;`;document.body.appendChild(el);const a=Math.random()*360*Math.PI/180,sp=70+Math.random()*120;let px=x,py=y,vy=Math.sin(a)*sp-60,vx=Math.cos(a)*sp,t=0;const tick=()=>{t+=0.016;px+=vx*0.016;vy+=200*0.016;py+=vy*0.016;el.style.left=px+'px';el.style.top=py+'px';el.style.opacity=Math.max(0,1-t*1.4);el.style.transform=`rotate(${t*200}deg)`;if(t<0.9)requestAnimationFrame(tick);else el.remove();};requestAnimationFrame(tick);}}
function launchFullConfetti(){for(let i=0;i<4;i++)setTimeout(()=>launchConfetti(Math.random()*window.innerWidth,-10,10),i*120);}

// ── SVG Jersey Generator ─────────────────────────
function makeJersey(colors, pattern='solid', num='10', id='j') {
  const [main, second, accent=second] = colors;
  let overlay = '';

  if (pattern==='stripes') {
    overlay=`<rect x="60" y="0" width="24" height="145" fill="${second}" opacity="0.9"/><rect x="108" y="0" width="24" height="145" fill="${second}" opacity="0.9"/>`;
  } else if (pattern==='half') {
    overlay=`<rect x="96" y="0" width="110" height="145" fill="${second}"/>`;
  } else if (pattern==='sash') {
    overlay=`<polygon points="52,0 108,0 68,145 30,145" fill="${second}" opacity="0.9"/>`;
  } else if (pattern==='collar-stripe') {
    overlay=`<rect x="52" y="0" width="92" height="18" fill="${second}" opacity="0.8"/><rect x="52" y="128" width="92" height="12" fill="${second}" opacity="0.5"/>`;
  } else if (pattern==='chevron') {
    overlay=`<polygon points="52,45 98,76 144,45 144,0 98,32 52,0" fill="${second}" opacity="0.85"/>`;
  } else if (pattern==='panel') {
    overlay=`<rect x="52" y="0" width="28" height="145" fill="${second}" opacity="0.7"/><rect x="116" y="0" width="28" height="145" fill="${second}" opacity="0.7"/>`;
  } else if (pattern==='checkerboard') {
    const cw=22,ch=30;
    for(let r=0;r<5;r++) for(let c=0;c<4;c++) {
      if((r+c)%2===0) overlay+=`<rect x="${52+c*cw}" y="${r*ch}" width="${cw}" height="${ch}" fill="${second}" opacity="0.9"/>`;
    }
  } else if (pattern==='hoops') {
    [0,30,60,90,120].forEach(y=>{ overlay+=`<rect x="0" y="${y}" width="200" height="14" fill="${second}" opacity="0.85"/>`; });
  } else if (pattern==='diagonal') {
    overlay=`<polygon points="0,0 80,0 0,145" fill="${second}" opacity="0.7"/>`;
  }

  return `<svg viewBox="0 0 200 175" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="clip-${id}">
      <path d="M38,18 L0,56 L27,72 L27,155 L173,155 L173,72 L200,56 L162,18 Q135,36 100,36 Q65,36 38,18 Z"/>
    </clipPath>
    <filter id="drop-${id}"><feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="rgba(0,0,0,0.45)"/></filter>
    <linearGradient id="shine-${id}" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.08)"/>
      <stop offset="100%" style="stop-color:rgba(0,0,0,0.08)"/>
    </linearGradient>
  </defs>
  <!-- Shadow -->
  <path d="M38,18 L0,56 L27,72 L27,155 L173,155 L173,72 L200,56 L162,18 Q135,36 100,36 Q65,36 38,18 Z" fill="rgba(0,0,0,0.25)" transform="translate(3,6)" filter="url(#drop-${id})"/>
  <!-- Base -->
  <path d="M38,18 L0,56 L27,72 L27,155 L173,155 L173,72 L200,56 L162,18 Q135,36 100,36 Q65,36 38,18 Z" fill="${main}"/>
  <!-- Pattern -->
  <g clip-path="url(#clip-${id})">${overlay}</g>
  <!-- Sleeve shade -->
  <path d="M38,18 L0,56 L27,72 L42,64 Z" fill="rgba(0,0,0,0.14)"/>
  <path d="M162,18 L200,56 L173,72 L158,64 Z" fill="rgba(0,0,0,0.14)"/>
  <!-- Outline -->
  <path d="M38,18 L0,56 L27,72 L27,155 L173,155 L173,72 L200,56 L162,18 Q135,36 100,36 Q65,36 38,18 Z" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <!-- Collar -->
  <path d="M76,36 Q100,50 124,36 Q118,18 100,18 Q82,18 76,36 Z" fill="${second||main}"/>
  <path d="M76,36 Q100,50 124,36 Q118,18 100,18 Q82,18 76,36 Z" fill="none" stroke="rgba(0,0,0,0.2)" stroke-width="1"/>
  <!-- Shine -->
  <path d="M38,18 L0,56 L27,72 L27,155 L173,155 L173,72 L200,56 L162,18 Q135,36 100,36 Q65,36 38,18 Z" fill="url(#shine-${id})"/>
  <!-- Number -->
  <text x="100" y="118" text-anchor="middle" font-size="38" font-weight="900" fill="${second||'#ffffff'}" opacity="0.85" font-family="Arial Black,sans-serif" stroke="rgba(0,0,0,0.2)" stroke-width="1">${num}</text>
</svg>`;
}

// ── Teams DB (24팀) ───────────────────────────────
const TEAMS = [

   home:{c:["#FFD700","#009c3b","#009c3b"],p:"solid",label:"홈 (노란 삼바)"},

  {name:"🇩🇪 독일",flag:"🇩🇪",

   away:{c:["#000000","#ffffff","#cc0000"],p:"solid",label:"원정 (검은 독수리)"},
   clues:["흰색 + 검정 반바지","독수리 엠블럼","게르만 군단"],decoy:["🏴󠁧󠁢󠁥󠁮󠁧󠁿 잉글랜드","🇵🇱 폴란드","🇺🇾 우루과이"]},
  {name:"🇦🇷 아르헨티나",flag:"🇦🇷",
   home:{c:["#74ACDF","#ffffff","#74ACDF"],p:"stripes",label:"홈 (하늘색+흰 줄)"},
   away:{c:["#003189","#74ACDF","#003189"],p:"solid",label:"원정 (진한 파랑)"},
   clues:["하늘색 + 흰색 세로줄","남미 강국","알비셀레스테"],decoy:["🇺🇾 우루과이","🇸🇻 엘살바도르","🇬🇷 그리스"]},
  {name:"🇫🇷 프랑스",flag:"🇫🇷",
   home:{c:["#003189","#ff0000","#ffffff"],p:"solid",label:"홈 (레 블뢰)"},
   away:{c:["#ffffff","#003189","#003189"],p:"collar-stripe",label:"원정 (흰색)"},
   clues:["진한 파란색 상의","수탉 엠블럼","레 블뢰"],decoy:["🇮🇹 이탈리아","🇸🇪 스웨덴","🇫🇮 핀란드"]},
  {name:"🇮🇹 이탈리아",flag:"🇮🇹",
   home:{c:["#0066CC","#0066CC","#ffffff"],p:"solid",label:"홈 (아주리)"},
   away:{c:["#ffffff","#0066CC","#0066CC"],p:"solid",label:"원정 (흰색)"},

let score=0,timeLeft=30,qNum=0,totalQ=0,correctQ=0,streak=0,bestStreak=0,wrongStreak=0;
let timerInterval,usedIdx=[],currentTeam=null,answered=false,showAway=false;

function shuffle(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}

function getTeam(){
  if(usedIdx.length===TEAMS.length) usedIdx=[];
  const avail=TEAMS.map((_,i)=>i).filter(i=>!usedIdx.includes(i));
  const idx=avail[Math.floor(Math.random()*avail.length)];
  usedIdx.push(idx); return TEAMS[idx];
}

function toggleKit(){
  showAway=!showAway;
  document.getElementById('toggle-btn').textContent=showAway?'🔄 홈 유니폼 보기':'🔄 원정 유니폼 보기';
  renderJersey();
}

function renderJersey(){
  if(!currentTeam) return;
  const kit=showAway&&currentTeam.away?currentTeam.away:currentTeam.home;
  const jd=document.getElementById('jersey-display');
  jd.innerHTML=`<div class="jersey-wrap">
    ${makeJersey(kit.c,kit.p,'10','h')}
    <div class="jersey-label-txt">${kit.label}</div>
  </div>`;
}

function setQuestion(){
  if(timeLeft<=0) return;
  answered=false; showAway=false;
  document.getElementById('toggle-btn').textContent='🔄 원정 유니폼 보기';
  currentTeam=getTeam();
  qNum++; totalQ++;
  document.getElementById('q-val').textContent=qNum;
  document.getElementById('feedback').textContent='';
  document.getElementById('feedback').className='feedback';
  document.getElementById('auto-hint').textContent='';

  renderJersey();

  document.getElementById('clues').innerHTML=currentTeam.clues.map(c=>`<span class="clue-chip">${c}</span>`).join('');

  // Options — always include correct
  const wrongPool=shuffle(currentTeam.decoy.filter(d=>d!==currentTeam.name));
  const opts=shuffle([currentTeam.name,...wrongPool.slice(0,3)]);
  document.getElementById('options').innerHTML=opts.map(o=>{
    const f=o.match(/^(\S+)/)?.[1]||'';
    const n=o.replace(/^\S+\s*/,'');
    return `<button class="opt-btn" onclick="answer(this,'${o.replace(/'/g,"\\'")}')"><span class="flag">${f}</span>${n}</button>`;
  }).join('');
}

function answer(btn,selected){
  if(answered||timeLeft<=0) return;
  answered=true;
  document.querySelectorAll('.opt-btn').forEach(b=>b.disabled=true);
  const fb=document.getElementById('feedback');
  if(selected===currentTeam.name){
    streak++; wrongStreak=0;
    if(streak>bestStreak) bestStreak=streak;
    const pts=100+(streak>=5?50:streak>=3?25:0);
    score+=pts; correctQ++;
    sfxCorrect(); launchFullConfetti();
    btn.classList.add('correct');
    fb.className='feedback correct';
    fb.textContent=streak>=5?`🌟 ${streak}연속! +${pts}점`:streak>=3?`🔥 ${streak}연속! +${pts}점`:`✅ 정답! +${pts}점`;
    document.getElementById('streak-bar').textContent=streak>=3?`🔥 ${streak}연속 정답!`:'';
  } else {
    streak=0; wrongStreak++;
    sfxWrong();
    btn.classList.add('wrong');
    document.querySelectorAll('.opt-btn').forEach(b=>{
      if(b.textContent.trim().includes(currentTeam.name.replace(/^\S+\s*/,''))) b.classList.add('correct');
    });
    fb.className='feedback wrong';
    fb.textContent=`❌ 오답! 정답: ${currentTeam.flag} ${currentTeam.name.replace(/^\S+\s*/,'')}`;
    document.getElementById('streak-bar').textContent='';
    // Auto hint on 2 consecutive wrong
    if(wrongStreak>=2){
      document.getElementById('auto-hint').textContent='💡 힌트: '+currentTeam.clues[0];
    }
  }
  document.getElementById('score-val').textContent=score;
  setTimeout(setQuestion,950);
}

function startGame(){
  score=0;timeLeft=30;qNum=0;totalQ=0;correctQ=0;streak=0;bestStreak=0;wrongStreak=0;usedIdx=[];
  document.getElementById('game-area').style.display='flex';
  document.getElementById('result-screen').classList.remove('show');
  document.getElementById('score-val').textContent=0;
  document.getElementById('timer-val').textContent=30;
  document.getElementById('streak-bar').textContent='';
  const bar=document.getElementById('timer-bar');
  bar.style.width='100%'; bar.style.background='var(--purple)';
  setQuestion();
  clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    timeLeft--;
    document.getElementById('timer-val').textContent=timeLeft;
    bar.style.width=(timeLeft/30*100)+'%';
    if(timeLeft<=8) bar.style.background='#ef4444';
    else if(timeLeft<=15) bar.style.background='#f59e0b';
    if(timeLeft<=0){clearInterval(timerInterval);showResult();}
  },1000);
}

function showResult(){
  fbAutoSubmit(score,'이 유니폼 어느 팀?');
  document.getElementById('game-area').style.display='none';
  document.getElementById('result-screen').classList.add('show');
  const acc=totalQ>0?Math.round(correctQ/totalQ*100):0;
  const GRADES=[
    {min:1000,g:'S',c:'#FFD700',t:'🌟 유니폼 마스터!',  m:'완벽한 유니폼 지식이에요!'},
    {min:700, g:'A',c:'#22c55e',t:'🥇 유니폼 박사!',    m:'훌륭한 지식이에요!'},
    {min:400, g:'B',c:'#3b82f6',t:'🥈 잘 하고 있어요!', m:'꽤 많이 아시네요!'},
    {min:200, g:'C',c:'#f59e0b',t:'🥉 나쁘지 않아요!',  m:'더 연습해봐요!'},
    {min:0,   g:'D',c:'#ef4444',t:'😅 더 공부해봐요!',  m:'유니폼을 더 연구해보세요!'},
  ];
  const gr=GRADES.find(g=>score>=g.min)||GRADES[GRADES.length-1];
  document.getElementById('res-trophy').textContent=score>=700?'🏆':score>=400?'🥇':'😅';
  document.getElementById('res-grade').innerHTML=`<span style="color:${gr.c}">GRADE ${gr.g}</span>`;
  document.getElementById('res-title').textContent=gr.t;
  document.getElementById('res-score').textContent=score.toLocaleString()+'점';
  document.getElementById('res-msg').textContent=gr.m+` (정확도 ${acc}%)`;
  document.getElementById('stat-correct').textContent=correctQ;
  document.getElementById('stat-total').textContent=totalQ;
  document.getElementById('stat-best').textContent=bestStreak;
  document.getElementById('stat-acc').textContent=acc+'%';
}

setTimeout(()=>{const s=document.getElementById('splash');s.classList.add('out');setTimeout(()=>s.remove(),400);},900);
if(localStorage.getItem('wc_player_name'))startGame();

function shareResult(s, gameName) {
  const grades = [[1400,'S'],[1000,'A'],[600,'B'],[300,'C'],[0,'D']];
  const grade = grades.find(g => s >= g[0])?.[1] || 'D';
  const text = `⚽ 월드컵 미니게임 — ${gameName}\nGRADE ${grade} · ${s.toLocaleString()}점\nhttps://twinwhdwk.github.io/worldcup_minigame/`;
  if (navigator.share) {
    navigator.share({ title: '월드컵 미니게임 결과', text }).catch(() => {});
  } else {
    navigator.clipboard.writeText(text).then(() => alert('결과가 클립보드에 복사됐어요!')).catch(() => {});
  }
}

function saveNameOverlay(){
  var n=document.getElementById('no-input').value.trim();
  if(!n){document.getElementById('no-input').focus();return;}

  document.getElementById('name-overlay').style.display='none';if(typeof startGame==='function')startGame();}
