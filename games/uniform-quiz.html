    :root {
      --purple: #a855f7;
      --dark: #0a0a0f;
      --card: #13141f;
      --text: #f0f0f0;
      --muted: #666;

    body {

      flex-direction: column;

    .back { align-self: flex-start; color: var(--muted); text-decoration: none; font-size: 14px; margin-bottom: 20px; }

    h1 {

      font-size: clamp(28px, 5vw, 48px);
      text-align: center;
      background: linear-gradient(135deg, #fff, var(--purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .subtitle { color: var(--muted); font-size: 14px; text-align: center; margin-bottom: 24px; }

    /* HUD */
    .hud {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      width: 100%;
      max-width: 580px;
    }
    .hud-box {
      flex: 1;
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 12px;
      padding: 12px;
      text-align: center;
    }
    .hud-label { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
    .hud-value { font-family: 'Black Han Sans', sans-serif; font-size: 26px; margin-top: 2px; }
    #timer-val { color: var(--purple); }
    #score-val { color: #FFD700; }
    #q-val { color: #aaa; }

    /* TIMER BAR */
    .timer-bar-wrap {
      width: 100%;
      max-width: 580px;
      height: 5px;
      background: rgba(255,255,255,0.06);
      border-radius: 100px;
      margin-bottom: 20px;
      overflow: hidden;
    }
    #timer-bar {
      height: 100%;
      background: var(--purple);
      border-radius: 100px;
      transition: width 1s linear;
    }

    /* JERSEY CARD */
    .jersey-card {
      background: var(--card);
      border: 1px solid rgba(168,85,247,0.2);
      border-radius: 24px;
      padding: 32px;
      width: 100%;
      max-width: 580px;
      text-align: center;
      margin-bottom: 20px;
    }

    /* JERSEY SVG DISPLAY */
    .jersey-display {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 24px;
      gap: 24px;
    }

    .jersey-svg-wrap {
      position: relative;
    }

    .jersey-svg-wrap svg {
      width: clamp(100px, 18vw, 160px);
      height: auto;
      filter: drop-shadow(0 8px 24px rgba(0,0,0,0.5));
      transition: transform 0.3s;
    }
    .jersey-svg-wrap:hover svg { transform: scale(1.05); }

    .jersey-label {
      font-size: 12px;
      color: var(--muted);
      margin-top: 8px;
      letter-spacing: 1px;
    }

    /* CLUES */
    .clues {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-bottom: 20px;
    }
    .clue-chip {
      background: rgba(168,85,247,0.12);
      border: 1px solid rgba(168,85,247,0.25);
      color: var(--purple);
      font-size: 13px;
      padding: 6px 14px;
      border-radius: 100px;
    }

    .feedback {
      font-size: 22px;
      font-weight: 700;
      min-height: 30px;
    }
    .feedback.correct { color: var(--correct); }
    .feedback.wrong { color: var(--wrong); }

    /* OPTIONS */
    .options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      width: 100%;
      max-width: 580px;
    }

    .opt-btn {
      background: var(--card);
      border: 2px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 16px 12px;
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      cursor: pointer;
      transition: all 0.15s;
      font-family: 'Noto Sans KR', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .opt-btn:hover:not(:disabled) {
      border-color: var(--purple);
      background: rgba(168,85,247,0.1);
      transform: scale(1.02);
    }
    .opt-btn.correct { border-color: var(--correct); background: rgba(34,197,94,0.15); color: var(--correct); }
    .opt-btn.wrong { border-color: var(--wrong); background: rgba(239,68,68,0.15); color: var(--wrong); }
    .opt-btn:disabled { cursor: not-allowed; }

    /* RESULT */
    .result-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      text-align: center;
      width: 100%;
      max-width: 580px;
    }
    .result-screen.show { display: flex; }
    .result-trophy { font-size: 80px; margin-bottom: 16px; }
    .result-title { font-family: 'Black Han Sans', sans-serif; font-size: 38px; margin-bottom: 8px; }
    .result-score { font-size: 60px; font-family: 'Black Han Sans', sans-serif; color: #FFD700; margin: 12px 0; }
    .result-msg { color: var(--muted); font-size: 15px; margin-bottom: 28px; }
    .btn-restart {
      background: var(--purple);
      color: #fff;
      border: none;
      border-radius: 100px;
      padding: 16px 48px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }
    .btn-restart:hover { opacity: 0.85; transform: scale(1.03); }
  
    @keyframes scorePop {
      0% { transform: scale(0) translateY(0); opacity: 1; }
      60% { transform: scale(1.3) translateY(-30px); opacity: 1; }
      100% { transform: scale(1) translateY(-60px); opacity: 0; }
    }
    .score-pop {

    @media (max-width: 480px) {

      .opt-btn { padding: 14px 8px; font-size: 14px; min-height: 64px; }
      .question-card, .q-card, .jersey-card { padding: 24px 16px; }

// ── Confetti System ─────────────────────────────
function launchConfetti(x, y, count=18) {
  const colors = ['#FFD700','#00843D','#ef4444','#3b82f6','#a855f7','#fff'];
  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.style.cssText = `
      position:fixed; width:${6+Math.random()*6}px; height:${6+Math.random()*6}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      border-radius:${Math.random()>0.5?'50%':'2px'};
      left:${x}px; top:${y}px; pointer-events:none; z-index:9999;
      transform:rotate(${Math.random()*360}deg);
    `;
    document.body.appendChild(el);
    const angle = (Math.random() * 360) * Math.PI / 180;
    const speed = 80 + Math.random() * 120;
    const vx = Math.cos(angle) * speed;
    const vy = Math.sin(angle) * speed - 60;
    let px = x, py = y, vy2 = vy, t = 0;
    const tick = () => {
      t += 0.016; px += vx * 0.016; vy2 += 200 * 0.016; py += vy2 * 0.016;
      el.style.left = px + 'px'; el.style.top = py + 'px';
      el.style.opacity = Math.max(0, 1 - t * 1.5);
      el.style.transform = `rotate(${t*200}deg)`;
      if (t < 0.8) requestAnimationFrame(tick); else el.remove();
    };
    requestAnimationFrame(tick);
  }
}
function launchFullConfetti() {
  for (let i = 0; i < 4; i++) setTimeout(() => launchConfetti(Math.random()*window.innerWidth, -10, 12), i*150);
}

// ── High Score System ───────────────────────────────────
function getHighScores(game) {
  try { return JSON.parse(localStorage.getItem('wc_hs_' + game) || '[]'); } catch { return []; }
}
function saveHighScore(game, score) {
  const scores = getHighScores(game);
  scores.push({ score, date: new Date().toLocaleDateString('ko-KR') });
  scores.sort((a,b) => b.score - a.score);
  const top5 = scores.slice(0, 5);
  localStorage.setItem('wc_hs_' + game, JSON.stringify(top5));
  return top5;
}
function renderHighScores(game, containerId) {
  const scores = getHighScores(game);
  const el = document.getElementById(containerId);
  if (!el || scores.length === 0) return;
  el.innerHTML = '<div style="font-size:12px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;">🏅 역대 최고점</div>' +
    scores.map((s,i) => `<div style="display:flex;justify-content:space-between;font-size:14px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.05)">
      <span style="color:${i===0?'#FFD700':i===1?'#aaa':i===2?'#cd7f32':'var(--muted)'}">${['🥇','🥈','🥉','4위','5위'][i]}</span>
      <span style="font-weight:700">${s.score.toLocaleString()}점</span>
      <span style="color:var(--muted)">${s.date}</span>
    </div>`).join('');
}

// ── Web Audio Sound System ──────────────────────────────
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let _ctx = null;
function getCtx() {
  if (!_ctx) _ctx = new AudioCtx();
  if (_ctx.state === 'suspended') _ctx.resume();
  return _ctx;
}
function playTone(freq, type, duration, vol=0.3, decay=0.8) {
  try {
    const ctx = getCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = type; osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    osc.start(); osc.stop(ctx.currentTime + duration);
  } catch(e) {}
}
function sfxCorrect() {
  playTone(523, 'sine', 0.12, 0.35);

}
function sfxWrong() {
  playTone(220, 'sawtooth', 0.25, 0.25);

// Jersey SVG generator
function jerseyPath(colors, pattern = 'solid', number = '10') {
  const [main, secondary, stripe] = colors;
  let fill = `fill="${main}"`;
  let detail = '';

  if (pattern === 'stripes') {
    detail = `
      <rect x="70" y="20" width="20" height="110" fill="${secondary}" opacity="0.9"/>
      <rect x="110" y="20" width="20" height="110" fill="${secondary}" opacity="0.9"/>`;
  } else if (pattern === 'half') {
    detail = `<rect x="100" y="20" width="100" height="110" fill="${secondary}" rx="0"/>`;
  } else if (pattern === 'sash') {
    detail = `<polygon points="70,20 130,20 80,130 60,130" fill="${secondary}" opacity="0.9"/>`;
  } else if (pattern === 'collar-stripe') {
    detail = `<rect x="60" y="20" width="80" height="12" fill="${secondary}"/>`;
  }

  return `
    <svg viewBox="0 0 200 160" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <clipPath id="jersey-clip">
          <path d="M40,10 L0,50 L30,65 L30,150 L170,150 L170,65 L200,50 L160,10 L130,30 Q100,45 70,30 Z"/>
        </clipPath>
      </defs>
      <!-- Jersey base -->
      <path d="M40,10 L0,50 L30,65 L30,150 L170,150 L170,65 L200,50 L160,10 L130,30 Q100,45 70,30 Z" fill="${main}"/>
      <!-- Pattern layer -->
      <g clip-path="url(#jersey-clip)">
        ${detail}
      </g>
      <!-- Jersey outline -->
      <path d="M40,10 L0,50 L30,65 L30,150 L170,150 L170,65 L200,50 L160,10 L130,30 Q100,45 70,30 Z" fill="none" stroke="${secondary || '#ffffff33'}" stroke-width="2" opacity="0.4"/>
      <!-- Collar -->
      <ellipse cx="100" cy="32" rx="22" ry="12" fill="${secondary || main}" stroke="${main}" stroke-width="2"/>
      <!-- Number -->
      <text x="100" y="105" text-anchor="middle" font-size="32" font-weight="bold" fill="${secondary || '#fff'}" opacity="0.85" font-family="Arial">${number}</text>
    </svg>`;
}

let score = 0, timeLeft = 30, qNum = 0, totalQ = 0, correctQ = 0, streak = 0;
let timerInterval;
let usedIdx = [], answered = false;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getTeam() {
  if (usedIdx.length === TEAMS.length) usedIdx = [];
  const avail = TEAMS.map((_, i) => i).filter(i => !usedIdx.includes(i));
  const idx = avail[Math.floor(Math.random() * avail.length)];
  usedIdx.push(idx);
  return TEAMS[idx];
}

let currentTeam;

function setQuestion() {
  if (timeLeft <= 0) return;
  answered = false;
  currentTeam = getTeam();
  qNum++;
  totalQ++;
  document.getElementById('q-val').textContent = qNum;
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';

  // Draw jersey
  const jd = document.getElementById('jersey-display');
  const j = currentTeam.home;
  jd.innerHTML = `
    <div class="jersey-svg-wrap">
      ${jerseyPath(j.colors, j.pattern)}
      <div class="jersey-label">${j.label}</div>
    </div>`;

  // Clues
  const cluesEl = document.getElementById('clues');
  cluesEl.innerHTML = currentTeam.clues.map(c => `<span class="clue-chip">${c}</span>`).join('');

  // Options
  const opts = shuffle([currentTeam.name, ...currentTeam.decoy]).slice(0, 4);
  if (!opts.includes(currentTeam.name)) { opts[0] = currentTeam.name; shuffle(opts); }

  const optEl = document.getElementById('options');
  optEl.innerHTML = shuffle([currentTeam.name, ...currentTeam.decoy].slice(0,4)).map(o => `
    <button class="opt-btn" onclick="answer(this, '${o.replace(/'/g, "\\'")}')">
      ${o}
    </button>`).join('');
}

function answer(btn, selected) {
  if (answered || timeLeft <= 0) return;
  answered = true;
  document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);

  const fb = document.getElementById('feedback');
  if (selected === currentTeam.name) {
    const pts = 100;
    score += pts;
    correctQ++;
    sfxCorrect(); btn.classList.add('correct'); wrongStreak = 0; document.getElementById('auto-hint') && (document.getElementById('auto-hint').style.display='none');
    fb.className = 'feedback correct'; launchFullConfetti();
    fb.textContent = `✅ 정답! +${pts}점`;
  } else {
    sfxWrong(); btn.classList.add('wrong'); wrongStreak++; checkAutoHint();
    streak = 0;
  document.querySelectorAll('.opt-btn').forEach(b => {
      if (b.textContent.trim() === currentTeam.name) b.classList.add('correct');
    });
    fb.className = 'feedback wrong';
    fb.textContent = `❌ 오답! 정답: ${currentTeam.name}`;
  }

  document.getElementById('score-val').textContent = score;
  const sb = document.getElementById('streak-bar');
  if (sb) { sb.textContent = streak >= 3 ? '🔥 ' + streak + '연속 정답!' : ''; }
  setTimeout(setQuestion, 900);
}

function startGame() {
  score = 0; timeLeft = 30; qNum = 0; totalQ = 0; correctQ = 0; usedIdx = [];
  document.getElementById('game-area').style.display = 'flex';
  document.getElementById('result-screen').classList.remove('show');
  document.getElementById('score-val').textContent = 0;
  document.getElementById("timer-val").textContent = 30;
  document.getElementById('timer-bar').style.width = '100%';
  document.getElementById('timer-bar').style.background = 'var(--purple)';

  setQuestion();

  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timeLeft--;
    document.getElementById('timer-val').textContent = timeLeft;
    document.getElementById('timer-bar').style.width = (timeLeft / 45 * 100) + '%';
    if (timeLeft <= 10) document.getElementById('timer-bar').style.background = '#ef4444';
    else if (timeLeft <= 20) document.getElementById('timer-bar').style.background = '#f59e0b';
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      showResult();
    }
  }, 1000);
}

function showResult() {
  document.getElementById('game-area').style.display = 'none';
  saveHighScore('uniform', score);
  document.getElementById('result-screen').classList.add('show');
  renderHighScores('uniform', 'highscore-box');

  const pct = totalQ > 0 ? Math.round(correctQ / totalQ * 100) : 0;
  let trophy = '😅', title = '더 공부가 필요해요!', msg = '유니폼을 더 연구해보세요!';
  if (score >= 1000) { trophy = '🏆'; title = '유니폼 마스터!'; msg = '완벽한 유니폼 지식이에요!'; }
  else if (score >= 700) { trophy = '🥇'; title = '유니폼 박사!'; msg = '훌륭해요!'; }
  else if (score >= 400) { trophy = '🥈'; title = '잘 하고 있어요!'; msg = '꽤 많이 아시네요!'; }
  else if (score >= 200) { trophy = '🥉'; title = '나쁘지 않아요!'; msg = '더 연습해보세요!'; }

  document.getElementById('res-trophy').textContent = trophy;
  document.getElementById('res-title').textContent = title;
  document.getElementById('res-score').textContent = score + '점';
  document.getElementById('res-msg').textContent = `${msg} 정확도: ${pct}% (${correctQ}/${totalQ})`;
}

startGame();
</script>
