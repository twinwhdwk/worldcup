  <style>
    @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;700&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue: #3b82f6;
      --dark: #0a0a0f;
      --card: #13141f;
      --text: #f0f0f0;
      --muted: #666;
      --correct: #22c55e;
      --wrong: #ef4444;
    }

    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'Noto Sans KR', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    .back { align-self: flex-start; color: var(--muted); text-decoration: none; font-size: 14px; margin-bottom: 20px; }
    .back:hover { color: var(--text); }

    h1 {
      font-family: 'Black Han Sans', sans-serif;
      font-size: clamp(28px, 5vw, 48px);
      text-align: center;
      background: linear-gradient(135deg, #fff, var(--blue));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .subtitle { color: var(--muted); font-size: 14px; text-align: center; margin-bottom: 30px; }

    /* HUD */
    .hud {
      display: flex;
      gap: 20px;
      margin-bottom: 24px;
      width: 100%;
      max-width: 600px;
    }

    .hud-box {
      flex: 1;
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 14px;
      padding: 14px;
      text-align: center;
    }
    .hud-label { font-size: 11px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
    .hud-value { font-family: 'Black Han Sans', sans-serif; font-size: 32px; margin-top: 4px; }
    #timer-val { color: var(--blue); }
    #score-val { color: #FFD700; }
    #streak-val { color: var(--correct); }

    /* Timer bar */
    .timer-bar-wrap {
      width: 100%;
      max-width: 600px;
      height: 6px;
      background: rgba(255,255,255,0.08);
      border-radius: 100px;
      margin-bottom: 24px;
      overflow: hidden;
    }
    #timer-bar {
      height: 100%;
      background: var(--blue);
      border-radius: 100px;
      transition: width 1s linear, background 0.3s;
      width: 100%;
    }

    /* CARD */
    .question-card {
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 24px;
      padding: 40px 32px;
      width: 100%;
      max-width: 600px;
      margin-bottom: 20px;
      text-align: center;
    }

    .player-emoji { font-size: 72px; margin-bottom: 16px; }
    .player-name {
      font-family: 'Black Han Sans', sans-serif;
      font-size: 36px;
      margin-bottom: 20px;
      letter-spacing: -1px;
    }

    .hints {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-bottom: 20px;
    }

    .hint-chip {
      background: rgba(59,130,246,0.15);
      border: 1px solid rgba(59,130,246,0.3);
      color: var(--blue);
      font-size: 13px;
      padding: 6px 14px;
      border-radius: 100px;
    }

    .feedback {
      font-size: 24px;
      font-weight: 700;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .feedback.correct { color: var(--correct); }
    .feedback.wrong { color: var(--wrong); }

    /* OPTIONS */
    .options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      width: 100%;
      max-width: 600px;
    }

    .opt-btn {
      background: var(--card);
      border: 2px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 16px 12px;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: center;
    }

    .opt-btn:hover:not(:disabled) {
      border-color: var(--blue);
      background: rgba(59,130,246,0.1);
      transform: scale(1.02);
    }

    .opt-btn.correct { border-color: var(--correct); background: rgba(34,197,94,0.15); color: var(--correct); }
    .opt-btn.wrong { border-color: var(--wrong); background: rgba(239,68,68,0.15); color: var(--wrong); }
    .opt-btn:disabled { cursor: not-allowed; }

    /* RESULT */
    .result-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      text-align: center;
      width: 100%;
      max-width: 600px;
    }

    .result-trophy { font-size: 80px; margin-bottom: 20px; }

      font-size: 40px;
      margin-bottom: 8px;

      font-family: 'Black Han Sans', sans-serif;
      color: #FFD700;
      margin: 16px 0;

    .result-msg { color: var(--muted); font-size: 15px; margin-bottom: 32px; }

      gap: 16px;
      margin-bottom: 32px;

    .stat-box {

    .game-area { width: 100%; display: flex; flex-direction: column; align-items: center; }
  </style>
</head>

// ── High Score System ───────────────────────────────────
function getHighScores(game) {
  try { return JSON.parse(localStorage.getItem('wc_hs_' + game) || '[]'); } catch { return []; }
}
function saveHighScore(game, score) {
  const scores = getHighScores(game);
  scores.push({ score, date: new Date().toLocaleDateString('ko-KR') });
  scores.sort((a,b) => b.score - a.score);
  const top5 = scores.slice(0, 5);
  localStorage.setItem('wc_hs_' + game, JSON.stringify(top5));
  return top5;
}
function renderHighScores(game, containerId) {
  const scores = getHighScores(game);
  const el = document.getElementById(containerId);
  if (!el || scores.length === 0) return;
  el.innerHTML = '<div style="font-size:12px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;">🏅 역대 최고점</div>' +
    scores.map((s,i) => `<div style="display:flex;justify-content:space-between;font-size:14px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.05)">
      <span style="color:${i===0?'#FFD700':i===1?'#aaa':i===2?'#cd7f32':'var(--muted)'}">${['🥇','🥈','🥉','4위','5위'][i]}</span>
      <span style="font-weight:700">${s.score.toLocaleString()}점</span>
      <span style="color:var(--muted)">${s.date}</span>
    </div>`).join('');
}

// ── Web Audio Sound System ──────────────────────────────
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let _ctx = null;
function getCtx() {
  if (!_ctx) _ctx = new AudioCtx();
  if (_ctx.state === 'suspended') _ctx.resume();
  return _ctx;
}
function playTone(freq, type, duration, vol=0.3, decay=0.8) {
  try {
    const ctx = getCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = type; osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    osc.start(); osc.stop(ctx.currentTime + duration);
  } catch(e) {}
}

  playTone(523, 'sine', 0.12, 0.35);

}
function sfxWrong() {
  playTone(220, 'sawtooth', 0.25, 0.25);
  setTimeout(() => playTone(180, 'sawtooth', 0.2, 0.2), 120);
}

  { name: "비니시우스 주니오르", country: "🇧🇷 브라질", emoji: "💃", hints: ["레알 마드리드 윙어", "춤 세리머니 논란", "2022 UCL 결승골"] },
  { name: "이강인", country: "🇰🇷 대한민국", emoji: "⚽", hints: ["PSG 미드필더", "2019 U-20 황금공", "마요르카 출신"] },
];

const ALL_COUNTRIES = [...new Set(PLAYERS.map(p => p.country))];

let score = 0, timeLeft = 20, streak = 0, bestStreak = 0;
let totalQ = 0, correctQ = 0;
let timerInterval, questionTimeout;
let usedIndices = [], currentAnswer = '';
let answered = false;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getPlayer() {
  if (usedIndices.length === PLAYERS.length) usedIndices = [];
  const available = PLAYERS.map((_, i) => i).filter(i => !usedIndices.includes(i));
  const idx = available[Math.floor(Math.random() * available.length)];
  usedIndices.push(idx);
  return PLAYERS[idx];
}

function getOptions(correct) {
  const wrong = shuffle(ALL_COUNTRIES.filter(c => c !== correct)).slice(0, 3);
  return shuffle([correct, ...wrong]);
}

function setQuestion() {
  if (timeLeft <= 0) return;
  answered = false;
  const player = getPlayer();
  currentAnswer = player.country;
  totalQ++;

  document.getElementById('player-emoji').textContent = player.emoji;
  document.getElementById('player-name').textContent = player.name;
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';

  const hintsEl = document.getElementById('hints');
  hintsEl.innerHTML = player.hints.map(h => `<span class="hint-chip">${h}</span>`).join('');

  const opts = getOptions(player.country);
  const optEl = document.getElementById('options');
  optEl.innerHTML = opts.map(o => `
    <button class="opt-btn" onclick="answer(this, '${o.replace(/'/g,"\\'")}')">
      ${o}
    </button>
  `).join('');
}

function answer(btn, selected) {
  if (answered || timeLeft <= 0) return;
  answered = true;

  document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);

  const fb = document.getElementById('feedback');
  if (selected === currentAnswer) {
    streak++;
    if (streak > bestStreak) bestStreak = streak;
    const bonus = Math.floor(streak / 3);
    const pts = 100 + bonus * 50;
    score += pts;
    correctQ++;
    sfxCorrect(); btn.classList.add('correct');
    fb.className = 'feedback correct';
    fb.textContent = streak >= 3 ? `🔥 정답! +${pts}점 (콤보!)` : `✅ 정답! +${pts}점`;
  } else {
    streak = 0;
    sfxWrong(); btn.classList.add('wrong');
    // highlight correct
    document.querySelectorAll('.opt-btn').forEach(b => {
      if (b.textContent.trim() === currentAnswer) b.classList.add('correct');
    });
    fb.className = 'feedback wrong';
    fb.textContent = `❌ 오답! 정답: ${currentAnswer}`;
  }

  updateHUD();
  setTimeout(setQuestion, 900);
}

function updateHUD() {
  document.getElementById('score-val').textContent = score;
  document.getElementById('streak-val').textContent = streak;
}

function startGame() {
  score = 0; timeLeft = 20; streak = 0; bestStreak = 0;
  totalQ = 0; correctQ = 0; usedIndices = [];

  document.getElementById('game-area').style.display = 'flex';
  document.getElementById('result-screen').classList.remove('show');
  document.getElementById("timer-val").textContent = 20;
  document.getElementById('score-val').textContent = 0;
  document.getElementById('streak-val').textContent = 0;

  const bar = document.getElementById('timer-bar');
  bar.style.width = '100%';
  bar.style.background = '#3b82f6';

  setQuestion();

  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timeLeft--;
    document.getElementById('timer-val').textContent = timeLeft;
    bar.style.width = (timeLeft / 30 * 100) + '%';

    if (timeLeft <= 10) bar.style.background = '#ef4444';
    else if (timeLeft <= 20) bar.style.background = '#f59e0b';

    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      showResult();
    }
  }, 1000);
}

function showResult() {
  document.getElementById('game-area').style.display = 'none';
  const rs = document.getElementById('result-screen');
  rs.classList.add('show');

  const pct = totalQ > 0 ? Math.round(correctQ / totalQ * 100) : 0;
  let trophy = '😅', title = '아직 연습이 필요해요!', msg = '월드컵 선수들을 더 알아보세요!';
  if (score >= 1500) { trophy = '🏆'; title = '월드컵 전문가!'; msg = '완벽한 축구 지식이에요!'; }
  else if (score >= 800) { trophy = '🥇'; title = '훌륭해요!'; msg = '대단한 축구 지식이에요!'; }
  else if (score >= 400) { trophy = '🥈'; title = '잘 했어요!'; msg = '꽤 많은 선수를 알고 있네요!'; }
  else if (score >= 200) { trophy = '🥉'; title = '나쁘지 않아요!'; msg = '조금 더 연습하면 완벽해요!'; }

  document.getElementById('result-trophy').textContent = trophy;
  document.getElementById('result-title').textContent = title;
  document.getElementById('result-score').textContent = score + '점';
  document.getElementById('result-msg').textContent = msg + ` (정확도 ${pct}%)`;
  document.getElementById('stat-correct').textContent = correctQ;
  document.getElementById('stat-total').textContent = totalQ;
  document.getElementById('stat-best').textContent = bestStreak;
}

startGame();
</script>
