    .feedback {

    .feedback.correct { color: var(--correct); }
    .feedback.wrong { color: var(--wrong); }

    /* OPTIONS */
    .options {
      display: grid;

      gap: 12px;
      width: 100%;
      max-width: 600px;

    .opt-btn {

      align-items: center;

    .opt-btn:hover:not(:disabled) {

    .game-area { width: 100%; display: flex; flex-direction: column; align-items: center; }
  </style>

  { name: "мјҖл№Ҳ лҚ° лёҢлЈЁмқҙл„Ҳ", country: "рҹҮ§рҹҮӘ лІЁкё°м—җ", emoji: "рҹҺҜ", hints: ["нҢЁмҠӨ л§ҲмҠӨн„°", "л§ЁмӢңнӢ° лҜёл“ңн•„лҚ”", "м ҒнҳҲл§Ҳ"] },
  { name: "л№„лҘҙнһҗ нҢҗ лӢӨмқҙнҒ¬", country: "рҹҮірҹҮұ л„ӨлҚңлһҖл“ң", emoji: "рҹ—ј", hints: ["лҰ¬лІ„н’Җ мҲҳл№„мҲҳ", "189cm", "мҳӨл Ңм§Җ кө°лӢЁ"] },
  { name: "лӘЁн•ҳл©”л“ң мӮҙлқј", country: "рҹҮӘрҹҮ¬ мқҙм§‘нҠё", emoji: "рҹҢҷ", hints: ["мқҙм§‘нҠёмқҳ мҷ•", "лҰ¬лІ„н’Җ", "мҷјл°ңмһЎмқҙ мңҷм–ҙ"] },
  { name: "мҶҗнқҘлҜј", country: "рҹҮ°рҹҮ· лҢҖн•ңлҜјкөӯ", emoji: "рҹҰҒ", hints: ["нҶ нҠёл„ҳ м „м„Ө", "н”„лҰ¬лҜём–ҙлҰ¬к·ё л“қм җмҷ•", "мҷјл°ңмһЎмқҙ"] },
  { name: "лЈЁм№ҙ лӘЁл“ңлҰ¬м№ҳ", country: "рҹҮӯрҹҮ· нҒ¬лЎңм•„нӢ°м•„", emoji: "рҹҢҹ", hints: ["2018 нҷ©кёҲкіө", "л Ҳм•Ң лҜёл“ңн•„лҚ”", "мІҙмҠӨ мІңмһ¬"] },
  { name: "лЎңлІ лҘҙнҠё л Ҳл°ҳлҸ„н”„мҠӨнӮӨ", country: "рҹҮөрҹҮұ нҸҙлһҖл“ң", emoji: "рҹҺҜ", hints: ["л¶„лҚ°мҠӨлҰ¬к°Җ л“қм җмҷ•", "л°”мқҙм—җлҘё м¶ңмӢ ", "л°”лҘҙм…ҖлЎңлӮҳ"] },
  { name: "н•ҙлҰ¬ мјҖмқё", country: "рҹҸҙу Ғ§у Ғўу ҒҘу Ғ®у Ғ§у Ғҝ мһүкёҖлһңл“ң", emoji: "рҹ‘‘", hints: ["нҶ нҠёл„ҳ м „м„Ө", "л°”мқҙм—җлҘё л®Ңн—Ё", "мһүкёҖлһңл“ң мҠӨнҠёлқјмқҙм»Ө"] },
  { name: "м•ҢлҰ¬мҶЎ лІ мјҖлҘҙ", country: "рҹҮ§рҹҮ· лёҢлқјм§Ҳ", emoji: "рҹ§Ө", hints: ["лҰ¬лІ„н’Җ кіЁнӮӨнҚј", "м„ёкі„ мөңкі  GK", "2019 UCL мҡ°мҠ№"] },
  { name: "л§ҲлҲ„м—ҳ л…ёмқҙм–ҙ", country: "рҹҮ©рҹҮӘ лҸ…мқј", emoji: "рҹ§ұ", hints: ["мҠӨмң„нҚј-нӮӨнҚј", "л°”мқҙм—җлҘё", "2014 мӣ”л“ңм»ө мҡ°мҠ№"] },
  { name: "нҢҢмҡёлЎң л””л°ңлқј", country: "рҹҮҰрҹҮ· м•„лҘҙн—ЁнӢ°лӮҳ", emoji: "рҹ’Һ", hints: ["лқјнҳём•ј", "лЎңл§Ҳ кіөкІ©мҲҳ", "нғҖнҲ¬ л§ҺмқҢ"] },
  { name: "м•ҲнҶ мқё к·ёлҰ¬мҰҲл§Ң", country: "рҹҮ«рҹҮ· н”„лһ‘мҠӨ", emoji: "рҹ’ғ", hints: ["м¶Ө м„ёлҰ¬лЁёлӢҲ", "м•„нӢҖл ҲнӢ°мҪ” л§Ҳл“ңлҰ¬л“ң", "2018 мҡ°мҠ№"] },
  { name: "л¶Җм№ҙмҡ” мӮ¬м№ҙ", country: "рҹҸҙу Ғ§у Ғўу ҒҘу Ғ®у Ғ§у Ғҝ мһүкёҖлһңл“ң", emoji: "рҹҡҖ", hints: ["м•„мҠӨлӮ  м—җмқҙмҠӨ", "л©ҖнӢ° нҸ¬м§Җм…ҳ", "м–ҙлҰ° мҠӨнғҖ"] },
  { name: "нҺҳл“ңлҰ¬", country: "рҹҮӘрҹҮё мҠӨнҺҳмқё", emoji: "рҹҺӯ", hints: ["л°”лҘҙм…ҖлЎңлӮҳ лҜёл“ңн•„лҚ”", "м–ҙлҰ° мІңмһ¬", "2020 мҳ¬лҰјн”Ҫ"] },
  { name: "л№ҲмҠӨн”„л Ҳмһ„ мқҢл°”мқҙмҳӨ", country: "рҹҮЁрҹҮІ м№ҙл©”лЈ¬", emoji: "рҹҰҒ", hints: ["м•„н”„лҰ¬м№ҙ к°•нҳё", "л¶Ҳкөҙмқҳ мӮ¬мһҗ", "л…ёлһҖ мң лӢҲнҸј"] },
  { name: "мқҙк°•мқё", country: "рҹҮ°рҹҮ· лҢҖн•ңлҜјкөӯ", emoji: "вҡҪ", hints: ["PSG лҜёл“ңн•„лҚ”", "2019 U-20 нҷ©кёҲкіө", "л§Ҳмҡ”лҘҙм№ҙ м¶ңмӢ "] },
];

const ALL_COUNTRIES = [...new Set(PLAYERS.map(p => p.country))];

let score = 0, timeLeft = 30, streak = 0, bestStreak = 0;
let totalQ = 0, correctQ = 0;
let timerInterval, questionTimeout;
let usedIndices = [], currentAnswer = '';
let answered = false;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getPlayer() {
  if (usedIndices.length === PLAYERS.length) usedIndices = [];
  const available = PLAYERS.map((_, i) => i).filter(i => !usedIndices.includes(i));
  const idx = available[Math.floor(Math.random() * available.length)];
  usedIndices.push(idx);
  return PLAYERS[idx];
}

function getOptions(correct) {
  const wrong = shuffle(ALL_COUNTRIES.filter(c => c !== correct)).slice(0, 3);
  return shuffle([correct, ...wrong]);
}

function setQuestion() {
  if (timeLeft <= 0) return;
  answered = false;
  const player = getPlayer();
  currentAnswer = player.country;
  totalQ++;

  document.getElementById('player-emoji').textContent = player.emoji;
  document.getElementById('player-name').textContent = player.name;
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';

  const hintsEl = document.getElementById('hints');
  hintsEl.innerHTML = player.hints.map(h => `<span class="hint-chip">${h}</span>`).join('');

  const opts = getOptions(player.country);
  const optEl = document.getElementById('options');
  optEl.innerHTML = opts.map(o => `
    <button class="opt-btn" onclick="answer(this, '${o.replace(/'/g,"\\'")}')">
      ${o}
    </button>
  `).join('');
}

function answer(btn, selected) {
  if (answered || timeLeft <= 0) return;
  answered = true;

  document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);

  const fb = document.getElementById('feedback');
  if (selected === currentAnswer) {
    streak++;
    if (streak > bestStreak) bestStreak = streak;
    const bonus = Math.floor(streak / 3);
    const pts = 100 + bonus * 50;
    score += pts;
    correctQ++;
    btn.classList.add('correct');
    fb.className = 'feedback correct';
    fb.textContent = streak >= 3 ? `рҹ”Ҙ м •лӢө! +${pts}м җ (мҪӨліҙ!)` : `вң… м •лӢө! +${pts}м җ`;
  } else {
    streak = 0;
    btn.classList.add('wrong');
    // highlight correct
    document.querySelectorAll('.opt-btn').forEach(b => {
      if (b.textContent.trim() === currentAnswer) b.classList.add('correct');
    });
    fb.className = 'feedback wrong';
    fb.textContent = `вқҢ мҳӨлӢө! м •лӢө: ${currentAnswer}`;
  }

  updateHUD();
  setTimeout(setQuestion, 900);
}

function updateHUD() {
  document.getElementById('score-val').textContent = score;
  document.getElementById('streak-val').textContent = streak;
}

function startGame() {
  score = 0; timeLeft = 30; streak = 0; bestStreak = 0;
  totalQ = 0; correctQ = 0; usedIndices = [];

  document.getElementById('game-area').style.display = 'flex';
  document.getElementById('result-screen').classList.remove('show');
  document.getElementById('timer-val').textContent = 30;
  document.getElementById('score-val').textContent = 0;
  document.getElementById('streak-val').textContent = 0;

  const bar = document.getElementById('timer-bar');
  bar.style.width = '100%';
  bar.style.background = '#3b82f6';

  setQuestion();

  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timeLeft--;
    document.getElementById('timer-val').textContent = timeLeft;
    bar.style.width = (timeLeft / 30 * 100) + '%';

    if (timeLeft <= 10) bar.style.background = '#ef4444';
    else if (timeLeft <= 20) bar.style.background = '#f59e0b';

    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      showResult();
    }
  }, 1000);
}

function showResult() {
  document.getElementById('game-area').style.display = 'none';
  const rs = document.getElementById('result-screen');
  rs.classList.add('show');

  const pct = totalQ > 0 ? Math.round(correctQ / totalQ * 100) : 0;
  let trophy = 'рҹҳ…', title = 'м•„м§Ғ м—°мҠөмқҙ н•„мҡ”н•ҙмҡ”!', msg = 'мӣ”л“ңм»ө м„ мҲҳл“Өмқ„ лҚ” м•Ңм•„ліҙм„ёмҡ”!';
  if (score >= 1500) { trophy = 'рҹҸҶ'; title = 'мӣ”л“ңм»ө м „л¬ёк°Җ!'; msg = 'мҷ„лІҪн•ң м¶•кө¬ м§ҖмӢқмқҙм—җмҡ”!'; }
  else if (score >= 800) { trophy = 'рҹҘҮ'; title = 'нӣҢлҘӯн•ҙмҡ”!'; msg = 'лҢҖлӢЁн•ң м¶•кө¬ м§ҖмӢқмқҙм—җмҡ”!'; }
  else if (score >= 400) { trophy = 'рҹҘҲ'; title = 'мһҳ н–Ҳм–ҙмҡ”!'; msg = 'кҪӨ л§ҺмқҖ м„ мҲҳлҘј м•Ңкі  мһҲл„Өмҡ”!'; }
  else if (score >= 200) { trophy = 'рҹҘү'; title = 'лӮҳмҒҳм§Җ м•Ҡм•„мҡ”!'; msg = 'мЎ°кёҲ лҚ” м—°мҠөн•ҳл©ҙ мҷ„лІҪн•ҙмҡ”!'; }

  document.getElementById('result-trophy').textContent = trophy;
  document.getElementById('result-title').textContent = title;
  document.getElementById('result-score').textContent = score + 'м җ';
  document.getElementById('result-msg').textContent = msg + ` (м •нҷ•лҸ„ ${pct}%)`;
  document.getElementById('stat-correct').textContent = correctQ;
  document.getElementById('stat-total').textContent = totalQ;
  document.getElementById('stat-best').textContent = bestStreak;
}

startGame();
</script>
