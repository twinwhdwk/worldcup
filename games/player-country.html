<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🕵️ 이 선수 어느 나라?</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;700&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue: #3b82f6; --dark: #080810; --card: #10111e;
      --text: #f0f0f0; --muted: #555; --muted2: #888;
      --correct: #22c55e; --wrong: #ef4444; --gold: #FFD700;
    }
    body { background: var(--dark); color: var(--text); font-family: 'Noto Sans KR', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 16px 16px 80px; }

    /* Splash */
    .splash { position: fixed; inset: 0; background: var(--dark); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.4s; }
    .splash.out { opacity: 0; pointer-events: none; }
    .splash-ball { font-size: 64px; animation: bounce 0.6s ease infinite alternate; }
    @keyframes bounce { to { transform: translateY(-20px) rotate(20deg); } }
    .splash-bar-wrap { width: 200px; height: 4px; background: rgba(255,255,255,0.08); border-radius: 100px; margin-top: 24px; overflow: hidden; }
    .splash-bar { height: 100%; background: var(--blue); border-radius: 100px; animation: loadBar 0.8s ease forwards; }
    @keyframes loadBar { from{width:0%} to{width:100%} }

    .back { align-self: flex-start; color: var(--muted); text-decoration: none; font-size: 13px; margin-bottom: 16px; }
    h1 {
      font-family: 'Black Han Sans', sans-serif; font-size: clamp(26px, 5vw, 44px);
      text-align: center; margin-bottom: 6px;
      background: linear-gradient(135deg, #fff, var(--blue));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .subtitle { color: var(--muted2); font-size: 13px; text-align: center; margin-bottom: 20px; }

    /* HUD */
    .hud { display: flex; gap: 10px; margin-bottom: 14px; width: 100%; max-width: 580px; }
    .hud-box { flex: 1; background: var(--card); border: 1px solid rgba(255,255,255,0.06); border-radius: 14px; padding: 12px 8px; text-align: center; }
    .hud-label { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
    .hud-value { font-family: 'Black Han Sans', sans-serif; font-size: 28px; margin-top: 2px; }
    #timer-val { color: var(--blue); }
    #score-val { color: var(--gold); }
    #streak-val { color: var(--correct); }

    /* Timer bar */
    .timer-bar-wrap { width: 100%; max-width: 580px; height: 6px; background: rgba(255,255,255,0.06); border-radius: 100px; margin-bottom: 16px; overflow: hidden; }
    #timer-bar { height: 100%; background: var(--blue); border-radius: 100px; transition: width 1s linear, background 0.3s; width: 100%; }

    /* Combo banner */
    .combo-banner {
      height: 28px; width: 100%; max-width: 580px; text-align: center;
      font-weight: 700; font-size: 15px; margin-bottom: 8px;
      transition: all 0.3s;
    }

    /* Question card */
    .q-card {
      background: var(--card); border: 1px solid rgba(255,255,255,0.07);
      border-radius: 24px; padding: 32px 24px; width: 100%; max-width: 580px;
      text-align: center; margin-bottom: 16px; position: relative;
    }
    .diff-badge { font-size: 14px; min-height: 20px; margin-bottom: 6px; }
    .player-emoji { font-size: 64px; margin-bottom: 12px; display: block; }
    .player-name { font-family: 'Black Han Sans', sans-serif; font-size: clamp(24px, 5vw, 36px); margin-bottom: 16px; letter-spacing: -1px; }

    /* Progressive hints */
    .hints-wrap { margin-bottom: 14px; }
    .hint-row { display: flex; flex-wrap: wrap; gap: 7px; justify-content: center; margin-bottom: 8px; }
    .hint-chip { background: rgba(59,130,246,0.12); border: 1px solid rgba(59,130,246,0.25); color: var(--blue); font-size: 12px; padding: 5px 13px; border-radius: 100px; animation: chipIn 0.3s ease; }
    @keyframes chipIn { from{transform:scale(0.7);opacity:0} to{transform:scale(1);opacity:1} }
    .hint-locked { background: rgba(255,255,255,0.04); border: 1px dashed rgba(255,255,255,0.1); color: var(--muted); font-size: 12px; padding: 5px 13px; border-radius: 100px; cursor: pointer; transition: all 0.2s; }
    .hint-locked:hover { border-color: rgba(59,130,246,0.4); color: var(--blue); }

    .feedback { font-size: 20px; font-weight: 700; height: 28px; display: flex; align-items: center; justify-content: center; gap: 6px; }
    .feedback.correct { color: var(--correct); }
    .feedback.wrong   { color: var(--wrong); }

    /* Options */
    .options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; max-width: 580px; }
    .opt-btn {
      background: var(--card); border: 2px solid rgba(255,255,255,0.07); border-radius: 14px;
      padding: 14px 10px; font-size: 15px; font-weight: 700; color: var(--text);
      cursor: pointer; transition: all 0.15s; font-family: 'Noto Sans KR', sans-serif;
      display: flex; align-items: center; justify-content: center; gap: 8px; min-height: 60px;
      -webkit-tap-highlight-color: transparent;
    }
    .opt-btn .flag { font-size: 22px; }
    .opt-btn:hover:not(:disabled) { border-color: var(--blue); background: rgba(59,130,246,0.1); transform: scale(1.02); }
    .opt-btn.correct { border-color: var(--correct); background: rgba(34,197,94,0.15); color: var(--correct); }
    .opt-btn.wrong   { border-color: var(--wrong); background: rgba(239,68,68,0.15); color: var(--wrong); }
    .opt-btn:disabled { cursor: not-allowed; }

    /* Speed indicator */
    .speed-indicator { position: fixed; top: 20px; right: 16px; font-family: 'Black Han Sans', sans-serif; font-size: 18px; color: #f59e0b; pointer-events: none; z-index: 999; opacity: 0; }
    @keyframes speedPop { 0%{opacity:1;transform:translateY(0) scale(1.2)} 100%{opacity:0;transform:translateY(-44px) scale(0.8)} }
    .speed-indicator.show { animation: speedPop 0.8s ease forwards; }

    /* Confetti */
    @keyframes floatUp { to { transform: translateY(-80px); opacity: 0; } }

    /* Result */
    .result-screen { display: none; flex-direction: column; align-items: center; text-align: center; width: 100%; max-width: 580px; }
    .result-screen.show { display: flex; }
    .result-trophy { font-size: 80px; margin-bottom: 14px; }
    .result-grade { font-family: 'Black Han Sans', sans-serif; font-size: 52px; margin-bottom: 4px; }
    .result-title { font-family: 'Black Han Sans', sans-serif; font-size: 32px; margin-bottom: 6px; }
    .result-score { font-size: 56px; font-family: 'Black Han Sans', sans-serif; color: var(--gold); margin: 10px 0; }
    .result-msg { color: var(--muted2); font-size: 14px; margin-bottom: 20px; }
    .result-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 24px; width: 100%; }
    .stat-box { background: var(--card); border: 1px solid rgba(255,255,255,0.06); border-radius: 14px; padding: 14px; text-align: center; }
    .stat-val { font-family: 'Black Han Sans', sans-serif; font-size: 28px; color: var(--blue); }
    .stat-label { font-size: 11px; color: var(--muted); margin-top: 3px; }
    .btn-restart { background: var(--blue); color: #fff; border: none; border-radius: 100px; padding: 15px 44px; font-size: 17px; font-weight: 700; cursor: pointer; transition: opacity 0.2s, transform 0.15s; }
    .btn-restart:hover { opacity: 0.85; transform: scale(1.03); }

    /* Bottom nav */
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(8,8,16,0.96); border-top: 1px solid rgba(255,255,255,0.07); display: flex; justify-content: space-around; padding: 10px 8px; z-index: 500; backdrop-filter: blur(10px); }
    .nav-item { display: flex; flex-direction: column; align-items: center; text-decoration: none; color: var(--muted); font-size: 10px; gap: 3px; flex: 1; transition: color 0.2s; -webkit-tap-highlight-color: transparent; }
    .nav-item.active { color: var(--gold); }
    .nav-item:hover { color: #fff; }
    .nav-icon { font-size: 20px; }

    @media (max-width: 480px) {
      body { padding: 12px 12px 80px; }
      .options { gap: 8px; }
      .opt-btn { padding: 12px 6px; font-size: 13px; min-height: 54px; }
      .q-card { padding: 24px 16px; }
    }
  </style>
</head>
<body>

<div class="splash" id="splash">

<script>
async function fbAutoSubmit(s,gameName){
  const nm=localStorage.getItem('wc_player_name')||'';if(!nm)return;
  const fbUrl=localStorage.getItem('wc_fb_url')||'';if(!fbUrl.startsWith('https://'))return;
  try{const enc=n=>n.replace(/[.#$[\]]/g,'_'),FB=fbUrl+'/wc_live',en=enc(nm);
    const cur=await fetch(FB+'/scores/'+en+'.json').then(r=>r.json())||{};
    await fetch(FB+'/scores/'+en+'.json',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:nm,total:(cur.total||0)+s,correct:(cur.correct||0)+1,streak:cur.streak||0,lastGame:gameName})});
  }catch(e){}
}
function goToScoreboard(s){
  const fbUrl=localStorage.getItem('wc_fb_url')||'';
  if(fbUrl.startsWith('https://'))location.href='../scoreboard.html?db='+btoa(fbUrl);
  else{const n=localStorage.getItem('wc_player_name')||'';location.href='../scoreboard.html'+(n?`?prefill=${encodeURIComponent(n)}&score=${s}`:'');}
}

// ── Audio ────────────────────────────────────────
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let _ctx = null;
function getCtx(){ if(!_ctx) _ctx = new AudioCtx(); if(_ctx.state==='suspended') _ctx.resume(); return _ctx; }
function playTone(f,t,d,v=0.3){ try{ const c=getCtx(),o=c.createOscillator(),g=c.createGain(); o.connect(g);g.connect(c.destination); o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+d);o.start();o.stop(c.currentTime+d); }catch(e){} }
function sfxCorrect(){ playTone(523,'sine',0.12,0.35); setTimeout(()=>playTone(659,'sine',0.12,0.35),80); setTimeout(()=>playTone(784,'sine',0.18,0.35),160); }
function sfxWrong(){ playTone(220,'sawtooth',0.25,0.25); setTimeout(()=>playTone(180,'sawtooth',0.2,0.2),120); }

// ── Confetti ─────────────────────────────────────
function launchConfetti(x,y,n=16){ const cols=['#FFD700','#00843D','#ef4444','#3b82f6','#a855f7','#fff']; for(let i=0;i<n;i++){ const el=document.createElement('div'); el.style.cssText=`position:fixed;width:${5+Math.random()*7}px;height:${5+Math.random()*7}px;background:${cols[Math.floor(Math.random()*cols.length)]};border-radius:${Math.random()>.5?'50%':'2px'};left:${x}px;top:${y}px;pointer-events:none;z-index:9998;`; document.body.appendChild(el); const a=Math.random()*360*Math.PI/180,sp=70+Math.random()*120; let px=x,py=y,vy=Math.sin(a)*sp-60,vx=Math.cos(a)*sp,t=0; const tick=()=>{t+=0.016;px+=vx*0.016;vy+=200*0.016;py+=vy*0.016;el.style.left=px+'px';el.style.top=py+'px';el.style.opacity=Math.max(0,1-t*1.4);el.style.transform=`rotate(${t*200}deg)`;if(t<0.9)requestAnimationFrame(tick);else el.remove();}; requestAnimationFrame(tick); } }
function launchFullConfetti(){ for(let i=0;i<5;i++) setTimeout(()=>launchConfetti(Math.random()*window.innerWidth,-10,10),i*120); }

// ── Combo ────────────────────────────────────────
const COMBO_TIERS = [
  {min:0,  mult:1,   label:'',             color:'#aaa'},
  {min:3,  mult:1.5, label:'🔥 COMBO x1.5', color:'#f97316'},
  {min:5,  mult:2,   label:'💥 DOUBLE x2',  color:'#ef4444'},
  {min:8,  mult:3,   label:'⚡ TRIPLE x3',  color:'#a855f7'},
  {min:12, mult:4,   label:'🌟 GOD MODE x4',color:'#FFD700'},
];
function getCombo(s){ let t=COMBO_TIERS[0]; for(const c of COMBO_TIERS) if(s>=c.min) t=c; return t; }

// ── Speed bonus ───────────────────────────────────
let qStartTime = 0;
function getSpeedBonus(base){ const el=(Date.now()-qStartTime)/1000; if(el<2) return Math.round(base*0.5); if(el<4) return Math.round(base*0.25); return 0; }

const ALL_COUNTRIES = [...new Set(PLAYERS.map(p=>p.country))];

let score=0, timeLeft=20, streak=0, bestStreak=0, totalQ=0, correctQ=0;
let timerInterval, currentPlayer=null, answered=false;
let usedIdx=[], hintLevel=0;

function shuffle(a){ const r=[...a]; for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];} return r; }

function getPlayer(){
  if(usedIdx.length===PLAYERS.length) usedIdx=[];
  const avail=PLAYERS.map((_,i)=>i).filter(i=>!usedIdx.includes(i));
  const idx=avail[Math.floor(Math.random()*avail.length)];
  usedIdx.push(idx); return PLAYERS[idx];
}

function getOptions(correct){
  const wrong=shuffle(ALL_COUNTRIES.filter(c=>c!==correct)).slice(0,3);
  return shuffle([correct,...wrong]);
}

function renderHints(player, level){
  // Always show hint[0], reveal more over time
  const row1=document.getElementById('hint-row-1');
  const row2=document.getElementById('hint-row-2');
  row1.innerHTML='';
  row2.innerHTML='';
  player.hints.forEach((h,i)=>{
    const chip=document.createElement('span');
    if(i===0 || i<level+1){
      chip.className='hint-chip'; chip.textContent=h;
      (i<2?row1:row2).appendChild(chip);
    } else {
      chip.className='hint-locked';
      chip.textContent='💡 힌트 '+( i+1);
      chip.title='클릭하면 힌트 공개 (-20점)';
      chip.onclick=()=>{
        if(answered) return;
        score=Math.max(0,score-20);
        document.getElementById('score-val').textContent=score;
        hintLevel=Math.max(hintLevel,i);
        renderHints(player,i);
      };
      (i<2?row1:row2).appendChild(chip);
    }
  });
}

function setQuestion(){
  if(timeLeft<=0) return;
  answered=false; hintLevel=0;
  qStartTime=Date.now();
  currentPlayer=getPlayer();
  totalQ++;

  // Diff badge
  const diffEl=document.getElementById('diff-badge');
  const stars='⭐'.repeat(currentPlayer.diff);
  const diffCols={1:'#22c55e',2:'#f59e0b',3:'#ef4444',4:'#a855f7'};
  diffEl.innerHTML=`<span style="color:${diffCols[currentPlayer.diff]}">${stars}</span>`;

  document.getElementById('player-emoji').textContent=currentPlayer.emoji;
  document.getElementById('player-name').textContent=currentPlayer.name;
  document.getElementById('feedback').textContent='';
  document.getElementById('feedback').className='feedback';

  renderHints(currentPlayer, 0);

  // Progressive hint timer — reveal next hint every 5s
  let autoHintTimer=0;
  const autoReveal=setInterval(()=>{
    if(answered||timeLeft<=0){clearInterval(autoReveal);return;}
    autoHintTimer++;
    if(autoHintTimer>=1&&hintLevel<currentPlayer.hints.length-1){
      hintLevel++;
      renderHints(currentPlayer,hintLevel);
    }
  },5000);

  const opts=getOptions(currentPlayer.country);
  const optEl=document.getElementById('options');
  optEl.innerHTML=opts.map(o=>{
    const flagMatch=o.match(/^(\S+)/);
    const flag=flagMatch?flagMatch[1]:'';
    const name=o.replace(/^\S+\s*/,'');
    return `<button class="opt-btn" onclick="answer(this,'${o.replace(/'/g,"\\'")}')">
      <span class="flag">${flag}</span>${name}
    </button>`;
  }).join('');
}

function answer(btn, selected){
  if(answered||timeLeft<=0) return;
  answered=true;
  document.querySelectorAll('.opt-btn').forEach(b=>b.disabled=true);
  const fb=document.getElementById('feedback');
  if(selected===currentPlayer.country){
    streak++;
    if(streak>bestStreak) bestStreak=streak;
    const combo=getCombo(streak);
    const base=Math.round(100*combo.mult*(currentPlayer.diff));
    const spBonus=getSpeedBonus(base);
    const pts=base+spBonus;
    score+=pts; correctQ++;
    sfxCorrect(); launchFullConfetti();
    btn.classList.add('correct');
    fb.className='feedback correct';
    fb.textContent=combo.label?`${combo.label} +${pts}점`:`✅ 정답! +${pts}점`;
    if(spBonus>0){
      const si=document.getElementById('speed-indicator');
      si.className='speed-indicator'; void si.offsetWidth;
      si.textContent=spBonus>40?'⚡ SUPER FAST!':'⚡ FAST!';
      si.className='speed-indicator show';
    }
    // Combo banner
    const cb=document.getElementById('combo-banner');
    if(combo.label){ cb.textContent=combo.label; cb.style.color=combo.color; }
    else cb.textContent='';
  } else {
    streak=0;
    sfxWrong();
    btn.classList.add('wrong');
    document.querySelectorAll('.opt-btn').forEach(b=>{
      const t=b.textContent.trim();
      if(t.includes(currentPlayer.country.replace(/^\S+\s*/,''))) b.classList.add('correct');
    });
    fb.className='feedback wrong';
    fb.textContent=`❌ 오답! 정답: ${currentPlayer.flag} ${currentPlayer.country.replace(/^\S+\s*/,'')}`;
    document.getElementById('combo-banner').textContent='';
  }
  document.getElementById('score-val').textContent=score;
  document.getElementById('streak-val').textContent=streak;
  setTimeout(setQuestion, 950);
}

function startGame(){
  score=0;timeLeft=20;streak=0;bestStreak=0;totalQ=0;correctQ=0;usedIdx=[];
  document.getElementById('game-area').style.display='flex';
  document.getElementById('result-screen').classList.remove('show');
  document.getElementById('timer-val').textContent=20;
  document.getElementById('score-val').textContent=0;
  document.getElementById('streak-val').textContent=0;
  document.getElementById('combo-banner').textContent='';
  const bar=document.getElementById('timer-bar');
  bar.style.width='100%'; bar.style.background='var(--blue)';
  setQuestion();
  clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    timeLeft--;
    document.getElementById('timer-val').textContent=timeLeft;
    bar.style.width=(timeLeft/20*100)+'%';
    if(timeLeft<=5) bar.style.background='#ef4444';
    else if(timeLeft<=10) bar.style.background='#f59e0b';
    if(timeLeft<=0){ clearInterval(timerInterval); showResult(); }
  },1000);
}

function showResult(){
  fbAutoSubmit(score,'이 선수 어느 나라?');
  document.getElementById('game-area').style.display='none';
  document.getElementById('result-screen').classList.add('show');
  const pct=totalQ>0?Math.round(correctQ/totalQ*100):0;
  const GRADES=[
    {min:1400,g:'S',c:'#FFD700',t:'🌟 레전드!',        m:'완벽한 축구 지식이에요!'},
    {min:1000,g:'A',c:'#22c55e',t:'🥇 월드컵 전문가!', m:'훌륭한 실력이에요!'},
    {min:600, g:'B',c:'#3b82f6',t:'🥈 잘 했어요!',     m:'꽤 많이 알고 있네요!'},
    {min:300, g:'C',c:'#f59e0b',t:'🥉 나쁘지 않아요!', m:'더 공부해봐요!'},
    {min:0,   g:'D',c:'#ef4444',t:'😅 더 연습해요!',   m:'월드컵 선수들을 알아보세요!'},
  ];
  const gr=GRADES.find(g=>score>=g.min)||GRADES[GRADES.length-1];
  document.getElementById('result-trophy').textContent=score>=1000?'🏆':score>=600?'🥇':score>=300?'🥈':'😅';
  document.getElementById('result-grade').innerHTML=`<span style="color:${gr.c}">GRADE ${gr.g}</span>`;
  document.getElementById('result-title').textContent=gr.t;
  document.getElementById('result-score').textContent=score.toLocaleString()+'점';
  document.getElementById('result-msg').textContent=gr.m+` (정확도 ${pct}%)`;
  document.getElementById('stat-correct').textContent=correctQ;
  document.getElementById('stat-total').textContent=totalQ;
  document.getElementById('stat-best').textContent=bestStreak;
  document.getElementById('stat-acc').textContent=pct+'%';
}

  const grade = grades.find(g => s >= g[0])?.[1] || 'D';
  const text = `⚽ 월드컵 미니게임 — ${gameName}\nGRADE ${grade} · ${s.toLocaleString()}점\nhttps://twinwhdwk.github.io/worldcup_minigame/`;
  if (navigator.share) {
    navigator.share({ title: '월드컵 미니게임 결과', text }).catch(() => {});
  } else {
    navigator.clipboard.writeText(text).then(() => alert('결과가 클립보드에 복사됐어요!')).catch(() => {});
  }

<div id="name-overlay" style="display:none;position:fixed;inset:0;background:rgba(6,6,15,.96);z-index:9998;flex-direction:column;align-items:center;justify-content:center;padding:24px;gap:0;">

  <div style="color:#888;font-size:13px;text-align:center;max-width:260px;margin-bottom:24px;line-height:1.5;">점수가 실시간 랭킹에<br>자동으로 등록됩니다!</div>
  <input id="no-input" type="text" placeholder="예: 홍길동" maxlength="8" autocomplete="off" style="background:#10111e;border:2px solid rgba(255,255,255,.12);border-radius:14px;padding:14px 20px;font-size:20px;color:#f0f0f0;font-family:'Black Han Sans',sans-serif;text-align:center;outline:none;width:100%;max-width:280px;margin-bottom:12px;">
  <button onclick="saveNameOverlay()" style="background:#00843D;color:#fff;border:none;border-radius:14px;padding:16px;font-size:18px;font-family:'Black Han Sans',sans-serif;cursor:pointer;width:100%;max-width:280px;">✅ 시작하기</button>
  <button onclick="document.getElementById('name-overlay').style.display='none'" style="background:none;border:none;color:#555;font-size:12px;cursor:pointer;margin-top:14px;font-family:'Noto Sans KR',sans-serif;">건너뛰기 (랭킹 미등록)</button>
</div>
<script>
(function(){
  if(!localStorage.getItem('wc_player_name')){
    var o=document.getElementById('name-overlay');o.style.display='flex';
    document.getElementById('no-input').addEventListener('keydown',function(e){if(e.key==='Enter')saveNameOverlay();});
  }
})();
function saveNameOverlay(){
  var n=document.getElementById('no-input').value.trim();
  if(!n){document.getElementById('no-input').focus();return;}
  localStorage.setItem('wc_player_name',n);
  document.getElementById('name-overlay').style.display='none';if(typeof startGame==='function')startGame();}
</script>
