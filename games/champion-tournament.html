<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏆 월드컵 우승국 퀴즈</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;700&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --gold: #FFD700; --dark: #080810; --card: #10111e; --text: #f0f0f0; --muted: #555; --muted2: #888; --correct: #22c55e; --wrong: #ef4444; }
    body { background: var(--dark); color: var(--text); font-family: 'Noto Sans KR', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 16px 16px 80px; }

    .splash { position:fixed;inset:0;background:var(--dark);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity 0.4s; }
    .splash.out{opacity:0;pointer-events:none;}
    .splash-ball{font-size:64px;animation:bounce 0.6s ease infinite alternate;}
    @keyframes bounce{to{transform:translateY(-20px) rotate(20deg);}}
    .splash-bar-wrap{width:200px;height:4px;background:rgba(255,255,255,0.08);border-radius:100px;margin-top:24px;overflow:hidden;}
    .splash-bar{height:100%;background:var(--gold);border-radius:100px;animation:loadBar 0.8s ease forwards;}
    @keyframes loadBar{from{width:0%}to{width:100%}}

    .back { align-self:flex-start; color:var(--muted); text-decoration:none; font-size:13px; margin-bottom:16px; }
    h1 { font-family:'Black Han Sans',sans-serif; font-size:clamp(26px,5vw,44px); text-align:center; margin-bottom:6px; background:linear-gradient(135deg,#fff,var(--gold)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .subtitle { color:var(--muted2); font-size:13px; text-align:center; margin-bottom:20px; }

    /* HUD */
    .hud { display:flex; gap:10px; margin-bottom:14px; width:100%; max-width:620px; }
    .hud-box { flex:1; background:var(--card); border:1px solid rgba(255,255,255,0.06); border-radius:14px; padding:12px 8px; text-align:center; }
    .hud-label { font-size:10px; color:var(--muted); letter-spacing:1px; text-transform:uppercase; }
    .hud-value { font-family:'Black Han Sans',sans-serif; font-size:26px; margin-top:2px; color:var(--gold); }

    /* Progress */
    .progress-wrap { width:100%; max-width:620px; margin-bottom:14px; }
    .prog-labels { display:flex; justify-content:space-between; font-size:11px; color:var(--muted); margin-bottom:6px; }
    .prog-bg { height:8px; background:rgba(255,255,255,0.06); border-radius:100px; overflow:hidden; position:relative; }
    #prog-bar { height:100%; background:linear-gradient(90deg,#b8860b,var(--gold)); border-radius:100px; transition:width 0.5s ease; }
    /* Round pills */
    .rounds { display:flex; gap:6px; width:100%; max-width:620px; margin-bottom:14px; overflow-x:auto; padding-bottom:4px; }
    .r-pill { flex-shrink:0; padding:5px 12px; border-radius:100px; font-size:11px; font-weight:700; border:1px solid rgba(255,255,255,0.08); color:var(--muted); background:var(--card); transition:all 0.3s; }
    .r-pill.active { background:var(--gold); color:#000; border-color:var(--gold); }
    .r-pill.done { background:rgba(34,197,94,0.15); border-color:var(--correct); color:var(--correct); }
    .r-pill.boss { background:rgba(239,68,68,0.15); border-color:#ef4444; color:#ef4444; }

    /* Q Card */
    .q-card { background:var(--card); border:1px solid rgba(255,215,0,0.12); border-radius:24px; padding:36px 24px; width:100%; max-width:620px; text-align:center; margin-bottom:16px; position:relative; overflow:hidden; }
    .q-card::before { content:'🏆'; position:absolute; font-size:180px; opacity:0.025; top:-30px; right:-30px; pointer-events:none; }

    /* Per-question timer bar */
    .q-timer-wrap { width:100%; height:4px; background:rgba(255,255,255,0.06); border-radius:100px; margin-bottom:20px; overflow:hidden; }
    #q-timer-bar { height:100%; background:var(--gold); border-radius:100px; transition:width 0.2s linear; }

    .boss-label { font-size:12px; font-weight:700; letter-spacing:2px; min-height:18px; margin-bottom:6px; }
    .year-badge { display:inline-block; font-family:'Black Han Sans',sans-serif; font-size:52px; padding:8px 32px; border-radius:16px; margin-bottom:14px; transition:all 0.3s; }
    .host-info { font-size:13px; color:var(--muted2); margin-bottom:12px; }

    .hint-row { display:flex; flex-wrap:wrap; gap:7px; justify-content:center; margin-bottom:12px; }
    .hint-chip { background:rgba(255,215,0,0.1); border:1px solid rgba(255,215,0,0.2); color:var(--gold); font-size:12px; padding:5px 12px; border-radius:100px; animation:chipIn 0.3s ease; }
    .hint-chip.scorer { background:rgba(34,197,94,0.1); border-color:rgba(34,197,94,0.2); color:var(--correct); }
    .hint-chip.mvp { background:rgba(168,85,247,0.1); border-color:rgba(168,85,247,0.2); color:#c084fc; }
    @keyframes chipIn{from{transform:scale(0.7);opacity:0}to{transform:scale(1);opacity:1}}

    .reveal-btn { background:transparent; border:1px solid rgba(255,255,255,0.12); color:var(--muted2); font-size:12px; padding:7px 18px; border-radius:100px; cursor:pointer; transition:all 0.2s; margin-bottom:12px; font-family:'Noto Sans KR',sans-serif; }
    .reveal-btn:hover { border-color:var(--gold); color:var(--gold); }
    .extra-hint { font-size:13px; color:#aaa; min-height:18px; line-height:1.5; }
    .feedback-area { font-size:20px; font-weight:700; height:28px; margin-top:8px; }
    .feedback-area.correct { color:var(--correct); }
    .feedback-area.wrong { color:var(--wrong); }

    /* Options */
    .options { display:grid; grid-template-columns:1fr 1fr; gap:10px; width:100%; max-width:620px; }
    .opt-btn { background:var(--card); border:2px solid rgba(255,255,255,0.07); border-radius:16px; padding:18px 12px; font-size:17px; font-weight:700; color:var(--text); cursor:pointer; transition:all 0.15s; font-family:'Noto Sans KR',sans-serif; -webkit-tap-highlight-color:transparent; }
    .opt-btn .flag { font-size:26px; display:block; margin-bottom:6px; }
    .opt-btn:hover:not(:disabled) { border-color:var(--gold); background:rgba(255,215,0,0.08); transform:scale(1.02); }
    .opt-btn.correct { border-color:var(--correct); background:rgba(34,197,94,0.15); }
    .opt-btn.wrong { border-color:var(--wrong); background:rgba(239,68,68,0.15); }
    .opt-btn:disabled { cursor:not-allowed; }

    /* Result */
    .result-screen { display:none; flex-direction:column; align-items:center; text-align:center; width:100%; max-width:620px; }
    .result-screen.show { display:flex; }
    .result-grade { font-family:'Black Han Sans',sans-serif; font-size:56px; margin-bottom:6px; }
    .result-title { font-family:'Black Han Sans',sans-serif; font-size:32px; margin-bottom:8px; }
    .result-score { font-size:56px; font-family:'Black Han Sans',sans-serif; color:var(--gold); margin:10px 0; }
    .result-msg { color:var(--muted2); font-size:14px; margin-bottom:20px; }
    .result-history { width:100%; background:var(--card); border:1px solid rgba(255,255,255,0.06); border-radius:16px; padding:18px; margin-bottom:20px; text-align:left; }
    .rh-hdr { font-size:11px; color:var(--muted); letter-spacing:1px; text-transform:uppercase; margin-bottom:12px; }
    .rh-item { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.04); font-size:13px; }
    .rh-item:last-child{border-bottom:none;}
    .rh-year { color:var(--gold); font-weight:700; min-width:50px; }
    .rh-win { flex:1; padding:0 8px; }
    .btn-restart { background:var(--gold); color:#000; border:none; border-radius:100px; padding:15px 44px; font-size:17px; font-weight:700; cursor:pointer; transition:opacity 0.2s,transform 0.15s; }
    .btn-restart:hover { opacity:0.85; transform:scale(1.03); }

    /* Confetti */
    /* Nav */
    .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(8,8,16,0.96);border-top:1px solid rgba(255,255,255,0.07);display:flex;justify-content:space-around;padding:10px 8px;z-index:500;backdrop-filter:blur(10px);}
    .nav-item{display:flex;flex-direction:column;align-items:center;text-decoration:none;color:var(--muted);font-size:10px;gap:3px;flex:1;transition:color 0.2s;-webkit-tap-highlight-color:transparent;}
    .nav-item.active{color:#FFD700;}
    .nav-icon{font-size:20px;}

    @media(max-width:480px){ body{padding:12px 12px 80px;} .opt-btn{padding:14px 8px;font-size:15px;} .q-card{padding:24px 16px;} .year-badge{font-size:40px;padding:6px 24px;} }
  </style>
</head>
<body>
<div class="splash" id="splash">
  <div class="splash-ball">🏆</div>
  <div style="font-family:'Black Han Sans',sans-serif;font-size:20px;margin-top:18px;color:#fff;">우승국 퀴즈</div>
  <div style="font-size:13px;color:#555;margin-top:6px;">월드컵 미니게임</div>
  <div class="splash-bar-wrap"><div class="splash-bar"></div></div>
</div>

<a href="../index.html" class="back">← 허브로 돌아가기</a>
<h1>🏆 월드컵 우승국 퀴즈</h1>
<p class="subtitle">이 해의 월드컵 우승국을 맞추세요!</p>

<div id="game-area" style="width:100%;display:flex;flex-direction:column;align-items:center;">
  <div class="hud">
    <div class="hud-box"><div class="hud-label">🏅 점수</div><div class="hud-value" id="score-val">0</div></div>
    <div class="hud-box"><div class="hud-label">✅ 정답</div><div class="hud-value" id="correct-val">0</div></div>
    <div class="hud-box"><div class="hud-label">📋 남은</div><div class="hud-value" id="remain-val">10</div></div>
  </div>

  <div class="rounds" id="rounds"></div>

  <div class="progress-wrap">
    <div class="prog-labels"><span id="prog-text">0 / 10</span><span id="prog-pct">0%</span></div>
    <div class="prog-bg"><div id="prog-bar" style="width:0%"></div></div>
  </div>

  <div class="q-card">
    <div class="q-timer-wrap"><div id="q-timer-bar" style="width:100%"></div></div>
    <div class="boss-label" id="boss-label"></div>
    <div class="year-badge" id="year-badge" style="background:var(--gold);color:#000;">????</div>
    <div class="host-info" id="host-info">🌍 개최국: ?</div>
    <div class="hint-row" id="hint-row"></div>
    <button class="reveal-btn" id="reveal-btn" onclick="revealExtra()">💡 추가 힌트 보기</button>
    <div class="extra-hint" id="extra-hint"></div>
    <div class="feedback-area" id="feedback"></div>
  </div>

  <div class="options" id="options"></div>
</div>

<div class="result-screen" id="result-screen">
  <div class="result-grade" id="result-grade">B</div>
  <div class="result-title" id="result-title">완주!</div>
  <div class="result-score" id="result-score">0점</div>
  <div class="result-msg" id="result-msg"></div>
  <div class="result-history"><div class="rh-hdr">📋 내 기록</div><div id="history-list"></div></div>
  <button class="btn-restart" onclick="startGame()">🔄 다시 도전</button>
  <br><br>
  <a href="javascript:void(0)" onclick="goToScoreboard(score)" style="display:inline-flex;align-items:center;gap:8px;background:rgba(255,215,0,0.1);border:1px solid rgba(255,215,0,0.3);border-radius:100px;padding:12px 24px;text-decoration:none;color:#FFD700;font-weight:700;font-size:14px;">🏆 랭킹 보러가기</a>
  
  <br>
  <button onclick="shareResult(score, '우승국 퀴즈')" style="background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:100px;padding:10px 22px;color:var(--muted2);font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .2s;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='var(--muted2)'">📤 결과 공유</button>

  <br><br>
  <a href="../index.html" style="color:var(--muted);font-size:13px;">← 다른 게임 하기</a>
</div>



<script>
async function fbAutoSubmit(s,gameName){
  const nm=localStorage.getItem('wc_player_name')||'';if(!nm)return;
  const fbUrl=localStorage.getItem('wc_fb_url')||'https://worldcup-minigame-default-rtdb.firebaseio.com';if(!fbUrl.startsWith('https://'))return;
  try{const enc=n=>n.replace(/[.#$[\]]/g,'_'),FB=fbUrl+'/wc_live',en=enc(nm);
    const cur=await fetch(FB+'/scores/'+en+'.json').then(r=>r.json())||{};
    await fetch(FB+'/scores/'+en+'.json',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:nm,total:(cur.total||0)+s,correct:(cur.correct||0)+1,streak:cur.streak||0,lastGame:gameName})});
  }catch(e){}
}
function goToScoreboard(s){
  const fbUrl=localStorage.getItem('wc_fb_url')||'https://worldcup-minigame-default-rtdb.firebaseio.com';
  if(fbUrl.startsWith('https://'))location.href='../scoreboard.html?db='+btoa(fbUrl);
  else{const n=localStorage.getItem('wc_player_name')||'';location.href='../scoreboard.html'+(n?`?prefill=${encodeURIComponent(n)}&score=${s}`:'');}
}

// Audio
const AudioCtx=window.AudioContext||window.webkitAudioContext; let _ctx=null;
function getCtx(){if(!_ctx)_ctx=new AudioCtx();if(_ctx.state==='suspended')_ctx.resume();return _ctx;}
function playTone(f,t,d,v=0.3){try{const c=getCtx(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+d);o.start();o.stop(c.currentTime+d);}catch(e){}}
function sfxCorrect(){playTone(523,'sine',0.12,0.35);setTimeout(()=>playTone(659,'sine',0.12,0.35),80);setTimeout(()=>playTone(784,'sine',0.18,0.35),160);}
function sfxWrong(){playTone(220,'sawtooth',0.25,0.25);setTimeout(()=>playTone(180,'sawtooth',0.2,0.2),120);}

// Confetti
function launchConfetti(x,y,n=14){const cols=['#FFD700','#00843D','#ef4444','#3b82f6','#fff'];for(let i=0;i<n;i++){const el=document.createElement('div');el.style.cssText=`position:fixed;width:${5+Math.random()*7}px;height:${5+Math.random()*7}px;background:${cols[Math.floor(Math.random()*cols.length)]};border-radius:${Math.random()>.5?'50%':'2px'};left:${x}px;top:${y}px;pointer-events:none;z-index:9998;`;document.body.appendChild(el);const a=Math.random()*360*Math.PI/180,sp=70+Math.random()*120;let px=x,py=y,vy=Math.sin(a)*sp-60,vx=Math.cos(a)*sp,t=0;const tick=()=>{t+=0.016;px+=vx*0.016;vy+=200*0.016;py+=vy*0.016;el.style.left=px+'px';el.style.top=py+'px';el.style.opacity=Math.max(0,1-t*1.4);el.style.transform=`rotate(${t*200}deg)`;if(t<0.9)requestAnimationFrame(tick);else el.remove();};requestAnimationFrame(tick);}}
function launchFullConfetti(){for(let i=0;i<4;i++)setTimeout(()=>launchConfetti(Math.random()*window.innerWidth,-10,10),i*120);}

const WORLD_CUPS = [
  {year:1930,host:"우루과이",winner:"🇺🇾 우루과이",flag:"🇺🇾",topScorer:"기예르모 스타빌레 (8골)",mvp:"호세 나소치",hints:["첫 번째 월드컵","남미 개최","13개국 참가"],extra:"역대 최소 규모 대회, 우루과이 첫 우승"},
  {year:1934,host:"이탈리아",winner:"🇮🇹 이탈리아",flag:"🇮🇹",topScorer:"올드리히 네예들리 (5골)",mvp:"주세페 메아차",hints:["이탈리아 첫 우승","무솔리니 개최","체코슬로바키아 결승"],extra:"무솔리니의 정치 도구였던 대회. 이탈리아가 연장 끝에 체코슬로바키아 2-1로 꺾고 첫 우승"},
  {year:1938,host:"프랑스",winner:"🇮🇹 이탈리아",flag:"🇮🇹",topScorer:"레오니다스 (7골)",mvp:"레오니다스",hints:["이탈리아 2연속 우승","레오니다스 7골","2차 대전 전 마지막 WC"],extra:"이탈리아가 헝가리를 4-2로 꺾어 사상 첫 2연속 우승. 이후 2차 세계대전으로 1942·1946 취소"},
  {year:1950,host:"브라질",winner:"🇺🇾 우루과이",flag:"🇺🇾",topScorer:"아데미르 (9골)",mvp:"오베두리오 바렐라",hints:["마라카낭의 비극","브라질 개최","결승전 없는 리그전"],extra:"브라질이 우승 직전 우루과이에 패배한 충격의 대회"},
  {year:1954,host:"스위스",winner:"🇩🇪 서독",flag:"🇩🇪",topScorer:"샌도르 코치시 (11골)",mvp:"프리츠 발터",hints:["베른의 기적","헝가리 꺾음","역대 최다 득점 대회"],extra:"평균 5.38골, 역대 최고 득점 대회"},
  {year:1958,host:"스웨덴",winner:"🇧🇷 브라질",flag:"🇧🇷",topScorer:"저스트 퐁테인 (13골·역대 최다)",mvp:"펠레",hints:["17세 펠레 데뷔","브라질 첫 우승","유럽 개최"],extra:"퐁테인의 13골은 단일 대회 역대 최다 기록"},
  {year:1962,host:"칠레",winner:"🇧🇷 브라질",flag:"🇧🇷",topScorer:"가링샤·바바 외 4명 공동 (4골)",mvp:"가링샤",hints:["브라질 2연속 우승","펠레 부상 이탈","가링샤의 대회"],extra:"펠레가 부상으로 이탈한 후 가링샤가 혼자 팀을 이끌어 체코슬로바키아를 결승에서 3-1로 꺾고 우승"},
  {year:1966,host:"잉글랜드",winner:"🏴󠁧󠁢󠁥󠁮󠁧󠁿 잉글랜드",flag:"🏴󠁧󠁢󠁥󠁮󠁧󠁿",topScorer:"에우제비우 (9골)",mvp:"바비 찰턴",hints:["잉글랜드 유일 우승","웸블리 결승","바비 무어 주장"],extra:"잉글랜드가 홈에서 서독을 4-2로 꺾은 유일한 우승"},
  {year:1970,host:"멕시코",winner:"🇧🇷 브라질",flag:"🇧🇷",topScorer:"제르트 뮐러 (10골)",mvp:"펠레",hints:["펠레의 마지막 월드컵","화려한 삼바 축구","줄리메 트로피 영구 소장"],extra:"브라질 3회 우승으로 줄리메 트로피를 영구 소장"},

const BOSS_QUESTIONS = [
  {year:"??",host:"???",winner:"🇧🇷 브라질",flag:"🇧🇷",isBoss:true,hints:["단일 대회 역대 최다 득점왕이 나온 대회","유럽 개최","17세 슈퍼스타 첫 월드컵"],extra:"퐁테인 13골·역대 깨지지 않는 기록 / 유럽에서 개최",topScorer:"저스트 퐁테인 13골",mvp:"펠레"},
  {year:"??",host:"???",winner:"🇦🇷 아르헨티나",flag:"🇦🇷",isBoss:true,hints:["신의 손 골이 나온 대회","세기의 골 선정","중미 개최"],extra:"마라도나 손으로 골 넣고 '신의 손이었다'고 발언",topScorer:"게리 리네커 6골",mvp:"마라도나"},
  {year:"??",host:"???",winner:"🇩🇪 독일",flag:"🇩🇪",isBoss:true,hints:["개최국이 준결승서 7골 허용","남미 개최","미네이랑의 비극"],extra:"브라질이 자국에서 1-7 대패한 충격의 대회",topScorer:"하메스 로드리게스 6골",mvp:"리오넬 메시"},
];

const ALL_COUNTRIES = [
  {name:"🇺🇾 우루과이",flag:"🇺🇾"},{name:"🇧🇷 브라질",flag:"🇧🇷"},{name:"🇩🇪 서독",flag:"🇩🇪"},{name:"🇩🇪 독일",flag:"🇩🇪"},
  {name:"🏴󠁧󠁢󠁥󠁮󠁧󠁿 잉글랜드",flag:"🏴󠁧󠁢󠁥󠁮󠁧󠁿"},{name:"🇦🇷 아르헨티나",flag:"🇦🇷"},{name:"🇮🇹 이탈리아",flag:"🇮🇹"},{name:"🇫🇷 프랑스",flag:"🇫🇷"},
  {name:"🇪🇸 스페인",flag:"🇪🇸"},{name:"🇳🇱 네덜란드",flag:"🇳🇱"},{name:"🇵🇹 포르투갈",flag:"🇵🇹"},{name:"🇭🇷 크로아티아",flag:"🇭🇷"},
];

const TOTAL=10;
let score=0,correctCount=0,currentQ=0,questions=[],history=[],hintRevealed=false,bossUsed=false;
let qTimer,qTimeLeft=15;

function shuffle(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}

function startGame(){
  score=0;correctCount=0;currentQ=0;history=[];bossUsed=false;
  const base=shuffle(WORLD_CUPS).slice(0,TOTAL-1);
  const boss=BOSS_QUESTIONS[Math.floor(Math.random()*BOSS_QUESTIONS.length)];
  questions=[...base,boss];
  document.getElementById('game-area').style.display='flex';
  document.getElementById('result-screen').classList.remove('show');
  updateHUD();
  setQuestion();
}

function updateHUD(){
  document.getElementById('score-val').textContent=score;
  document.getElementById('correct-val').textContent=correctCount;
  document.getElementById('remain-val').textContent=TOTAL-currentQ;
  const pct=Math.round(currentQ/TOTAL*100);
  document.getElementById('prog-bar').style.width=pct+'%';
  document.getElementById('prog-text').textContent=`${currentQ} / ${TOTAL}`;
  document.getElementById('prog-pct').textContent=pct+'%';
  // Rounds
  const names=['1라운드','2라운드','3라운드','4라운드','5라운드','6라운드','7라운드','8라운드','9라운드','🔥 파이널'];
  document.getElementById('rounds').innerHTML=names.map((n,i)=>{
    const isBoss=i===TOTAL-1;
    const cls=i<currentQ?'done':i===currentQ?'active'+(isBoss?' boss':''):'';
    return `<div class="r-pill ${cls}">${n}</div>`;
  }).join('');
}

function startQTimer(){
  clearInterval(qTimer); qTimeLeft=15;
  const bar=document.getElementById('q-timer-bar');
  bar.style.width='100%'; bar.style.background=getComputedStyle(document.documentElement).getPropertyValue('--gold');
  qTimer=setInterval(()=>{
    qTimeLeft--;
    bar.style.width=(qTimeLeft/15*100)+'%';
    if(qTimeLeft<=5) bar.style.background='#ef4444';
    if(qTimeLeft<=0){
      clearInterval(qTimer);
      const btns=document.querySelectorAll('.opt-btn:not(:disabled)');
      if(btns.length>0){
        document.querySelectorAll('.opt-btn').forEach(b=>b.disabled=true);
        const q=questions[currentQ];
        document.querySelectorAll('.opt-btn').forEach(b=>{if(b.textContent.includes(q.winner.replace(/^\S+\s*/,'')))b.classList.add('correct');});
        const fb=document.getElementById('feedback');
        fb.className='feedback-area wrong'; fb.textContent=`⏰ 시간 초과! 정답: ${q.winner}`;
        sfxWrong();
        history.push({year:q.year,winner:q.winner,correct:false,timeout:true});
        currentQ++; updateHUD();
        setTimeout(()=>{if(currentQ>=TOTAL)showResult();else setQuestion();},1300);
      }
    }
  },1000);
}

function setQuestion(){
  if(currentQ>=TOTAL){showResult();return;}
  hintRevealed=false;
  const q=questions[currentQ];
  startQTimer();

  const badge=document.getElementById('year-badge');
  const bossLbl=document.getElementById('boss-label');
  if(q.isBoss){
    badge.style.background='#ef4444'; badge.style.color='#fff'; badge.style.fontSize='32px';
    badge.textContent=q.year||'??';
    bossLbl.style.color='#ef4444'; bossLbl.textContent='🔥 LEGEND QUESTION — 200점!';
  } else {
    badge.style.background='var(--gold)'; badge.style.color='#000'; badge.style.fontSize='52px';
    badge.textContent=q.year;
    bossLbl.textContent='';
  }

  document.getElementById('host-info').textContent=`🌍 개최국: ${q.host}`;
  document.getElementById('reveal-btn').style.display='inline-block';
  document.getElementById('extra-hint').textContent='';
  document.getElementById('feedback').textContent='';
  document.getElementById('feedback').className='feedback-area';

  const hr=document.getElementById('hint-row');
  hr.innerHTML=q.hints.map(h=>`<span class="hint-chip">${h}</span>`).join('')
    +(q.topScorer?`<span class="hint-chip scorer">⚽ 득점왕: ${q.topScorer}</span>`:'');

  const wrongPool=ALL_COUNTRIES.filter(c=>c.name!==q.winner);
  const wrongs=shuffle(wrongPool).slice(0,3);
  const opts=shuffle([{name:q.winner,flag:q.flag},...wrongs]);
  document.getElementById('options').innerHTML=opts.map(o=>`
    <button class="opt-btn" onclick="answer(this,'${o.name.replace(/'/g,"\\'")}')">
      <span class="flag">${o.flag}</span>${o.name.replace(/^\S+\s*/,'')}
    </button>`).join('');
}

function revealExtra(){
  if(hintRevealed) return;
  hintRevealed=true;
  document.getElementById('reveal-btn').style.display='none';
  const q=questions[currentQ];
  document.getElementById('extra-hint').textContent=(q.extra||'')+(q.mvp?` | 🌟 MVP: ${q.mvp}`:'');
}

function answer(btn,selected){
  clearInterval(qTimer);
  document.querySelectorAll('.opt-btn').forEach(b=>b.disabled=true);
  const q=questions[currentQ];
  const isCorrect=selected===q.winner;
  const fb=document.getElementById('feedback');
  if(isCorrect){
    const pts=q.isBoss?(hintRevealed?100:200):(hintRevealed?50:100);
    score+=pts; correctCount++;
    btn.classList.add('correct');
    fb.className='feedback-area correct';
    fb.textContent=q.isBoss?`🔥 BOSS 정답! +${pts}점`:(hintRevealed?`✅ 정답! +${pts}점 (힌트 사용)`:`✅ 정답! +${pts}점`);
    sfxCorrect(); launchFullConfetti();
    history.push({year:q.year,winner:q.winner,correct:true,boss:q.isBoss});
  } else {
    document.querySelectorAll('.opt-btn').forEach(b=>{if(b.textContent.includes(q.winner.replace(/^\S+\s*/,'')))b.classList.add('correct');});
    btn.classList.add('wrong');
    fb.className='feedback-area wrong';
    fb.textContent=`❌ 오답! 정답: ${q.winner}`;
    sfxWrong();
    history.push({year:q.year,winner:q.winner,correct:false});
  }
  currentQ++; updateHUD();
  setTimeout(()=>{if(currentQ>=TOTAL)showResult();else setQuestion();},1300);
}

function showResult(){
  fbAutoSubmit(score,'월드컵 우승국 퀴즈');
  clearInterval(qTimer);
  document.getElementById('game-area').style.display='none';
  document.getElementById('result-screen').classList.add('show');
  const GRADES=[
    {min:9,g:'S',c:'#FFD700',t:'🌟 역사 박사!',       m:'완벽한 월드컵 역사 지식!'},
    {min:7,g:'A',c:'#22c55e',t:'🥇 역사 마니아!',     m:'훌륭한 역사 지식이에요!'},
    {min:5,g:'B',c:'#3b82f6',t:'🥈 잘 하고 있어요!',  m:'꽤 많이 알고 있네요!'},
    {min:3,g:'C',c:'#f59e0b',t:'🥉 더 공부해봐요!',   m:'월드컵 역사를 더 알아보세요!'},
    {min:0,g:'D',c:'#ef4444',t:'😅 연습이 필요해요!', m:'계속 도전해보세요!'},
  ];
  const gr=GRADES.find(g=>correctCount>=g.min)||GRADES[GRADES.length-1];
  document.getElementById('result-grade').innerHTML=`<span style="color:${gr.c}">GRADE ${gr.g}</span>`;
  document.getElementById('result-title').textContent=gr.t;
  document.getElementById('result-score').textContent=score.toLocaleString()+'점';
  document.getElementById('result-msg').textContent=gr.m+` (${correctCount}/${TOTAL} 정답)`;
  document.getElementById('history-list').innerHTML=history.map(h=>`
    <div class="rh-item">
      <span class="rh-year">${h.year}년</span>
      <span class="rh-win">${h.winner}${h.boss?' 🔥':''}</span>
      <span>${h.timeout?'⏰':h.correct?'✅':'❌'}</span>
    </div>`).join('');
}

setTimeout(()=>{const s=document.getElementById('splash');s.classList.add('out');setTimeout(()=>s.remove(),400);},900);
if(localStorage.getItem('wc_player_name'))startGame();

function shareResult(s, gameName) {
  const grades = [[1400,'S'],[1000,'A'],[600,'B'],[300,'C'],[0,'D']];
  const grade = grades.find(g => s >= g[0])?.[1] || 'D';
  const text = `⚽ 월드컵 미니게임 — ${gameName}\nGRADE ${grade} · ${s.toLocaleString()}점\nhttps://twinwhdwk.github.io/worldcup_minigame/`;
  if (navigator.share) {
    navigator.share({ title: '월드컵 미니게임 결과', text }).catch(() => {});
  } else {
    navigator.clipboard.writeText(text).then(() => alert('결과가 클립보드에 복사됐어요!')).catch(() => {});
  }
}

</div>
<script>
(function(){
  if(!localStorage.getItem('wc_player_name')){
    var o=document.getElementById('name-overlay');o.style.display='flex';
    document.getElementById('no-input').addEventListener('keydown',function(e){if(e.key==='Enter')saveNameOverlay();});
  }
})();
function saveNameOverlay(){
  var n=document.getElementById('no-input').value.trim();
  if(!n){document.getElementById('no-input').focus();return;}
  localStorage.setItem('wc_player_name',n);
  document.getElementById('name-overlay').style.display='none';if(typeof startGame==='function')startGame();}
</script>
