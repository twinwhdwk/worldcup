<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏆 월드컵 우승국 퀴즈</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;700&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #FFD700;
      --gold2: #b8860b;
      --dark: #0a0a0f;
      --card: #13141f;
      --text: #f0f0f0;
      --muted: #666;
      --correct: #22c55e;
      --wrong: #ef4444;
    }

    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'Noto Sans KR', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    .back { align-self: flex-start; color: var(--muted); text-decoration: none; font-size: 14px; margin-bottom: 20px; }

    h1 {
      font-family: 'Black Han Sans', sans-serif;
      font-size: clamp(28px, 5vw, 48px);
      text-align: center;
      background: linear-gradient(135deg, #fff, var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .subtitle { color: var(--muted); font-size: 14px; text-align: center; margin-bottom: 30px; }

    /* PROGRESS */
    .progress-wrap {
      width: 100%;
      max-width: 640px;
      margin-bottom: 24px;
    }
    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .progress-bar-bg {
      height: 8px;
      background: rgba(255,255,255,0.07);
      border-radius: 100px;
      overflow: hidden;
    }
    #progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--gold2), var(--gold));
      border-radius: 100px;
      transition: width 0.4s ease;
    }

    /* BRACKET */
    .rounds {
      display: flex;
      gap: 8px;
      width: 100%;
      max-width: 640px;
      margin-bottom: 20px;
      overflow-x: auto;
      padding-bottom: 4px;
    }
    .round-pill {
      flex-shrink: 0;
      padding: 6px 14px;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 700;
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--muted);
      background: var(--card);
    }
    .round-pill.active {
      background: var(--gold);
      color: #000;
      border-color: var(--gold);
    }
    .round-pill.done {
      background: rgba(34,197,94,0.15);
      border-color: var(--correct);
      color: var(--correct);
    }

    /* QUESTION CARD */
    .q-card {
      background: var(--card);
      border: 1px solid rgba(255,215,0,0.15);
      border-radius: 24px;
      padding: 40px 32px;
      width: 100%;
      max-width: 640px;
      text-align: center;
      margin-bottom: 20px;
      position: relative;
      overflow: hidden;
    }
    .q-card::before {
      content: '🏆';
      position: absolute;
      font-size: 200px;
      opacity: 0.03;
      top: -40px;
      right: -40px;
    }

    .year-badge {
      display: inline-block;
      background: var(--gold);
      color: #000;
      font-family: 'Black Han Sans', sans-serif;
      font-size: 48px;
      padding: 8px 32px;
      border-radius: 16px;
      margin-bottom: 20px;
    }

    .host-info {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .hint-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin: 16px 0;
    }
    .hint-chip {
      background: rgba(255,215,0,0.1);
      border: 1px solid rgba(255,215,0,0.2);
      color: var(--gold);
      font-size: 12px;
      padding: 5px 12px;
      border-radius: 100px;
    }

    .reveal-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.15);
      color: var(--muted);
      font-size: 13px;
      padding: 8px 20px;
      border-radius: 100px;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 16px;
    }
    .reveal-btn:hover { border-color: var(--gold); color: var(--gold); }

    .extra-hint {
      font-size: 13px;
      color: #aaa;
      min-height: 20px;
      margin-bottom: 4px;
    }

    .feedback-area {
      font-size: 22px;
      font-weight: 700;
      height: 32px;
    }
    .feedback-area.correct { color: var(--correct); }
    .feedback-area.wrong { color: var(--wrong); }

    /* OPTIONS */
    .options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      width: 100%;
      max-width: 640px;
    }

    .opt-btn {
      background: var(--card);
      border: 2px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 20px 16px;
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      cursor: pointer;
      transition: all 0.15s;
      font-family: 'Noto Sans KR', sans-serif;
    }
    .opt-btn .flag { font-size: 28px; display: block; margin-bottom: 6px; }
    .opt-btn:hover:not(:disabled) {
      border-color: var(--gold);
      background: rgba(255,215,0,0.08);
      transform: scale(1.03);
    }
    .opt-btn.correct { border-color: var(--correct); background: rgba(34,197,94,0.15); }
    .opt-btn.wrong { border-color: var(--wrong); background: rgba(239,68,68,0.15); }
    .opt-btn:disabled { cursor: not-allowed; }

    /* SCORE HUD */
    .hud {
      display: flex;
      gap: 12px;
      width: 100%;
      max-width: 640px;
      margin-bottom: 16px;
    }
    .hud-box {
      flex: 1;
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 12px;
      padding: 12px;
      text-align: center;
    }
    .hud-label { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
    .hud-value { font-family: 'Black Han Sans', sans-serif; font-size: 26px; margin-top: 2px; color: var(--gold); }

    /* RESULT */
    .result-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      text-align: center;
      width: 100%;
      max-width: 640px;
    }
    .result-screen.show { display: flex; }
    .result-trophy { font-size: 80px; margin-bottom: 16px; }
    .result-title { font-family: 'Black Han Sans', sans-serif; font-size: 36px; margin-bottom: 8px; }
    .result-score { font-size: 60px; font-family: 'Black Han Sans', sans-serif; color: var(--gold); margin: 12px 0; }
    .result-msg { color: var(--muted); font-size: 15px; margin-bottom: 24px; }
    .result-history {
      width: 100%;
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 24px;
      text-align: left;
    }
    .result-history h3 { font-size: 14px; color: var(--muted); margin-bottom: 12px; letter-spacing: 1px; text-transform: uppercase; }
    .history-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      font-size: 14px;
    }
    .history-item:last-child { border-bottom: none; }
    .history-item .year-tag { color: var(--gold); font-weight: 700; }
    .history-item .result-tag { font-size: 18px; }
    .btn-restart {
      background: var(--gold);
      color: #000;
      border: none;
      border-radius: 100px;
      padding: 16px 48px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }
    .btn-restart:hover { opacity: 0.85; transform: scale(1.03); }
  
    .q-timer-bar-wrap {
      width: 100%;
      height: 4px;
      background: rgba(255,215,0,0.1);
      border-radius: 100px;
      margin-bottom: 16px;
      overflow: hidden;
    }
    #q-timer-bar {
      height: 100%;
      background: var(--gold);
      border-radius: 100px;
      transition: width 0.2s linear;
      width: 100%;
    }

    
    @keyframes scorePop {
      0% { transform: scale(0) translateY(0); opacity: 1; }
      60% { transform: scale(1.3) translateY(-30px); opacity: 1; }
      100% { transform: scale(1) translateY(-60px); opacity: 0; }
    }
    .score-pop {
      position: fixed; font-family: 'Black Han Sans', sans-serif;
      font-size: 28px; font-weight: 900; pointer-events: none; z-index: 9998;
      animation: scorePop 0.7s ease forwards;
      text-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }

    
    /* ── Mobile Optimization ── */
    @media (max-width: 480px) {
      body { padding: 12px; }
      .options { grid-template-columns: 1fr 1fr; gap: 8px; }
      .opt-btn { padding: 14px 8px; font-size: 14px; min-height: 64px; }
      .question-card, .q-card, .jersey-card { padding: 24px 16px; }
      .hud { gap: 8px; }
      .hud-box { padding: 10px 6px; }
      .hud-value { font-size: 22px; }
      .player-emoji, .jersey-display { font-size: 56px; }
      .hints, .clues, .hint-row { gap: 6px; }
      .hint-chip, .clue-chip { font-size: 11px; padding: 4px 10px; }
      .shoot-btn { padding: 16px 40px; font-size: 18px; }
      h1 { font-size: 28px; }
    }
    /* Larger touch targets */
    .opt-btn { min-height: 56px; -webkit-tap-highlight-color: transparent; }
    .shoot-btn { -webkit-tap-highlight-color: transparent; }
    .arrow-btn { min-width: 80px; min-height: 48px; }

    </style>

<script>

function shareResult(score, gameName) {
  const text = `⚽ 월드컵 미니게임\n🎮 ${gameName}\n🏆 ${score.toLocaleString()}점 달성!\n\nhttps://twinwhdwk.github.io/worldcup_minigame`;
  if (navigator.share) {
    navigator.share({ title: '월드컵 미니게임', text });
  } else if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => alert('클립보드에 복사됐어요!'));
  }
}


// ── Confetti System ─────────────────────────────
function launchConfetti(x, y, count=18) {
  const colors = ['#FFD700','#00843D','#ef4444','#3b82f6','#a855f7','#fff'];
  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.style.cssText = `
      position:fixed; width:${6+Math.random()*6}px; height:${6+Math.random()*6}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      border-radius:${Math.random()>0.5?'50%':'2px'};
      left:${x}px; top:${y}px; pointer-events:none; z-index:9999;
      transform:rotate(${Math.random()*360}deg);
    `;
    document.body.appendChild(el);
    const angle = (Math.random() * 360) * Math.PI / 180;
    const speed = 80 + Math.random() * 120;
    const vx = Math.cos(angle) * speed;
    const vy = Math.sin(angle) * speed - 60;
    let px = x, py = y, vy2 = vy, t = 0;
    const tick = () => {
      t += 0.016; px += vx * 0.016; vy2 += 200 * 0.016; py += vy2 * 0.016;
      el.style.left = px + 'px'; el.style.top = py + 'px';
      el.style.opacity = Math.max(0, 1 - t * 1.5);
      el.style.transform = `rotate(${t*200}deg)`;
      if (t < 0.8) requestAnimationFrame(tick); else el.remove();
    };
    requestAnimationFrame(tick);
  }
}
function launchFullConfetti() {
  for (let i = 0; i < 4; i++) setTimeout(() => launchConfetti(Math.random()*window.innerWidth, -10, 12), i*150);
}

// ── High Score System ───────────────────────────────────
function getHighScores(game) {
  try { return JSON.parse(localStorage.getItem('wc_hs_' + game) || '[]'); } catch { return []; }
}
function saveHighScore(game, score) {
  const scores = getHighScores(game);
  scores.push({ score, date: new Date().toLocaleDateString('ko-KR') });
  scores.sort((a,b) => b.score - a.score);
  const top5 = scores.slice(0, 5);
  localStorage.setItem('wc_hs_' + game, JSON.stringify(top5));
  return top5;
}
function renderHighScores(game, containerId) {
  const scores = getHighScores(game);
  const el = document.getElementById(containerId);
  if (!el || scores.length === 0) return;
  el.innerHTML = '<div style="font-size:12px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;">🏅 역대 최고점</div>' +
    scores.map((s,i) => `<div style="display:flex;justify-content:space-between;font-size:14px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.05)">
      <span style="color:${i===0?'#FFD700':i===1?'#aaa':i===2?'#cd7f32':'var(--muted)'}">${['🥇','🥈','🥉','4위','5위'][i]}</span>
      <span style="font-weight:700">${s.score.toLocaleString()}점</span>
      <span style="color:var(--muted)">${s.date}</span>
    </div>`).join('');
}

let qTimeLeft = 15, qTimerInterval;
function startQTimer() {
  clearInterval(qTimerInterval);
  qTimeLeft = 15;
  const bar = document.getElementById('q-timer-bar');
  if (!bar) return;
  bar.style.width = '100%';
  bar.style.background = 'var(--gold)';
  qTimerInterval = setInterval(() => {
    qTimeLeft--;
    if (!bar) return;
    bar.style.width = (qTimeLeft / 15 * 100) + '%';
    if (qTimeLeft <= 5) bar.style.background = '#ef4444';
    if (qTimeLeft <= 0) {
      clearInterval(qTimerInterval);
      // Auto-wrong if not answered
      const btns = document.querySelectorAll('.opt-btn:not(:disabled)');
      if (btns.length > 0) {
        document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
        const q = questions[currentQ];
        const fb = document.getElementById('feedback');
        document.querySelectorAll('.opt-btn').forEach(b => {
          if (b.textContent.includes(q.winner.replace(/^.+? /, ''))) b.classList.add('correct');
        });
        fb.className = 'feedback-area wrong';
        fb.textContent = `⏰ 시간 초과! 정답: ${q.winner}`;
        history.push({ year: q.year, winner: q.winner, correct: false });
        currentQ++;
        updateHUD();
        setTimeout(() => { if (currentQ >= TOTAL) showResult(); else setQuestion(); }, 1200);
      }
    }
  }, 1000);
}


// ── Web Audio Sound System ──────────────────────────────
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let _ctx = null;
function getCtx() {
  if (!_ctx) _ctx = new AudioCtx();
  if (_ctx.state === 'suspended') _ctx.resume();
  return _ctx;
}
function playTone(freq, type, duration, vol=0.3, decay=0.8) {
  try {
    const ctx = getCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = type; osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    osc.start(); osc.stop(ctx.currentTime + duration);
  } catch(e) {}
}
function sfxCorrect() {
  playTone(523, 'sine', 0.12, 0.35);
  setTimeout(() => playTone(659, 'sine', 0.12, 0.35), 80);
  setTimeout(() => playTone(784, 'sine', 0.18, 0.35), 160);
}
function sfxWrong() {
  playTone(220, 'sawtooth', 0.25, 0.25);
  setTimeout(() => playTone(180, 'sawtooth', 0.2, 0.2), 120);
}
function sfxGoal() {
  [523,659,784,1047].forEach((f,i) => setTimeout(()=>playTone(f,'sine',0.22,0.4),i*70));
}
function sfxClick() { playTone(440, 'sine', 0.06, 0.15); }

  { year: 2014, host: "브라질", winner: "🇩🇪 독일", flag: "🇩🇪", topScorer: "하메스 로드리게스 (콜롬비아 6골)", mvp: "리오넬 메시", hints: ["브라질 개최", "미네이랑의 비극 7-1", "독일 4번째 우승"], extra: "브라질이 준결승에서 독일에 1-7로 대패" },
  { year: 2018, host: "러시아", winner: "🇫🇷 프랑스", flag: "🇫🇷", topScorer: "해리 케인 (잉글랜드 6골)", mvp: "루카 모드리치", hints: ["러시아 개최", "음바페 19살 우승", "프랑스 2번째 우승"], extra: "음바페가 역대 2번째로 어린 결승골 선수" },
  { year: 2022, host: "카타르", winner: "🇦🇷 아르헨티나", flag: "🇦🇷", topScorer: "킬리안 음바페 (프랑스 8골)", mvp: "리오넬 메시", hints: ["중동 첫 개최", "메시의 꿈 실현", "프랑스와 승부차기"], extra: "메시가 마침내 월드컵 트로피를 들어올림" },
];

const ALL_COUNTRIES = [
  { name: "🇺🇾 우루과이", flag: "🇺🇾" },
  { name: "🇧🇷 브라질", flag: "🇧🇷" },
  { name: "🇩🇪 서독", flag: "🇩🇪" },
  { name: "🇩🇪 독일", flag: "🇩🇪" },
  { name: "🏴󠁧󠁢󠁥󠁮󠁧󠁿 잉글랜드", flag: "🏴󠁧󠁢󠁥󠁮󠁧󠁿" },
  { name: "🇦🇷 아르헨티나", flag: "🇦🇷" },
  { name: "🇮🇹 이탈리아", flag: "🇮🇹" },
  { name: "🇫🇷 프랑스", flag: "🇫🇷" },
  { name: "🇪🇸 스페인", flag: "🇪🇸" },
  { name: "🇳🇱 네덜란드", flag: "🇳🇱" },
  { name: "🇵🇹 포르투갈", flag: "🇵🇹" },
  { name: "🇭🇷 크로아티아", flag: "🇭🇷" },
];

let score = 0, correctCount = 0, currentQ = 0;
let questions = [], history = [], hintRevealed = false;
const TOTAL = 10;
const ROUND_NAMES = ["32강", "16강", "8강", "준준결", "준결", "4강", "8강", "준결", "결승", "챔피언"];
const ACTUAL_ROUNDS = ["1라운드", "2라운드", "3라운드", "4라운드", "5라운드", "6라운드", "7라운드", "8라운드", "9라운드", "파이널"];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startGame() {
  score = 0; correctCount = 0; currentQ = 0; history = [];
  questions = shuffle(WORLD_CUPS).slice(0, TOTAL);
  document.getElementById('game-area').style.display = 'flex';
  document.getElementById('result-screen').classList.remove('show');
  renderRounds();
  updateHUD();
  setQuestion();
}

function renderRounds() {
  const el = document.getElementById('rounds');
  el.innerHTML = ACTUAL_ROUNDS.map((r, i) => `
    <div class="round-pill ${i === currentQ ? 'active' : i < currentQ ? 'done' : ''}" id="round-${i}">${r}</div>
  `).join('');
}

function updateHUD() {
  document.getElementById('score-val').textContent = score;
  document.getElementById('correct-val').textContent = correctCount;
  document.getElementById('remain-val').textContent = TOTAL - currentQ;
  const pct = Math.round(currentQ / TOTAL * 100);
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `${currentQ} / ${TOTAL}`;
  document.getElementById('progress-pct').textContent = pct + '%';
}

function setQuestion() {
  startQTimer();
  if (currentQ >= TOTAL) { showResult(); return; }

  hintRevealed = false;
  const q = questions[currentQ];

  document.getElementById('year-badge').textContent = q.year;
  document.getElementById('host-info').textContent = `🌍 개최국: ${q.host}`;
  document.getElementById('extra-hint').textContent = '';
  document.getElementById('reveal-btn').style.display = 'inline-block';
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback-area';

  const hintRow = document.getElementById('hint-row');
  hintRow.innerHTML = q.hints.map(h => `<span class="hint-chip">${h}</span>`).join('');

  // get options
  const wrongPool = ALL_COUNTRIES.filter(c => c.name !== q.winner);
  const wrongs = shuffle(wrongPool).slice(0, 3);
  const opts = shuffle([{ name: q.winner, flag: q.flag }, ...wrongs]);

  const optEl = document.getElementById('options');
  optEl.innerHTML = opts.map(o => `
    <button class="opt-btn" onclick="answer(this, \`${o.name}\`)">
      <span class="flag">${o.flag}</span>
      ${o.name.replace(/^.+? /, '')}
    </button>
  `).join('');

  renderRounds();
}

function revealHint() {
  if (hintRevealed) return;
  hintRevealed = true;
  document.getElementById('extra-hint').textContent = '💡 ' + questions[currentQ].extra + (questions[currentQ].mvp ? ` | 🌟 MVP: ${questions[currentQ].mvp}` : '');
  document.getElementById('reveal-btn').style.display = 'none';
}

function answer(btn, selected) {
  document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
  const q = questions[currentQ];
  const correct = selected === q.winner;
  const fb = document.getElementById('feedback');

  if (correct) {
    const pts = hintRevealed ? 50 : 100;
    score += pts;
    correctCount++;
    sfxCorrect(); btn.classList.add('correct');
    fb.className = 'feedback-area correct'; launchFullConfetti();
    fb.textContent = hintRevealed ? `✅ 정답! +${pts}점 (힌트 사용)` : `✅ 정답! +${pts}점`;
    history.push({ year: q.year, winner: q.winner, correct: true });
  } else {
    sfxWrong(); btn.classList.add('wrong');
    document.querySelectorAll('.opt-btn').forEach(b => {
      if (b.textContent.includes(q.winner.replace(/^.+? /, ''))) b.classList.add('correct');
    });
    fb.className = 'feedback-area wrong';
    fb.textContent = `❌ 오답! 정답: ${q.winner}`;
    history.push({ year: q.year, winner: q.winner, correct: false });
  }

  currentQ++;
  updateHUD();

  setTimeout(() => {
    if (currentQ >= TOTAL) showResult();
    else setQuestion();
  }, 1200);
}

function showResult() {
  document.getElementById('game-area').style.display = 'none';
  const rs = document.getElementById('result-screen');
  rs.classList.add('show');

  let trophy = '😅', title = '더 공부가 필요해요', msg = '월드컵 역사를 더 알아보세요!';
  if (correctCount >= 9) { trophy = '🏆'; title = '월드컵 역사 박사!'; msg = '완벽한 역사 지식이에요!'; }
  else if (correctCount >= 7) { trophy = '🥇'; title = '역사 마니아!'; msg = '훌륭해요!'; }
  else if (correctCount >= 5) { trophy = '🥈'; title = '준수한 실력!'; msg = '조금만 더 공부하면 완벽해요!'; }
  else if (correctCount >= 3) { trophy = '🥉'; title = '아직 배울 게 많아요!'; msg = '계속 도전해보세요!'; }

  document.getElementById('result-trophy').textContent = trophy;
  document.getElementById('result-title').textContent = title;
  document.getElementById('result-score').textContent = score + '점';
  document.getElementById('result-msg').textContent = msg + ` (${correctCount}/${TOTAL} 정답)`;

  const list = document.getElementById('history-list');
  list.innerHTML = history.map(h => `
    <div class="history-item">
      <span class="year-tag">${h.year}년</span>
      <span>${h.winner}</span>
      <span class="result-tag">${h.correct ? '✅' : '❌'}</span>
    </div>
  `).join('');
}

startGame();
</script>
