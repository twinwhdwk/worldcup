<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📊 월드컵 기록 퀴즈</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;700&display=swap');
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{--pink:#ec4899;--dark:#080810;--card:#10111e;--text:#f0f0f0;--muted:#555;--muted2:#888;--correct:#22c55e;--wrong:#ef4444;--gold:#FFD700;}
    body{background:var(--dark);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:16px 16px 80px;}

    .splash{position:fixed;inset:0;background:var(--dark);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .4s;}
    .splash.out{opacity:0;pointer-events:none;}
    .splash-ball{font-size:64px;animation:bop .6s ease infinite alternate;}
    @keyframes bop{to{transform:translateY(-20px) rotate(20deg);}}
    .splash-bar-wrap{width:200px;height:4px;background:rgba(255,255,255,.08);border-radius:100px;margin-top:24px;overflow:hidden;}
    .splash-bar{height:100%;background:var(--pink);border-radius:100px;animation:lb .8s ease forwards;}
    @keyframes lb{from{width:0}to{width:100%}}

    .back{align-self:flex-start;color:var(--muted);text-decoration:none;font-size:13px;margin-bottom:16px;}
    h1{font-family:'Black Han Sans',sans-serif;font-size:clamp(24px,5vw,40px);text-align:center;margin-bottom:6px;background:linear-gradient(135deg,#fff,var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .subtitle{color:var(--muted2);font-size:13px;text-align:center;margin-bottom:20px;}

    /* HUD */
    .hud{display:flex;gap:10px;margin-bottom:12px;width:100%;max-width:580px;}
    .hud-box{flex:1;background:var(--card);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:11px 8px;text-align:center;}
    .hud-label{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;}
    .hud-value{font-family:'Black Han Sans',sans-serif;font-size:26px;margin-top:2px;}
    #score-val{color:var(--gold);}#qn-val{color:var(--pink);}#correct-val{color:var(--correct);}

    /* Progress */
    .prog-wrap{width:100%;max-width:580px;height:5px;background:rgba(255,255,255,.05);border-radius:100px;margin-bottom:14px;overflow:hidden;}
    #prog-bar{height:100%;background:linear-gradient(90deg,var(--pink),#f97316);border-radius:100px;transition:width .5s ease;}

    /* Q Card */
    .q-card{background:var(--card);border:1px solid rgba(236,72,153,.15);border-radius:24px;padding:32px 22px;width:100%;max-width:580px;text-align:center;margin-bottom:16px;position:relative;overflow:hidden;}
    .q-card::before{content:'📊';position:absolute;font-size:150px;opacity:.025;top:-20px;right:-20px;pointer-events:none;}

    /* Per-Q timer */
    .q-tbar-wrap{width:100%;height:4px;background:rgba(255,255,255,.05);border-radius:100px;margin-bottom:20px;overflow:hidden;}
    #q-tbar{height:100%;background:var(--pink);border-radius:100px;transition:width .15s linear;}

    .cat-badge{display:inline-block;font-size:11px;font-weight:700;letter-spacing:2px;padding:4px 12px;border-radius:100px;margin-bottom:12px;text-transform:uppercase;}
    .q-text{font-family:'Black Han Sans',sans-serif;font-size:clamp(16px,3vw,22px);line-height:1.4;margin-bottom:16px;color:var(--text);}
    .q-context{font-size:13px;color:var(--muted2);margin-bottom:14px;line-height:1.6;}

    /* 4 options A/B/C/D */
    .options{display:flex;flex-direction:column;gap:9px;width:100%;max-width:580px;}
    .opt-btn{background:var(--card);border:2px solid rgba(255,255,255,.07);border-radius:14px;padding:15px 18px;font-size:15px;font-weight:700;color:var(--text);cursor:pointer;transition:all .15s;font-family:'Noto Sans KR',sans-serif;text-align:left;display:flex;align-items:center;gap:12px;-webkit-tap-highlight-color:transparent;}
    .opt-key{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;background:rgba(255,255,255,.08);color:var(--muted);flex-shrink:0;transition:all .15s;}
    .opt-btn:hover:not(:disabled){border-color:var(--pink);background:rgba(236,72,153,.08);}
    .opt-btn:hover:not(:disabled) .opt-key{background:var(--pink);color:#fff;}
    .opt-btn.correct{border-color:var(--correct);background:rgba(34,197,94,.12);}
    .opt-btn.correct .opt-key{background:var(--correct);color:#fff;}
    .opt-btn.wrong{border-color:var(--wrong);background:rgba(239,68,68,.12);}
    .opt-btn.wrong .opt-key{background:var(--wrong);color:#fff;}
    .opt-btn:disabled{cursor:not-allowed;}

    .feedback{font-size:16px;font-weight:700;min-height:24px;margin-top:12px;text-align:center;}
    .feedback.correct{color:var(--correct);}
    .feedback.wrong{color:var(--wrong);}

    /* Result */
    .result-screen{display:none;flex-direction:column;align-items:center;text-align:center;width:100%;max-width:580px;}
    .result-screen.show{display:flex;}
    .result-grade{font-family:'Black Han Sans',sans-serif;font-size:52px;margin-bottom:4px;}
    .result-title{font-family:'Black Han Sans',sans-serif;font-size:30px;margin-bottom:6px;}
    .result-score{font-size:52px;font-family:'Black Han Sans',sans-serif;color:var(--gold);margin:8px 0;}
    .result-msg{color:var(--muted2);font-size:14px;margin-bottom:18px;}
    .result-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:22px;width:100%;}
    .stat-box{background:var(--card);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:14px;text-align:center;}
    .stat-val{font-family:'Black Han Sans',sans-serif;font-size:28px;color:var(--pink);}
    .stat-label{font-size:11px;color:var(--muted);margin-top:3px;}
    .btn-restart{background:var(--pink);color:#fff;border:none;border-radius:100px;padding:14px 40px;font-size:17px;font-weight:700;cursor:pointer;transition:opacity .2s,transform .15s;}
    .btn-restart:hover{opacity:.85;transform:scale(1.03);}

    /* Nav */
    .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(8,8,16,.96);border-top:1px solid rgba(255,255,255,.07);display:flex;justify-content:space-around;padding:10px 8px;z-index:500;backdrop-filter:blur(10px);}
    .nav-item{display:flex;flex-direction:column;align-items:center;text-decoration:none;color:var(--muted);font-size:10px;gap:3px;flex:1;transition:color .2s;-webkit-tap-highlight-color:transparent;}
    .nav-item.active{color:var(--gold);}
    .nav-icon{font-size:20px;}

    @media(max-width:480px){.q-text{font-size:15px;}.opt-btn{padding:13px 14px;font-size:14px;}}
  </style>
</head>
<body>
<div class="splash" id="splash">
  <div class="splash-ball">📊</div>
  <div style="font-family:'Black Han Sans',sans-serif;font-size:20px;margin-top:18px;color:#fff;">월드컵 기록 퀴즈</div>
  <div style="font-size:13px;color:#555;margin-top:6px;">월드컵 미니게임</div>
  <div class="splash-bar-wrap"><div class="splash-bar"></div></div>
</div>

<div id="game-area" style="width:100%;display:flex;flex-direction:column;align-items:center;">

<script>
function goScore(s){const n=localStorage.getItem('wc_player_name')||'';location.href='../scoreboard.html'+(n?`?prefill=${encodeURIComponent(n)}&score=${s}`:'');}

const AC=window.AudioContext||window.webkitAudioContext;let _ac=null;
function ctx(){if(!_ac)_ac=new AC();if(_ac.state==='suspended')_ac.resume();return _ac;}
function tone(f,t,d,v=.3){try{const c=ctx(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);o.start();o.stop(c.currentTime+d);}catch(e){}}
function sfxOk(){tone(523,'sine',.1,.35);setTimeout(()=>tone(659,'sine',.1,.35),70);setTimeout(()=>tone(784,'sine',.15,.35),140);}
function sfxBad(){tone(220,'sawtooth',.2,.25);setTimeout(()=>tone(180,'sawtooth',.15,.2),110);}
function confetti(x,y,n=10){const cs=['#FFD700','#ec4899','#ef4444','#22c55e','#fff'];for(let i=0;i<n;i++){const el=document.createElement('div');el.style.cssText=`position:fixed;width:${5+Math.random()*7}px;height:${5+Math.random()*7}px;background:${cs[~~(Math.random()*cs.length)]};border-radius:${Math.random()>.5?'50%':'2px'};left:${x}px;top:${y}px;pointer-events:none;z-index:9998;`;document.body.appendChild(el);const a=Math.random()*360*Math.PI/180,sp=60+Math.random()*110;let px=x,py=y,vy=Math.sin(a)*sp-50,vx=Math.cos(a)*sp,t=0;const f=()=>{t+=.016;px+=vx*.016;vy+=200*.016;py+=vy*.016;el.style.left=px+'px';el.style.top=py+'px';el.style.opacity=Math.max(0,1-t*1.5);el.style.transform=`rotate(${t*200}deg)`;if(t<.8)requestAnimationFrame(f);else el.remove();};requestAnimationFrame(f);}}
function bigC(){for(let i=0;i<4;i++)setTimeout(()=>confetti(Math.random()*innerWidth,-10,10),i*120);}

// ── 60문제 DB ────────────────────────────────────
const QUESTIONS = [
  // 득점 기록
  {cat:'득점 기록',catColor:'#ef4444',q:'역대 단일 월드컵 대회 최다 득점 선수는?',opts:['저스트 퐁테인 (13골)','게르트 뮐러 (14골)','호나우두 (15골)','펠레 (12골)'],ans:0,explain:'1958 스웨덴 월드컵에서 프랑스의 퐁테인이 기록한 13골은 아직도 깨지지 않은 역대 기록입니다.'},
  {cat:'득점 기록',catColor:'#ef4444',q:'역대 월드컵 통산 최다 득점 선수는?',opts:['호나우두 (브라질, 15골)','미로슬라프 클로제 (독일, 16골)','게르트 뮐러 (독일, 14골)','리오넬 메시 (아르헨티나, 13골)'],ans:1,explain:'클로제는 4회 대회(1998~2014)에서 통산 16골을 기록했습니다.'},
  {cat:'득점 기록',catColor:'#ef4444',q:'역대 월드컵 결승전 최다 득점 선수는?',opts:['펠레 (3골)','지네딘 지단 (2골)','게르트 뮐러 (4골)','마리오 기에르모 스타빌레 (3골)'],ans:1,explain:'지단은 1998년 결승(브라질전)에서 헤딩 2골을 기록했으며 결승전 기준 공동 최다입니다.'},
  {cat:'득점 기록',catColor:'#ef4444',q:'가장 어린 나이에 월드컵 골을 넣은 선수는?',opts:['호날두 (17세)','펠레 (17세)','체마 로드리게스 (17세)','마이클 오웬 (18세)'],ans:1,explain:'펠레는 1958년 17세 239일의 나이로 득점, 역대 최연소 월드컵 골 기록자입니다.'},
  {cat:'득점 기록',catColor:'#ef4444',q:'2022 카타르 월드컵 득점왕(황금 장화)은?',opts:['리오넬 메시 (7골)','킬리안 음바페 (8골)','줄리앙 알바레즈 (4골)','엔초 페르난데스 (3골)'],ans:1,explain:'음바페는 8골로 2022 카타르 월드컵 득점왕을 차지했습니다. 프랑스는 준우승.'},
  {cat:'득점 기록',catColor:'#ef4444',q:'1954 스위스 월드컵의 특별한 기록은?',opts:['역대 최저 득점 대회','역대 최다 득점 대회 (평균 5.38골)','첫 번째 카드 사용','최초 TV 중계 대회'],ans:1,explain:'1954년 대회는 경기당 평균 5.38골로 역대 월드컵 중 가장 많은 골이 터진 대회입니다.'},

  // 우승 기록
  {cat:'우승 기록',catColor:'#FFD700',q:'월드컵을 가장 많이 우승한 나라는?',opts:['독일 (4회)','이탈리아 (4회)','브라질 (5회)','아르헨티나 (3회)'],ans:2,explain:'브라질은 1958, 1962, 1970, 1994, 2002년으로 총 5회 우승, 역대 최다입니다.'},
  {cat:'우승 기록',catColor:'#FFD700',q:'역대 월드컵 결승에서 가장 많이 진 나라는?',opts:['네덜란드 (3회)','아르헨티나 (3회)','서독/독일 (3회)','체코슬로바키아 (2회)'],ans:0,explain:'네덜란드는 1974, 1978, 2010년 세 차례 결승에 올랐으나 모두 패해 준우승 3회 기록'},
  {cat:'우승 기록',catColor:'#FFD700',q:'개최국으로서 우승한 사례가 가장 많은 나라는?',opts:['브라질','영국','이탈리아','우루과이'],ans:2,explain:'이탈리아는 1934년 홈에서 우승, 영국도 1966년 홈 우승으로 공동. 우루과이도 1930 홈 우승.'},
  {cat:'우승 기록',catColor:'#FFD700',q:'2018 러시아 월드컵에서 황금공(MVP) 수상자는?',opts:['리오넬 메시','해리 케인','루카 모드리치','킬리안 음바페'],ans:2,explain:'크로아티아의 모드리치가 준우승 팀이었음에도 황금공을 수상, 메시·호날두 외 첫 수상.'},
  {cat:'우승 기록',catColor:'#FFD700',q:'역대 최초 월드컵 개최 연도는?',opts:['1926년','1930년','1934년','1928년'],ans:1,explain:'1930년 우루과이에서 첫 번째 FIFA 월드컵이 개최됐으며 우루과이가 우승했습니다.'},

  // 특이 기록
  {cat:'특이 기록',catColor:'#a855f7',q:'"신의 손" 골을 넣은 선수와 대회는?',opts:['메시 - 2006 독일','마라도나 - 1986 멕시코','호나우두 - 1994 미국','펠레 - 1970 멕시코'],ans:1,explain:'마라도나가 1986년 멕시코 월드컵 8강전에서 잉글랜드 상대로 손으로 넣은 골입니다.'},

const TOTAL=15;
let score=0,correctCount=0,totalQ=0,qIdx=0,questions=[],fastAnswers=0;
let qTimer,qTimeLeft;
const KEYS=['A','B','C','D'];

function shuffle(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=~~(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}

let qStartTime=0;

function startQTimer(sec=15){
  clearInterval(qTimer);qTimeLeft=sec;
  const bar=document.getElementById('q-tbar');
  bar.style.width='100%';bar.style.background='var(--pink)';
  qTimer=setInterval(()=>{
    qTimeLeft-=.15;
    bar.style.width=Math.max(0,qTimeLeft/sec*100)+'%';
    if(qTimeLeft<=5)bar.style.background='#ef4444';
    if(qTimeLeft<=0){
      clearInterval(qTimer);
      // timeout
      document.querySelectorAll('.opt-btn').forEach((b,i)=>{
        b.disabled=true;
        if(i===questions[qIdx].ans)b.classList.add('correct');
      });
      const fb=document.getElementById('feedback');
      fb.className='feedback wrong';fb.textContent='⏰ 시간 초과!';
      sfxBad();
      qIdx++;totalQ++;
      setTimeout(()=>{if(qIdx>=questions.length)showResult();else setQuestion();},1200);
    }
  },150);
}

function setQuestion(){
  const q=questions[qIdx];
  document.getElementById('qn-val').textContent=`${qIdx+1}/${questions.length}`;
  document.getElementById('prog-bar').style.width=`${qIdx/questions.length*100}%`;

  const cb=document.getElementById('cat-badge');
  cb.textContent=q.cat;cb.style.background=q.catColor+'22';cb.style.color=q.catColor;cb.style.border=`1px solid ${q.catColor}44`;

  document.getElementById('q-text').textContent=q.q;
  document.getElementById('q-context').textContent='';
  document.getElementById('feedback').textContent='';
  document.getElementById('feedback').className='feedback';

  document.getElementById('options').innerHTML=q.opts.map((o,i)=>`
    <button class="opt-btn" onclick="answer(this,${i})">
      <div class="opt-key">${KEYS[i]}</div>
      <span>${o}</span>
    </button>`).join('');

  qStartTime=Date.now();
  startQTimer();
}

function answer(btn,selected){
  clearInterval(qTimer);
  document.querySelectorAll('.opt-btn').forEach(b=>b.disabled=true);
  const q=questions[qIdx];
  const elapsed=(Date.now()-qStartTime)/1000;
  const fb=document.getElementById('feedback');
  if(selected===q.ans){
    const fast=elapsed<5;if(fast)fastAnswers++;
    const pts=fast?150:100;
    score+=pts;correctCount++;
    btn.classList.add('correct');
    fb.className='feedback correct';
    fb.textContent=fast?`⚡ 빠른 정답! +${pts}점`:`✅ 정답! +${pts}점`;
    document.getElementById('q-context').textContent='💡 '+q.explain;
    sfxOk();bigC();
  }else{
    document.querySelectorAll('.opt-btn').forEach((b,i)=>{if(i===q.ans)b.classList.add('correct');});
    btn.classList.add('wrong');
    fb.className='feedback wrong';
    fb.textContent='❌ 오답!';
    document.getElementById('q-context').textContent='💡 '+q.explain;
    sfxBad();
  }
  document.getElementById('score-val').textContent=score;
  document.getElementById('correct-val').textContent=correctCount;
  qIdx++;totalQ++;
  setTimeout(()=>{if(qIdx>=questions.length)showResult();else setQuestion();},1600);
}

function startGame(){
  score=0;correctCount=0;totalQ=0;qIdx=0;fastAnswers=0;
  questions=shuffle(QUESTIONS).slice(0,TOTAL);
  document.getElementById('game-area').style.display='flex';
  document.getElementById('result-screen').classList.remove('show');
  document.getElementById('score-val').textContent=0;
  document.getElementById('correct-val').textContent=0;
  document.getElementById('prog-bar').style.width='0%';
  setQuestion();
}

function showResult(){
  clearInterval(qTimer);
  document.getElementById('game-area').style.display='none';
  document.getElementById('result-screen').classList.add('show');
  const acc=totalQ>0?Math.round(correctCount/totalQ*100):0;
  const G=[
    {min:2000,g:'S',c:'#FFD700',t:'🌟 기록 마스터!',   em:'🏆'},
    {min:1400,g:'A',c:'#22c55e',t:'🥇 역사 박사!',     em:'🥇'},
    {min:900, g:'B',c:'#3b82f6',t:'🥈 잘 알고 있어요!',em:'🥈'},
    {min:500, g:'C',c:'#f59e0b',t:'🥉 나쁘지 않아요!', em:'😅'},
    {min:0,   g:'D',c:'#ef4444',t:'📖 더 공부해봐요!', em:'😭'},
  ];
  const gr=G.find(g=>score>=g.min)||G[G.length-1];
  document.getElementById('res-emoji').textContent=gr.em;
  document.getElementById('res-grade').innerHTML=`<span style="color:${gr.c}">GRADE ${gr.g}</span>`;
  document.getElementById('res-title').textContent=gr.t;
  document.getElementById('res-score').textContent=score.toLocaleString()+'점';
  document.getElementById('res-msg').textContent=`${correctCount}/${totalQ} 정답 · 정확도 ${acc}%`;
  document.getElementById('sc').textContent=correctCount;
  document.getElementById('st').textContent=totalQ;
  document.getElementById('sb').textContent=acc+'%';
  document.getElementById('ss').textContent=fastAnswers;
}

setTimeout(()=>{const s=document.getElementById('splash');s.classList.add('out');setTimeout(()=>s.remove(),400);},900);
startGame();
</script>
